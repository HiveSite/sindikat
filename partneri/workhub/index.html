<!doctype html>
<html lang="sr-ME">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WorkingHub — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f1a;
  --bg2:#131728;
  --bg3:#1a2038;
  --panel:#1e2540;
  --panelB:#242c4e;
  --border:#2a3356;
  --borderHover:#3d4f8a;
  --text:#f0f2ff;
  --muted:#7b87b8;
  --faint:#3d4a72;
  --brand:#4f8ef7;
  --brandDark:#2563eb;
  --brandGlow:rgba(79,142,247,.18);
  --green:#22c55e;
  --greenBg:rgba(34,197,94,.12);
  --amber:#f59e0b;
  --amberBg:rgba(245,158,11,.12);
  --red:#ef4444;
  --redBg:rgba(239,68,68,.12);
  --purple:#a78bfa;
  --purpleBg:rgba(167,139,250,.12);
  --teal:#2dd4bf;
  --tealBg:rgba(45,212,191,.12);
  --r:14px;
  --rLg:20px;
  --rXl:28px;
  --font:'Sora',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --nav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;background:none;border:none}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── LOGIN ── */
.loginWrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:
    radial-gradient(ellipse 80% 50% at 10% -10%,rgba(79,142,247,.25),transparent),
    radial-gradient(ellipse 60% 60% at 90% 110%,rgba(167,139,250,.2),transparent),
    var(--bg);
}
.loginCard{
  width:100%;max-width:420px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rXl);
  padding:32px 28px;
  box-shadow:0 40px 100px rgba(0,0,0,.6);
}
.loginBrand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logoMark{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--brand),var(--purple));
  display:grid;place-items:center;font-size:18px;font-weight:800;color:white;flex-shrink:0;
}
.loginBrand span{font-size:22px;font-weight:800;letter-spacing:-.04em}
.loginTitle{font-size:26px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
.loginSub{color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.6}
.demoRoles{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.roleCard{
  border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;
  background:var(--bg2);display:flex;align-items:center;gap:14px;
  transition:border-color .2s,background .2s;text-align:left;width:100%;
}
.roleCard:hover{border-color:var(--brand);background:var(--brandGlow)}
.roleIcon{
  width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  font-size:20px;flex-shrink:0;
}
.roleCard-c .roleIcon{background:var(--tealBg);color:var(--teal)}
.roleCard-f .roleIcon{background:var(--amberBg);color:var(--amber)}
.roleCard-a .roleIcon{background:var(--purpleBg);color:var(--purple)}
.roleCardText b{display:block;font-size:14px;font-weight:700;margin-bottom:2px}
.roleCardText span{font-size:12px;color:var(--muted)}
.divider{display:flex;align-items:center;gap:12px;color:var(--faint);font-size:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.loginForm{display:flex;flex-direction:column;gap:12px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.field input{
  width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;font-size:14px;color:var(--text);
  transition:border-color .2s;
}
.field input:focus{outline:none;border-color:var(--brand)}
.btnPrimary{
  width:100%;padding:13px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--brand),var(--brandDark));
  color:white;font-weight:700;font-size:14px;letter-spacing:.01em;
  transition:opacity .2s,transform .1s;
  border:none;
}
.btnPrimary:active{transform:scale(.98);opacity:.9}

/* ── APP SHELL ── */
.appShell{display:flex;flex-direction:column;min-height:100vh}

/* ── TOP NAV (mobile header) ── */
.topNav{
  position:sticky;top:0;z-index:40;
  background:rgba(13,16,26,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:var(--nav);display:flex;align-items:center;
  padding:0 16px;gap:12px;
}
.topNavBrand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;letter-spacing:-.04em;flex-shrink:0}
.topNavBrand .logoMark{width:32px;height:32px;font-size:14px;border-radius:9px}
.topSearch{
  flex:1;position:relative;
}
.topSearch input{
  width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:999px;
  padding:9px 14px 9px 36px;font-size:13px;color:var(--text);
  transition:border-color .2s;
}
.topSearch input:focus{outline:none;border-color:var(--brand)}
.topSearch .searchIco{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.topNavActions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.notifBtn{
  position:relative;width:36px;height:36px;border-radius:10px;
  background:var(--bg2);border:1px solid var(--border);
  display:grid;place-items:center;font-size:16px;
}
.notifDot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;
  background:var(--red);border-radius:50%;border:2px solid var(--bg);
}
.avatarBtn{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--purple));
  display:grid;place-items:center;font-size:14px;font-weight:800;color:white;flex-shrink:0;
}

/* ── BOTTOM TAB BAR ── */
.tabBar{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:rgba(13,16,26,.95);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;height:62px;padding:0 4px;
  safe-area-inset-bottom:env(safe-area-inset-bottom);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabItem{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;border-radius:12px;
  transition:background .15s;color:var(--muted);font-size:10px;font-weight:700;
  padding:6px 4px;position:relative;
}
.tabItem.active{color:var(--brand)}
.tabItem .tabIco{font-size:22px;line-height:1}
.tabItem .tabBadge{
  position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--red);color:white;font-size:9px;font-weight:800;
  padding:1px 5px;border-radius:999px;
}

/* ── CONTENT ── */
.content{
  flex:1;overflow-y:auto;
  padding:16px 16px calc(62px + 16px + env(safe-area-inset-bottom));
  max-width:720px;margin:0 auto;width:100%;
}
.view{display:none}
.view.active{display:block}

/* ── SECTION TITLE ── */
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.sectionHead h1{font-size:24px;font-weight:800;letter-spacing:-.04em;line-height:1.2}
.sectionHead .sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);padding:16px}
.cardTitle{font-size:16px;font-weight:700;margin-bottom:14px;letter-spacing:-.02em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── STAT CARD ── */
.statCard{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  padding:14px;display:flex;flex-direction:column;gap:6px;
}
.statCard .statVal{font-size:28px;font-weight:800;letter-spacing:-.05em}
.statCard .statLbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.statsRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.statsRow4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}

/* ── BADGE ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;
  border:1px solid transparent;flex-shrink:0;
}
.badge-blue{background:rgba(79,142,247,.15);color:#80b0ff;border-color:rgba(79,142,247,.3)}
.badge-green{background:var(--greenBg);color:#4ade80;border-color:rgba(34,197,94,.3)}
.badge-amber{background:var(--amberBg);color:#fbbf24;border-color:rgba(245,158,11,.3)}
.badge-red{background:var(--redBg);color:#f87171;border-color:rgba(239,68,68,.3)}
.badge-purple{background:var(--purpleBg);color:#c4b5fd;border-color:rgba(167,139,250,.3)}
.badge-teal{background:var(--tealBg);color:#5eead4;border-color:rgba(45,212,191,.3)}
.badge-gray{background:rgba(100,116,139,.15);color:#94a3b8;border-color:rgba(100,116,139,.3)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border-radius:var(--r);padding:10px 14px;font-size:13px;font-weight:700;
  border:1px solid var(--border);background:var(--panel);color:var(--text);
  transition:background .15s,border-color .15s,transform .1s;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn:hover{background:var(--panelB);border-color:var(--borderHover)}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:10px}
.btn-primary{background:var(--brand);border-color:var(--brand);color:white}
.btn-primary:hover{background:#6ba3f9;border-color:#6ba3f9}
.btn-green{background:var(--green);border-color:var(--green);color:white}
.btn-green:hover{background:#16c44a}
.btn-red{background:var(--red);border-color:var(--red);color:white}
.btn-danger{background:var(--redBg);border-color:rgba(239,68,68,.4);color:var(--red)}
.btn-amber{background:var(--amberBg);border-color:rgba(245,158,11,.4);color:var(--amber)}
.btnRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── FORM ── */
.formGrid{display:flex;flex-direction:column;gap:14px}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fLabel{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:6px}
.fInput{
  width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;font-size:14px;color:var(--text);
  transition:border-color .2s;
}
.fInput:focus{outline:none;border-color:var(--brand)}
.fInput::placeholder{color:var(--faint)}
textarea.fInput{min-height:100px;resize:vertical;line-height:1.6}
select.fInput{cursor:pointer}

/* ── JOB CARDS ── */
.jobList{display:flex;flex-direction:column;gap:12px}
.jobCard{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  padding:16px;transition:border-color .2s;
}
.jobCard:hover{border-color:var(--borderHover)}
.jobCard.featured{border-color:rgba(245,158,11,.4);background:linear-gradient(135deg,var(--panel),rgba(245,158,11,.04))}
.jobCardTop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.jobCardTop h3{font-size:16px;font-weight:700;letter-spacing:-.02em;line-height:1.3}
.jobMeta{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6}
.jobMeta span{color:var(--text)}
.jobDesc{font-size:13px;color:var(--muted);line-height:1.6;margin:10px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tagRow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{
  background:var(--bg2);border:1px solid var(--border);border-radius:999px;
  padding:4px 10px;font-size:11px;font-weight:600;color:var(--muted);
}

/* ── CANDIDATE CARDS ── */
.candCard{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  padding:16px;
}
.candTop{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.candAvatar{
  width:46px;height:46px;border-radius:14px;flex-shrink:0;
  display:grid;place-items:center;font-size:18px;font-weight:800;color:white;
}
.candName{font-size:15px;font-weight:700;letter-spacing:-.02em}
.candHeadline{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.contactReveal{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;margin-top:10px;font-size:13px;line-height:1.8;color:var(--muted);
}
.contactReveal strong{color:var(--green)}

/* ── KANBAN ── */
.kanbanWrap{overflow-x:auto;padding-bottom:8px;margin:0 -16px;padding:0 16px 8px}
.kanban{display:flex;gap:10px;min-width:max-content}
.kanbanCol{
  width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rLg);
  padding:12px;flex-shrink:0;
}
.kanbanColHead{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);
}
.kanbanCount{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:999px;padding:2px 7px;font-size:11px;
}
.appCard{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:11px;margin-bottom:8px;
}
.appCardName{font-size:13px;font-weight:700;margin-bottom:3px}
.appCardSub{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.appCardBtns{display:flex;gap:6px}
.appCardBtns button{
  flex:1;padding:6px;border-radius:8px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--bg2);color:var(--muted);
  transition:all .15s;
}
.appCardBtns button:hover{background:var(--panelB)}
.appCardBtns button.fwd{color:var(--brand);border-color:rgba(79,142,247,.4);background:rgba(79,142,247,.08)}

/* ── PLANS ── */
.plansGrid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.planCard{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  padding:18px;transition:border-color .2s;
}
.planCard.current{border-color:var(--brand);background:linear-gradient(135deg,var(--panel),rgba(79,142,247,.06))}
.planCard.popular{border-color:rgba(245,158,11,.5)}
.planName{font-size:18px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.planPrice{font-size:30px;font-weight:800;letter-spacing:-.05em;margin:10px 0}
.planPrice span{font-size:14px;font-weight:500;color:var(--muted)}
.planFeats{list-style:none;display:flex;flex-direction:column;gap:7px;margin:12px 0 16px;font-size:13px;color:var(--muted)}
.planFeats li::before{content:'✓ ';color:var(--green);font-weight:700}

/* ── PROFILE ── */
.profileHero{
  background:linear-gradient(135deg,var(--panel),rgba(79,142,247,.08));
  border:1px solid var(--border);border-radius:var(--rLg);
  padding:20px;margin-bottom:16px;
}
.profileHeroTop{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.profileBigAv{
  width:64px;height:64px;border-radius:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand),var(--purple));
  display:grid;place-items:center;font-size:24px;font-weight:800;color:white;
}
.profileName{font-size:20px;font-weight:800;letter-spacing:-.03em}
.profileHeadline{font-size:13px;color:var(--muted);margin:3px 0 6px;line-height:1.4}
.progressBar{height:6px;background:var(--bg2);border-radius:999px;overflow:hidden}
.progressFill{height:100%;background:linear-gradient(90deg,var(--brand),var(--green));border-radius:999px}

/* ── CV SECTIONS ── */
.cvSection{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  margin-bottom:12px;overflow:hidden;
}
.cvSectionHead{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;
}
.cvSectionHead span{font-size:14px;font-weight:700}
.cvSectionBody{padding:0 16px 16px;border-top:1px solid var(--border)}
.cvItem{
  padding:12px 0;border-bottom:1px solid var(--border);
}
.cvItem:last-child{border-bottom:none}
.cvItemTitle{font-size:14px;font-weight:700;margin-bottom:2px}
.cvItemSub{font-size:12px;color:var(--muted);margin-bottom:4px}
.cvItemDesc{font-size:13px;color:var(--muted);line-height:1.6}

/* ── ADMIN ── */
.orderCard{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--rLg);
  padding:16px;margin-bottom:10px;
}
.orderTop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.orderID{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--brand)}
.orderMeta{font-size:13px;color:var(--muted);margin-top:2px}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;z-index:60;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  padding:16px;
}
.modal.open{display:flex}
.modalSheet{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rXl) var(--rXl) var(--r) var(--r);
  padding:24px;width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;
  animation:slideUp .25s ease;
}
.modalSheet.center{border-radius:var(--rXl);margin:auto}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.modalTitle{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.modalSub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.bankInfo{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;font-family:var(--mono);font-size:12px;line-height:2.2;color:var(--muted);
  margin:14px 0;
}
.bankInfo strong{color:var(--text)}

/* ── TOAST ── */
.toast{
  position:fixed;top:calc(var(--nav) + 10px);left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:80;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 18px;font-size:13px;font-weight:600;white-space:nowrap;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .emptyIco{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* ── CHIP FILTERS ── */
.chipRow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-ms-overflow-style:none;scrollbar-width:none}
.chipRow::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:7px 14px;border-radius:999px;
  border:1px solid var(--border);background:var(--bg2);
  font-size:12px;font-weight:700;color:var(--muted);
  transition:all .15s;
}
.chip.active{background:var(--brand);border-color:var(--brand);color:white}

/* ── NOTIFICATION DOT ── */
.notifList{display:flex;flex-direction:column;gap:10px}
.notifItem{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;display:flex;gap:12px;align-items:flex-start;
}
.notifDotBig{width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:5px}
.notifItem.read .notifDotBig{background:var(--faint)}
.notifText{font-size:13px;line-height:1.6}
.notifTime{font-size:11px;color:var(--faint);margin-top:3px}

/* ── SEPARATOR ── */
.sep{height:1px;background:var(--border);margin:16px 0}

/* ── DESKTOP SIDEBAR (≥720px) ── */
@media(min-width:720px){
  .appShell{flex-direction:row}
  .sidebar{
    position:sticky;top:0;height:100vh;
    width:240px;flex-shrink:0;
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:16px 12px;gap:4px;overflow-y:auto;
  }
  .sidebarBrand{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;margin-bottom:12px;
  }
  .sidebarBrand span{font-size:18px;font-weight:800;letter-spacing:-.04em}
  .sideRole{
    background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
    padding:10px;margin-bottom:12px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;
  }
  .sideRole .roleName{color:var(--text);font-size:13px;font-weight:700;margin-top:2px}
  .sideNav{display:flex;flex-direction:column;gap:2px;flex:1}
  .sideNavItem{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
    font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;width:100%;text-align:left;
  }
  .sideNavItem .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
  .sideNavItem:hover{background:var(--panelB);color:var(--text)}
  .sideNavItem.active{background:rgba(79,142,247,.15);color:var(--brand)}
  .sideNavDivider{height:1px;background:var(--border);margin:8px 0}
  .sideBottom{margin-top:auto;padding-top:12px}
  .sideRoleSwitcher{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .sideRoleBtn{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;
    font-size:12px;font-weight:700;color:var(--muted);border:1px solid transparent;
    transition:all .15s;text-align:left;
  }
  .sideRoleBtn:hover{background:var(--panelB);color:var(--text)}
  .sideRoleBtn.active{background:rgba(79,142,247,.12);color:var(--brand);border-color:rgba(79,142,247,.3)}
  .tabBar{display:none}
  .topNav{display:none}
  .mainArea{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
  .desktopTop{
    height:var(--nav);background:rgba(13,16,26,.9);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 20px;gap:14px;
    position:sticky;top:0;z-index:30;
  }
  .dTopSearch{flex:1;max-width:400px;position:relative}
  .dTopSearch input{
    width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:999px;
    padding:9px 14px 9px 36px;font-size:13px;color:var(--text);
  }
  .dTopSearch input:focus{outline:none;border-color:var(--brand)}
  .dTopSearch .searchIco{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .dTopRight{display:flex;align-items:center;gap:10px;margin-left:auto}
  .content{padding:20px;max-width:760px}
}
@media(max-width:719px){
  .sidebar{display:none}
  .mainArea{flex:1;min-width:0}
  .desktopTop{display:none}
  .field2{grid-template-columns:1fr}
}

// AUTH
// ═══════════════════════════════════
function loginAs(role){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  switchRole(role);
}
function logout(){
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}
function switchRole(r){
  S.role = r;
  const labels = {candidate:'Ana Jović',company:'EventPro',admin:'Admin'};
  const initials = {candidate:'A',company:'E',admin:'W'};
  const roleLabels = {candidate:'Candidate',company:'Company',admin:'Admin'};
  document.getElementById('topAvatar').textContent = initials[r];
  document.getElementById('deskAvatar').textContent = initials[r];
  document.getElementById('deskRoleBadge').textContent = roleLabels[r];
  document.getElementById('sideRoleName').textContent = labels[r];
  document.querySelectorAll('.sideRoleBtn').forEach(b=>b.classList.toggle('active',b.dataset.role===r));
  buildTabBar();
  buildSideNav();
  showView('dashboard');
  toast('Ulogovan/a kao: ' + labels[r]);
  const nd = document.getElementById('notifDot');
  if(nd) nd.style.display = S.notifications.some(n=>!n.read) ? 'block' : 'none';
}
function buildTabBar(){
  const nav = NAVS[S.role];
  document.getElementById('tabBar').innerHTML = nav.map(n=>`
    <button class="tabItem ${S.view===n.id?'active':''}" onclick="showView('${n.id}')" data-view="${n.id}">
      <span class="tabIco">${n.ico}</span>
      <span>${n.label}</span>
      ${n.id==='notifications'&&S.notifications.some(x=>!x.read)?'<span class="tabBadge">'+S.notifications.filter(x=>!x.read).length+'</span>':''}
    </button>`).join('');
}
function buildSideNav(){
  const items = SIDE_NAVS[S.role];
  document.getElementById('sideNav').innerHTML = items.map(n=>
    n.divider ? '<div class="sideNavDivider"></div>' :
    `<button class="sideNavItem ${S.view===n.id?'active':''}" onclick="showView('${n.id}')" data-view="${n.id}">
      <span class="ico">${n.ico}</span>${n.label}
    </button>`
  ).join('');
}
function showView(v){
  S.view = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('view-'+v);
  if(el) el.classList.add('active');
  buildTabBar();
  buildSideNav();
  renders[v]?.();
}

function sHead(title,sub,action=''){
  return `<div class="sectionHead"><div><h1>${title}</h1><div class="sub">${sub}</div></div>${action?`<div>${action}</div>`:''}</div>`;
}
function jobCardHTML(j, opts={}){
  const {showApply=false,showManage=false} = opts;
  return `<div class="jobCard ${j.featured?'featured':''}">
    <div class="jobCardTop">
      <div>
        <h3>${j.title}</h3>
        <div class="jobMeta">${j.company} · ${j.loc} · ${j.type}</div>
        <div class="jobMeta">💰 <span>${j.salary}</span> · 📅 ${j.postedDays} dan${j.postedDays>1?'a':''} · 👁 ${j.apps} prijav${j.apps===1?'a':'e'}</div>
      </div>
      ${j.featured?'<span class="badge badge-amber">★ FEATURED</span>':'<span class="badge badge-green">AKTIVAN</span>'}
    </div>
    <p class="jobDesc">${j.desc}</p>
    <div class="tagRow">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="btnRow">
      <button class="btn sm" onclick="openJobModal(${j.id})">Detalji</button>
      ${showApply?`<button class="btn sm btn-primary" onclick="applyJob(${j.id})">${S.myApps.some(a=>a.jobId===j.id)?'✓ Aplicirao/la':'Apliciraj'}</button>`:''}
      ${showManage?`
        <button class="btn sm" onclick="toggleJobStatus(${j.id})">${j.status==='ACTIVE'?'Pauziraj':'Aktiviraj'}</button>
        <button class="btn sm" onclick="showView('ats')">Aplikanti (${j.apps})</button>
      `:''}
    </div>
  </div>`;
}

function selectCat(btn,cat){
  activeCat = cat;
  document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  filterJobs();
}
function filterJobs(){
  const q = (document.getElementById('jobQ')?.value||'').toLowerCase();
  const loc = document.getElementById('jobLoc')?.value||'';
  const type = document.getElementById('jobType')?.value||'';
  const filtered = S.jobs.filter(j=>
    (!q||(j.title+j.company+j.desc+j.tags.join(' ')).toLowerCase().includes(q)) &&
    (!loc||j.loc===loc) && (!type||j.type===type) && (!activeCat||j.cat===activeCat)
  );
  const out = document.getElementById('jobsOut');
  if(out) out.innerHTML = filtered.length ? filtered.map(j=>jobCardHTML(j,{showApply:S.role!=='company'})).join('') : '<div class="empty"><div class="emptyIco">🔍</div><p>Nema oglasa za ove filtere.</p></div>';

            <div class="appCardBtns">
              <button onclick="moveC(${c.id},'prev')">← Nazad</button>

            </div>

      </div>`).join('')}

function moveC(id,dir){
  const order=['APPLIED','VIEWED','INTERVIEW','OFFER','HIRED'];
  const c=S.candidates.find(x=>x.id===id);
  let i=order.indexOf(c.status);
  i=dir==='next'?Math.min(4,i+1):Math.max(0,i-1);
  c.status=order[i];
  toast(c.name+' → '+c.status);
  renderATS();
}

function candListHTML(list){
  return list.map(c=>`

      ${c.unlocked?`<div class="contactReveal">📧 <strong>${c.email}</strong><br>📱 <strong>${c.phone}</strong></div>`:''}
      <div class="btnRow" style="margin-top:10px">
        ${c.unlocked
          ? `<button class="btn sm btn-green">✓ Kontakt vidljiv</button>`

function filterCandidates(q){
  const filtered = S.candidates.filter(c=>
    !q || (c.name+c.headline+c.skills.join(' ')).toLowerCase().includes(q.toLowerCase())
  );
  const out = document.getElementById('candOut');
  if(out) out.innerHTML = filtered.length ? candListHTML(filtered) : '<div class="empty"><div class="emptyIco">👥</div><p>Nema kandidata za ovu pretragu.</p></div>';
}
function unlockC(id){
  const c=S.candidates.find(x=>x.id===id);
  if(c.unlocked){toast('Kontakt je već otključan.'); return;}
  if(S.credits<=0){toast('⚠️ Nemaš više kredita. Naruči plan.'); return;}
  c.unlocked=true; S.credits--;
  toast(`Kontakt otključan: ${c.name}. Preostalo: ${S.credits} kredita.`);
  renderCandidates();
  document.querySelector('.sectionHead .badge-amber') && (document.querySelector('.sectionHead .badge-amber').textContent='💳 '+S.credits+' kredita');
}
function openCandModal(id){
  const c=S.candidates.find(x=>x.id===id);

    ${c.unlocked?`<div class="contactReveal">📧 <strong>${c.email}</strong><br>📱 <strong>${c.phone}</strong></div>`:'<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px">Kontakt je zaključan. Koristi unlock.</div>'}
    <div class="btnRow" style="margin-top:16px">
      ${c.unlocked?'<button class="btn btn-green sm">✓ Kontakt vidljiv</button>':`<button class="btn btn-primary sm" onclick="unlockC(${c.id});closeModal()">🔓 Unlock (1 kredit)</button>`}

// SUBSCRIPTION
function renderSubscription(){
  const plans = [
    {name:'Free',price:'0€',dur:'',feats:['1 aktivan oglas','Bez baze kandidata','0 unlock kredita'],current:S.plan==='Free'},
    {name:'Starter',price:'25€',dur:'/mjes',feats:['3 aktivna oglasa','Pristup bazi kandidata','10 unlock kredita/mjes'],popular:false,current:S.plan==='Starter'},
    {name:'Growth',price:'80€',dur:'/mjes',feats:['10 aktivnih oglasa','Prioritetni pristup bazi','50 unlock kredita/mjes'],popular:true,current:S.plan==='Growth'},
    {name:'Pro',price:'200€',dur:'/mjes',feats:['Neograničeni oglasi','API pristup','200 unlock kredita/mjes'],current:S.plan==='Pro'},
  ];
  document.getElementById('view-subscription').innerHTML = sHead('Pretplata','Odaberi plan, naruči i aktiviraj kodom.') + `
  <div class="plansGrid">
    ${plans.map(p=>`
      <div class="planCard ${p.current?'current':''} ${p.popular&&!p.current?'popular':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="planName">${p.name}</div>
          ${p.popular?'<span class="badge badge-amber">★ Popularno</span>':''}
          ${p.current?'<span class="badge badge-blue">✓ Aktivan</span>':''}
        </div>
        <div class="planPrice">${p.price}<span>${p.dur}</span></div>
        <ul class="planFeats">${p.feats.map(f=>`<li>${f}</li>`).join('')}</ul>
        ${p.current
          ? `<button class="btn btn-primary" disabled>Trenutni plan</button>`
          : `<button class="btn btn-primary" onclick="orderPlan('${p.name}','${p.price}')">Naruči plan</button>`}
      </div>`).join('')}
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="cardTitle">Aktiviraj kod</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Nakon što potvrdiš uplatu, admin ti šalje aktivacioni kod na email.</p>
    <div style="display:flex;gap:10px">
      <input class="fInput" id="actCode" placeholder="WH-2026-XXXX-XXXX" value="WH-2026-X7K9-MNPL" style="flex:1;font-family:var(--mono);letter-spacing:.05em">
      <button class="btn btn-green" onclick="activateCode()">Aktiviraj</button>
    </div>
  </div>

  <div class="card">
    <div class="cardTitle">Trenutno stanje</div>
    <div style="display:grid;gap:8px;font-size:13px">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Plan</span><strong>${S.plan}</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Ističe</span><strong>${S.planExpiry}</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Unlock krediti</span><strong style="color:var(--amber)">${S.credits}</strong></div>
    </div>
  </div>`;
}
function orderPlan(name, price){
  const amount = parseInt(price.replace(/[^0-9]/g,''))||0;
  const orderId = 'WH-'+new Date().getFullYear()+'-'+Math.floor(1000+Math.random()*9000);
  S.orders.unshift({id:orderId,company:'EventPro',plan:name,amount,status:'PENDING',date:new Date().toLocaleDateString('sr'),note:''});
  openModal(`
    <div class="modalTitle">Narudžba kreirana ✓</div>
    <div class="modalSub">Pošalji uplatu na naš račun. Admin potvrđuje u roku 24h i šalje ti aktivacioni kod.</div>
    <div class="bankInfo">
      <div>Primalac: <strong>WorkingHub d.o.o.</strong></div>
      <div>IBAN: <strong>ME25 5050 0000 1234 5678 90</strong></div>
      <div>Iznos: <strong>${amount},00 EUR</strong></div>
      <div>Svrha: <strong>${name} plan · ${orderId}</strong></div>
      <div>Poziv na br: <strong>${orderId}</strong></div>
    </div>
    <p style="font-size:12px;color:var(--muted)">Nakon uplate, admin potvrđuje i šalješ ti kod na email. Unesi kod u polje iznad da aktiviraš plan.</p>
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="closeModal()">Razumijem</button>`);
  toast('Narudžba kreirana: ' + orderId);
}
function activateCode(){
  const code = document.getElementById('actCode')?.value?.trim();
  if(!code||!code.startsWith('WH-')){toast('Upiši validan kod (WH-XXXX-XXXX-XXXX)'); return;}
  S.plan='Growth'; S.credits=50; S.planExpiry='28.05.2027';
  openModal(`
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:56px;margin-bottom:12px">🎉</div>
      <div class="modalTitle">Growth plan aktiviran!</div>
      <div class="modalSub">Sada imaš 10 aktivnih oglasa, 50 unlock kredita i pristup bazi kandidata. Vrijedi godinu dana.</div>
      <button class="btn btn-green" style="width:100%;margin-top:16px" onclick="closeModal();renderSubscription()">Nastavi</button>
    </div>`);
}

// ADMIN
function renderAdmin(){
  const statusBadge = {PENDING:'badge-amber',PAID:'badge-green',CANCELED:'badge-red'};
  document.getElementById('view-admin').innerHTML = sHead('Admin panel','Narudžbine, aktivacioni kodovi, moderacija.') + `
  <div class="cardTitle" style="margin-bottom:12px">Sve narudžbine</div>
  ${S.orders.map(o=>`
    <div class="orderCard">
      <div class="orderTop">
        <div>
          <div class="orderID">${o.id}</div>
          <div class="orderMeta">${o.company} · Plan: ${o.plan} · ${o.amount}€ · ${o.date}</div>
          ${o.code?`<div style="font-size:12px;color:var(--green);font-family:var(--mono);margin-top:4px">Kod: ${o.code}</div>`:''}
          ${o.note?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${o.note}</div>`:''}
        </div>
        <span class="badge ${statusBadge[o.status]||'badge-gray'}">${o.status}</span>
      </div>
      <div class="btnRow">
        ${o.status==='PENDING'?`
          <button class="btn sm btn-primary" onclick="confirmOrder('${o.id}')">✓ Potvrdi uplatu</button>
          <button class="btn sm btn-danger" onclick="cancelOrder('${o.id}')">Otkaži</button>
        `:''}
        ${o.status==='PAID'&&o.code?`<button class="btn sm" onclick="toast('Kod: ${o.code}')">Prikaži kod</button>`:''}
      </div>
    </div>`).join('')}

  <div class="sep"></div>
  <div class="cardTitle" style="margin-bottom:12px">Moderacija oglasa</div>
  ${S.jobs.slice(0,3).map(j=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px">
        <div><div style="font-weight:700">${j.title}</div><div style="font-size:12px;color:var(--muted)">${j.company} · ${j.postedDays} dan${j.postedDays>1?'a':''}</div></div>
        <span class="badge ${j.status==='ACTIVE'?'badge-green':'badge-amber'}">${j.status}</span>
      </div>
      <div class="btnRow">
        <button class="btn sm btn-green" onclick="toast('Oglas odobren ✓')">Odobri</button>
        <button class="btn sm btn-danger" onclick="toast('Oglas uklonjen')">Ukloni</button>
      </div>
    </div>`).join('')}`;
}
function confirmOrder(id){
  const o=S.orders.find(x=>x.id===id);
  o.status='PAID';
  o.code='WH-'+new Date().getFullYear()+'-'+Math.random().toString(36).substr(2,4).toUpperCase()+'-'+Math.random().toString(36).substr(2,4).toUpperCase();
  openModal(`
    <div class="modalTitle">Uplata potvrđena ✓</div>
    <div class="modalSub">Aktivacioni kod je generisan i poslan firmi <strong>${o.company}</strong> na email.</div>
    <div class="bankInfo">
      Narudžba: <strong>${o.id}</strong><br>
      Plan: <strong>${o.plan}</strong><br>
      Aktivacioni kod: <strong>${o.code}</strong>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="closeModal();renderAdmin()">Zatvori</button>`);
  toast('Uplata potvrđena. Kod: ' + o.code);
}
function cancelOrder(id){
  S.orders.find(x=>x.id===id).status='CANCELED';
  toast('Narudžba otkazana.');
  renderAdmin();
}

// NOTIFICATIONS
function renderNotifications(){
  document.getElementById('view-notifications').innerHTML = sHead('Notifikacije','Sve aktivnosti na tvom nalogu.','<button class="btn sm" onclick="markAllRead()">Sve pročitano</button>') + `
  <div class="notifList">
    ${S.notifications.map(n=>`
      <div class="notifItem ${n.read?'read':''}">
        <div class="notifDotBig"></div>
        <div>
          <div class="notifText">${n.text}</div>
          <div class="notifTime">${n.time}</div>
        </div>
      </div>`).join('')}
  </div>`;
}
function markAllRead(){
  S.notifications.forEach(n=>n.read=true);
  buildTabBar();
  const nd = document.getElementById('notifDot');
  if(nd) nd.style.display='none';
  renderNotifications();
  toast('Sve notifikacije su pročitane.');
}

// JOB MODAL
function openJobModal(id){
  const j=S.jobs.find(x=>x.id===id);
  const applied = S.myApps.some(a=>a.jobId===id);
  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px">
      <div><div style="font-size:20px;font-weight:800;letter-spacing:-.03em">${j.title}</div><div style="font-size:13px;color:var(--muted);margin-top:4px">${j.company} · ${j.loc} · ${j.type}</div></div>
      ${j.featured?'<span class="badge badge-amber">★ FEATURED</span>':'<span class="badge badge-green">AKTIVAN</span>'}
    </div>
    <div class="tagRow" style="margin-bottom:12px">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px">${j.desc}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:13px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px"><div style="color:var(--muted);font-size:11px;font-weight:700;margin-bottom:2px">PLATA</div>${j.salary}</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px"><div style="color:var(--muted);font-size:11px;font-weight:700;margin-bottom:2px">PRIJAVE</div>${j.apps} kandidata</div>
    </div>
    ${S.role!=='company'?`
    <button class="btn ${applied?'':'btn-primary'}" style="width:100%" onclick="${applied?'':('applyJobModal('+id+')')}">
      ${applied?'✓ Već si aplicirao/la':'Apliciraj na oglas'}
    </button>`:''}
    <button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Zatvori</button>`);
}
function openJobModalByTitle(title){
  const j=S.jobs.find(x=>x.title===title);
  if(j) openJobModal(j.id);
}
function applyJobModal(id){
  const j=S.jobs.find(x=>x.id===id);
  openModal(`
    <div class="modalTitle">Apliciraj: ${j.title}</div>
    <div class="modalSub">${j.company} · ${j.loc}</div>
    <div><div class="fLabel">Cover letter (opciono)</div><textarea class="fInput" id="m-cl" placeholder="Kratko predstavi zašto si pravi izbor..."></textarea></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-primary" style="flex:1" onclick="confirmApply(${id})">Pošalji prijavu</button>
      <button class="btn" onclick="closeModal()">Otkaži</button>
    </div>`);
}
function confirmApply(id){
  applyJob(id);
  closeModal();
}
function applyJob(id){
  const j=S.jobs.find(x=>x.id===id);
  if(S.myApps.some(a=>a.jobId===id)){toast('Već si aplicirao/la na ovaj oglas.'); return;}
  const cl = document.getElementById('m-cl')?.value||'';
  S.myApps.unshift({jobId:id,title:j.title,company:j.company,status:'APPLIED',date:new Date().toLocaleDateString('sr'),coverletter:cl});
  j.apps++;
  S.notifications.unshift({id:Date.now(),text:`Prijava poslata za: ${j.title} · ${j.company}`,time:'Upravo',read:false,type:'apply'});
  toast('Prijava poslata: ' + j.title + ' ✓');
  buildTabBar();
}

// GLOBAL SEARCH
function globalSearch(v){
  if(!v) return;
  activeCat='';
  showView('jobs');
  setTimeout(()=>{
    const q=document.getElementById('jobQ');
    if(q){q.value=v; filterJobs();}
  },50);
}

// MODAL
function openModal(html){
  document.getElementById('modalSheet').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

// TOAST
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),2800);
}

  jobs:renderJobs,
  profile:renderProfile,
  applications:renderApplications,
  'company-jobs':renderCompanyJobs,
  'new-job':renderNewJob,
  ats:renderATS,
  candidates:renderCandidates,
  subscription:renderSubscription,
  admin:renderAdmin,
  notifications:renderNotifications,
};
