    :root{
      --bg:#f5f1e8;
      --ink:#171717;
      --muted:#6d665f;
      --soft:#fffaf0;
      --paper:#fffdf8;
      --line:#ded5c6;
      --line2:#cabcaa;
      --blue:#2148ff;
      --lime:#c8ff3d;
      --pink:#ff4fa3;
      --orange:#ff8a2a;

      --r:20px;
      --r2:30px;
      --font:'Inter',system-ui,sans-serif;
      --display:'Space Grotesk',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5}
    body:before{content:"";position:fixed;inset:-20%;z-index:-2;background:radial-gradient(circle at 12% 8%,rgba(33,72,255,.18),transparent 26%),radial-gradient(circle at 88% 12%,rgba(255,79,163,.15),transparent 26%),radial-gradient(circle at 50% 95%,rgba(200,255,61,.22),transparent 30%)}
    body:after{content:"";position:fixed;inset:0;z-index:-1;opacity:.35;background-image:linear-gradient(rgba(23,23,23,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(23,23,23,.04) 1px,transparent 1px);background-size:36px 36px;mask-image:linear-gradient(to bottom,#000,transparent 90%)}
    button,input,select,textarea{font:inherit;color:inherit;border:none;background:none}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    .hidden{display:none!important}
    .wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

    /* TOP */
    .top{position:sticky;top:0;z-index:40;background:rgba(245,241,232,.84);backdrop-filter:blur(18px);border-bottom:1px solid rgba(23,23,23,.08)}
    .topIn{height:72px;display:flex;align-items:center;gap:16px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-family:var(--display);letter-spacing:-.04em;font-size:20px;white-space:nowrap}
    .mark{width:38px;height:38px;border-radius:14px;background:var(--ink);color:var(--lime);display:grid;place-items:center;font-weight:900;box-shadow:5px 5px 0 var(--blue);transform:rotate(-3deg)}
    .nav{display:flex;align-items:center;gap:4px;margin-left:18px}
    .nav button{padding:10px 13px;border-radius:999px;font-size:13px;font-weight:800;color:var(--muted)}
    .nav button:hover,.nav button.on{background:var(--ink);color:var(--soft)}
    .topActions{margin-left:auto;display:flex;align-items:center;gap:8px}
    .iconBtn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:2px solid var(--ink);background:var(--paper);box-shadow:4px 4px 0 var(--ink);border-radius:999px;font-weight:900;font-size:13px;padding:10px 16px;transition:.15s}
    .iconBtn{width:42px;height:42px;padding:0}
    .btn:hover,.iconBtn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
    .btn:active,.iconBtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
    .btn.blue{background:var(--blue);color:white}.btn.lime{background:var(--lime)}.btn.pink{background:var(--pink);color:white}.btn.ghost{background:transparent;box-shadow:none;border-color:var(--line2);color:var(--muted)}
    .rolePill{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:var(--lime);border:2px solid var(--ink);border-radius:999px;padding:7px 10px}

    /* MOBILE */
    .hamb{display:none}.mobileNav{display:none}.bottomNav{display:none}

    /* HERO */
    .hero{padding:44px 0 28px}
    .heroGrid{display:grid;grid-template-columns:1.08fr .92fr;gap:26px;align-items:stretch}
    .heroCard{position:relative;border:2px solid var(--ink);border-radius:36px;background:var(--paper);padding:38px;box-shadow:var(--shadow2);overflow:hidden}
    .heroCard:before{content:"POSLOVI / KANDIDATI / FIRME";position:absolute;right:-55px;top:22px;transform:rotate(12deg);font-size:12px;font-weight:900;letter-spacing:.18em;color:rgba(23,23,23,.08);white-space:nowrap}
    .kicker{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--ink);background:var(--lime);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;margin-bottom:18px;box-shadow:3px 3px 0 var(--ink)}
    h1{font-family:var(--display);font-size:clamp(42px,7vw,82px);line-height:.92;letter-spacing:-.07em;margin-bottom:18px}
    .gradText{background:linear-gradient(90deg,var(--blue),var(--pink),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
    .lead{font-size:17px;color:var(--muted);max-width:680px;line-height:1.75;margin-bottom:24px}
    .searchBox{background:var(--ink);border:2px solid var(--ink);border-radius:26px;padding:12px;box-shadow:8px 8px 0 var(--blue);display:grid;grid-template-columns:1.3fr .8fr .8fr auto;gap:8px;margin-top:22px}
    .searchBox input,.searchBox select{background:var(--paper);border-radius:16px;padding:14px 15px;font-weight:700;color:var(--ink);min-width:0}
    .searchBox button{border-radius:16px;box-shadow:none;background:var(--lime);border:0;padding:0 20px;color:var(--ink);font-weight:950}
    .heroSide{display:grid;gap:14px}
    .statMosaic{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1}
    .stat{border:2px solid var(--ink);border-radius:28px;background:var(--paper);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .stat:nth-child(2){background:var(--blue);color:white}.stat:nth-child(3){background:var(--lime)}.stat:nth-child(4){background:var(--pink);color:white}
    .stat b{display:block;font-family:var(--display);font-size:42px;line-height:1;letter-spacing:-.08em}.stat span{font-size:11px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;opacity:.72}
    .notice{border:2px dashed var(--ink);border-radius:26px;background:rgba(255,255,255,.45);padding:18px;font-weight:750;color:var(--muted)}

    /* GENERAL */
    .section{padding:30px 0}.sectionHead{display:flex;justify-content:space-between;gap:14px;align-items:flex-end;margin-bottom:16px}
    h2{font-family:var(--display);font-size:34px;letter-spacing:-.055em;line-height:1}.sub{color:var(--muted);font-weight:650;margin-top:7px}
    .grid{display:grid;gap:14px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}.grid4{grid-template-columns:repeat(4,1fr)}
    .card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r2);padding:22px;box-shadow:var(--shadow)}
    .miniTitle{font-size:11px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1.8px solid var(--ink);font-size:11px;font-weight:950;background:var(--paper);white-space:nowrap}.badge.blue{background:var(--blue);color:white}.badge.lime{background:var(--lime)}.badge.pink{background:var(--pink);color:white}.badge.green{background:var(--green);color:white}.badge.red{background:var(--red);color:white}.badge.gray{border-color:var(--line2);color:var(--muted)}

    /* JOBS */
    .filters{display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr .8fr;gap:8px;margin-bottom:14px;background:var(--paper);border:2px solid var(--ink);border-radius:26px;padding:10px;box-shadow:var(--shadow)}
    .filters input,.filters select,.form input,.form select,.form textarea{width:100%;background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px 13px;font-weight:700;outline:none}
    .filters input:focus,.filters select:focus,.form input:focus,.form select:focus,.form textarea:focus{border-color:var(--blue)}
    .jobList{display:grid;gap:12px}.jobCard{background:var(--paper);border:2px solid var(--ink);border-radius:28px;padding:18px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;transition:.15s}
    .jobCard:hover{transform:translateY(-2px);box-shadow:8px 8px 0 rgba(23,23,23,.13)}
    .logo{width:54px;height:54px;border:2px solid var(--ink);border-radius:18px;display:grid;place-items:center;font-weight:950;font-family:var(--display);background:var(--lime);box-shadow:4px 4px 0 var(--ink)}
    .jobTitle{font-family:var(--display);font-size:21px;font-weight:800;letter-spacing:-.04em;margin-bottom:3px}.meta{color:var(--muted);font-size:13px;font-weight:700}.jobDesc{color:var(--muted);margin:10px 0;line-height:1.65}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{border:1px solid var(--line2);background:#fff;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:850;color:var(--muted)}
    .jobSide{display:flex;flex-direction:column;align-items:flex-end;gap:8px;min-width:158px}.deadline{font-size:12px;color:var(--muted);font-weight:850;text-align:right}
    .featured{position:relative;background:linear-gradient(135deg,#fffdf8,#fff6d7)}.featured:before{content:"★ ISTAKNUTO";position:absolute;top:-11px;left:22px;background:var(--orange);border:2px solid var(--ink);padding:4px 10px;border-radius:999px;font-size:10px;font-weight:950}

    /* DETAIL PAGE */
    .detailLayout{display:grid;grid-template-columns:1fr 330px;gap:16px}.detailTitle{font-family:var(--display);font-size:46px;line-height:.98;letter-spacing:-.06em;margin-bottom:12px}.detailText{font-size:15px;color:var(--muted);line-height:1.8}.detailText ul{padding-left:20px;margin:12px 0}.stickyApply{position:sticky;top:90px}

    /* COMPANIES */

    .tableLike{display:grid;gap:8px}.row{display:grid;grid-template-columns:1.2fr .8fr .7fr auto;gap:10px;align-items:center;background:#fff;border:1.8px solid var(--line);border-radius:18px;padding:12px}.row b{font-weight:900}.row small{color:var(--muted);font-weight:750}
    .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}.kcol{min-width:220px;background:rgba(255,255,255,.5);border:2px solid var(--ink);border-radius:24px;padding:12px}.kcol h4{font-family:var(--display);font-size:15px;margin-bottom:10px}.kcard{background:var(--paper);border:1.8px solid var(--line2);border-radius:18px;padding:12px;margin-bottom:8px}.kcard b{display:block;margin-bottom:2px}.kcard small{color:var(--muted);font-weight:750}.kcard .btn{padding:7px 9px;font-size:11px;margin-top:8px;box-shadow:none;border-width:1.8px}

    /* FORMS / MODAL */
    .form{display:grid;gap:10px}.label{font-size:11px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}.form textarea{min-height:120px;resize:vertical}.counter{font-size:11px;color:var(--muted);font-weight:850;text-align:right;margin-top:3px}.upload{border:2px dashed var(--ink);border-radius:22px;padding:16px;background:rgba(200,255,61,.16);font-weight:850;color:var(--muted)}

    .toast{position:fixed;top:88px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:120;background:var(--ink);color:white;border-radius:999px;padding:12px 18px;font-weight:900;opacity:0;transition:.2s;box-shadow:var(--shadow2);max-width:calc(100vw - 24px);text-align:center}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    .footer{margin-top:36px;background:var(--ink);color:white;border-radius:36px 36px 0 0;padding:34px 0}.footGrid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:22px}.footer h4{font-family:var(--display);font-size:18px;margin-bottom:10px}.footer a,.footer p{display:block;color:rgba(255,255,255,.62);font-weight:700;margin:7px 0}.footer a:hover{color:white}

    @media(max-width:900px){
      .nav{display:none}.hamb{display:inline-flex}.topIn{height:64px}.rolePill{display:none}.heroGrid,.detailLayout,.appShell,.grid2,.grid3,.grid4{grid-template-columns:1fr}.heroCard{padding:26px;border-radius:28px}.searchBox,.filters{grid-template-columns:1fr}.statMosaic{grid-template-columns:1fr 1fr}.jobCard{grid-template-columns:auto 1fr}.jobSide{grid-column:1/-1;align-items:stretch}.deadline{text-align:left}.side{display:none}.bottomNav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(245,241,232,.9);backdrop-filter:blur(18px);border-top:1px solid rgba(23,23,23,.12);padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px}.bottomNav button{flex:1;border-radius:18px;padding:8px 4px;font-size:10px;font-weight:950;color:var(--muted)}.bottomNav button.on{background:var(--ink);color:white}.contentPad{padding-bottom:72px}.mobileNav.open{display:grid;position:absolute;left:16px;right:16px;top:70px;background:var(--paper);border:2px solid var(--ink);box-shadow:6px 6px 0 var(--ink);border-radius:24px;padding:10px;gap:6px}.mobileNav button{text-align:left;padding:12px;border-radius:16px;font-weight:900}.footGrid{grid-template-columns:1fr 1fr}.toast{top:76px}
    }
    @media(max-width:560px){.wrap{width:min(100% - 22px,1180px)}h1{font-size:43px}.hero{padding-top:24px}.heroCard{padding:22px}.statMosaic{grid-template-columns:1fr}.sectionHead{align-items:flex-start;flex-direction:column}.jobCard{grid-template-columns:1fr}.logo{width:48px;height:48px}.detailTitle{font-size:36px}.footGrid{grid-template-columns:1fr}.sheet{border-radius:28px;box-shadow:6px 6px 0 var(--ink)}}
  </style>
</head>

function company(id){return D.companies.find(c=>c.id===id)||D.companies[0]}

function jobCard(j){const c=company(j.cid);return `<article class="jobCard ${j.featured?'featured':''}"><button class="logo" onclick="openCompany(${c.id})">${esc(c.logo)}</button><div><div class="tags" style="margin-bottom:8px">${badge(j.cat,'blue')}${badge(j.type,'gray')}${badge(j.contract,'gray')}</div><button class="jobTitle" onclick="openJobPage(${j.id})">${esc(j.title)}</button><div class="meta"><button onclick="openCompany(${c.id})">${esc(j.co)}</button> · ${esc(j.city)} · Objavljeno ${j.posted}</div><p class="jobDesc">${esc(j.desc)}</p><div class="tags">${j.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div><div class="jobSide"><div class="deadline">Rok prijave<br><b style="color:var(--ink)">${j.deadline}</b></div><button class="btn blue" onclick="applyModal(${j.id})">Prijavi se</button><button class="btn ghost" onclick="openJobPage(${j.id})">Detalji</button></div></article>`}
function rPublicJobs(){

function salaryNum(s){const m=String(s).match(/\d+/g);return m?Math.max(...m.map(Number)):0}
function filterJobs(){let q=(document.getElementById('fQ')?.value||'').toLowerCase(),city=document.getElementById('fCity')?.value||'',cat=document.getElementById('fCat')?.value||'',sal=+(document.getElementById('fSalary')?.value||0),sort=document.getElementById('fSort')?.value||'new';let arr=activeJobs().filter(j=>(!q||(j.title+j.co+j.city+j.cat+j.desc+j.tags.join(' ')).toLowerCase().includes(q))&&(!city||j.city===city)&&(!cat||j.cat===cat)&&(!sal||salaryNum(j.salary)>=sal));if(sort==='popular')arr.sort((a,b)=>b.views-a.views);if(sort==='salary')arr.sort((a,b)=>salaryNum(b.salary)-salaryNum(a.salary));document.getElementById('resultCount').textContent=`Pronađeno ${arr.length}`;document.getElementById('jobsOut').innerHTML=arr.length?arr.map(jobCard).join(''):`<div class="card"><h2>Nema rezultata</h2><p class="sub">Promijeni filtere ili pogledaj sve oglase.</p></div>`}
function openJobPage(id){const j=D.jobs.find(x=>x.id===id),c=company(j.cid);D.mode='public';D.view='jobdetail';updateNav();root.innerHTML=`<section class="section"><div class="wrap"><button class="btn ghost" onclick="goPublic('jobs')">← Nazad na oglase</button><div style="height:14px"></div><div class="detailLayout"><article class="card"><div class="tags" style="margin-bottom:12px">${badge(j.cat,'blue')}${badge(j.type,'gray')}${j.featured?badge('Istaknuto','lime'):''}</div><h1 class="detailTitle">${esc(j.title)}</h1><p class="meta">${esc(j.co)} · ${esc(j.city)} · Objavljeno ${j.posted} · Rok ${j.deadline}</p><div style="height:18px"></div><div class="detailText"><p>${esc(j.desc)}</p><h3 style="font-family:var(--display);font-size:24px;margin-top:22px">Šta se traži</h3><ul>${j.req.map(r=>`<li>${esc(r)}</li>`).join('')}</ul><h3 style="font-family:var(--display);font-size:24px;margin-top:22px">O firmi</h3><p>${esc(c.desc)}</p></div><div class="sectionHead" style="margin-top:26px"><div><h2>Slični oglasi</h2><p class="sub">Ista kategorija ili grad.</p></div></div><div class="jobList">${D.jobs.filter(x=>x.id!==j.id&&(x.cat===j.cat||x.city===j.city)).slice(0,2).map(jobCard).join('')}</div></article><aside class="stickyApply card"><div class="logo">${esc(c.logo)}</div><h2 style="margin-top:14px">${esc(j.co)}</h2><p class="sub">${esc(c.city)} · ${esc(c.cat)}</p><div style="height:14px"></div><div class="grid"><div>${badge(j.salary,'lime')}</div><div>${badge(`${j.spots} mjesta`,'gray')}</div><div>${badge(`Rok ${j.deadline}`,'pink')}</div></div><div style="height:16px"></div><button class="btn blue" style="width:100%" onclick="applyModal(${j.id})">Prijavi se</button><button class="btn ghost" style="width:100%;margin-top:10px" onclick="shareJob(${j.id})">Podijeli oglas</button><button class="btn ghost" style="width:100%;margin-top:10px" onclick="openCompany(${c.id})">Profil firme</button></aside></div></div></section>${footer()}`;scrollTo(0,0)}

function applyModal(id){const j=D.jobs.find(x=>x.id===id),c=company(j.cid);showModal(`<div class="sheetTop"><div><h3>Prijava na oglas</h3><p class="sub">${esc(j.title)} · ${esc(j.co)}</p></div><button class="x" onclick="closeModal()">×</button></div><div class="form"><div class="grid grid2"><div><div class="label">Ime i prezime</div><input id="apName" value="${esc(D.cv.name)}"></div><div><div class="label">Email</div><input id="apEmail" value="${esc(D.cv.email)}"></div></div><div class="grid grid2"><div><div class="label">Telefon</div><input id="apPhone" value="${esc(D.cv.phone)}"></div><div><div class="label">Grad</div><input id="apCity" value="${esc(D.cv.city)}"></div></div><div><div class="label">CV upload</div><label class="upload"><input id="apCv" type="file" accept=".pdf,.doc,.docx,.odt" style="display:none" onchange="document.getElementById('fileName').textContent=this.files[0]?.name||'PDF, DOC, DOCX, ODT'">📎 <span id="fileName">PDF, DOC, DOCX, ODT</span></label></div><div><div class="label">Motivaciono pismo</div><textarea id="apLetter" maxlength="1200" oninput="document.getElementById('cnt').textContent=this.value.length+'/1200'" placeholder="Kratko napiši zašto si pravi izbor..."></textarea><div class="counter" id="cnt">0/1200</div></div><div class="card" style="box-shadow:none;border-radius:20px;padding:14px"><b>Prijava se šalje na email poslodavca:</b><br><span class="sub">${esc(c.email)}</span></div><button class="btn blue" onclick="submitApp(${j.id})">Pošalji prijavu</button></div>`)}

v><div class="dashStat"><b>${D.apps.length}</b><span>Prijave</span></div><div class="dashStat"><b>${D.orders.reduce((s,o)=>s+(o.status==='PAID'?o.amount:0),0)}€</b><span>Prihod</span></div></div><div style="height:16px"></div>${ordersHTML()}`)}
function candidatePreview(c){return `<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px"><div class="logo">${esc(c.avatar)}</div><div><h2 style="font-size:28px">${esc(c.name)}</h2><p class="sub">${esc(c.title)} · ${esc(c.city)}</p><div class="tags" style="margin-top:10px">${c.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div></div></div>`}
function rProfile(){appPage(`<div class="sectionHead"><div><h2>Moj CV</h2><p class="sub">Kandidat vidi kako profil izgleda firmama.</p></div><button class="btn blue" onclick="toast('CV sačuvan ✓')">Sačuvaj</button></div><div class="grid grid2"><div class="card form"><div><div class="label">Ime</div><input value="${esc(D.cv.name)}"></div><div><div class="label">Headline</div><input value="${esc(D.cv.headline)}"></div><div class="grid grid2"><div><div class="label">Telefon</div><input value="${esc(D.cv.phone)}"></div><div><div class="label">Grad</div><input value="${esc(D.cv.city)}"></div></div><div><div class="label">Bio</div><textarea>${esc(D.cv.bio)}</textarea></div><div><div class="label">Vještine</div><input value="${esc(D.cv.skills)}"></div><div><div class="label">Vidljivost</div><select><option>PUBLIC</option><option>COMPANIES</option><option>PRIVATE</option></select></div></div><div class="card"><div class="miniTitle">Kako firma vidi profil</div>${candidatePreview(D.candidates[0])}<p class="sub">${esc(D.cv.bio)}</p><div style="height:12px"></div>${badge('Kontakt vidljiv nakon unlock-a','lime')}</div></div>`)}
function rApps(){appPage(`<div class="sectionHead"><div><h2>Moje prijave</h2><p class="sub">Status prijave i poslati fajl.</p></div></div><div class="tableLike">${D.apps.map(a=>`<div class="row"><div><b>${esc(a.title)}</b><small>${esc(a.co)} · ${a.date}</small></div><div>${esc(a.phone)}<small>${esc(a.city)}</small></div><div>${badge(a.status,'blue')}</div><button class="btn ghost" onclick="toast('CV: ${esc(a.cv)}')">CV</button></div>`).join('')}</div>`)}
function rNotifs(){appPage(`<div class="sectionHead"><div><h2>Obavijesti</h2><p class="sub">Email/UI flow simulacija.</p></div><button class="btn ghost" onclick="D.notifs.forEach(n=>n.read=true);rNotifs();toast('Sve pročitano')">Sve pročitano</button></div><div class="grid">${D.notifs.map(n=>`<div class="card"><b>${n.read?'○':'●'} ${esc(n.text)}</b><p class="sub">${esc(n.time)}</p></div>`).join('')}</div>`)}
function rNewJob(){appPage(`<div class="sectionHead"><div><h2>Novi oglas</h2><p class="sub">Firma sama objavljuje. Admin kasnije može odobriti ili urediti.</p></div></div><div class="grid grid2"><div class="card form"><div><div class="label">Naziv pozicije</div><input id="njTitle" placeholder="npr. Event Coordinator"></div><div class="grid grid2"><div><div class="label">Grad</div><select id="njCity">${D.cities.map(c=>`<option>${c}</option>`).join('')}</select></div><div><div class="label">Kategorija</div><select id="njCat">${D.cats.map(c=>`<option>${c}</option>`).join('')}</select></div></div><div class="grid grid2"><div><div class="label">Tip ugovora</div><select id="njContract"><option>Stalni radni odnos</option><option>Ugovor o djelu</option><option>Studentski</option><option>Sezonski</option></select></div><div><div class="label">Broj mjesta</div><input id="njSpots" type="number" value="1"></div></div><div class="grid grid2"><div><div class="label">Plata</div><input id="njSalary" placeholder="800–1200€"></div><div><div class="label">Rok prijave</div><input id="njDeadline" type="date"></div></div><div><div class="label">Email za prijave</div><input id="njEmail" value="hr@eventpro.me"></div><div><div class="label">Opis oglasa</div><textarea id="njDesc"></textarea></div><button class="btn blue" onclick="createJob()">Objavi oglas</button></div><div class="card"><div class="miniTitle">Šta kandidat dobija</div><p class="sub">Detaljnu stranu oglasa, profil firme, rok prijave, share dugme i prijavni modal sa CV uploadom.</p></div></div>`)}
function createJob(){const title=document.getElementById('njTitle').value.trim();if(!title)return toast('Upiši naziv pozicije');D.jobs.unshift({id:Date.now(),slug:title.toLowerCase().replace(/\s+/g,'-'),title,co:'EventPro d.o.o.',cid:1,city:document.getElementById('njCity').value,cat:document.getElementById('njCat').value,sub:'',type:'Full-time',contract:document.getElementById('njContract').value,salary:document.getElementById('njSalary').value||'Po dogovoru',spots:+document.getElementById('njSpots').value||1,posted:new Date().toLocaleDateString('sr-ME'),deadline:document.getElementById('njDeadline').value||'15.05.2026',featured:false,views:0,desc:document.getElementById('njDesc').value||'Opis uskoro.',req:['Detalji u dogovoru sa poslodavcem'],tags:['Novo'],apps:0,status:'ACTIVE'});toast('Oglas objavljen ✓');goApp('myjobs')}
function rMyJobs(){appPage(`<div class="sectionHead"><div><h2>Moji oglasi</h2><p class="sub">Pregled i upravljanje oglasima firme.</p></div><button class="btn blue" onclick="goApp('newjob')">+ Novi oglas</button></div><div class="jobList">${D.jobs.filter(j=>j.cid===1).map(jobCard).join('')}</div>`)}
function rATS(){const statuses=['APPLIED','VIEWED','INTERVIEW','OFFER','HIRED'];appPage(`<div class="sectionHead"><div><h2>ATS aplikanti</h2><p class="sub">Pomjeri kandidata kroz faze selekcije.</p></div><button class="btn ghost" onclick="exportData('prijave')">Export prijava</button></div><div class="kanban">${statuses.map(s=>`<div class="kcol"><h4>${s}</h4>${D.candidates.filter(c=>c.status===s).map(c=>`<div class="kcard"><b>${esc(c.name)}</b><small>${esc(c.title)}</small><button class="btn ghost" onclick="moveCandidate(${c.id})">Dalje →</button></div>`).join('')||'<p class="sub">—</p>'}</div>`).join('')}</div>`)}
function moveCandidate(id){const s=['APPLIED','VIEWED','INTERVIEW','OFFER','HIRED'],c=D.candidates.find(x=>x.id===id);c.status=s[Math.min(s.length-1,s.indexOf(c.status)+1)];D.notifs.unshift({text:`Status promijenjen za kandidata ${c.name}: ${c.status}`,time:'Upravo',read:false});toast(c.name+' → '+c.status);rATS()}
function rCandidates(){appPage(`<div class="sectionHead"><div><h2>Baza kandidata</h2><p class="sub">Firma može pregledati profil i otključati kontakt.</p></div><span class="badge lime">${D.credits} kredita</span></div><div class="grid grid2">${D.candidates.map(c=>`<div class="card">${candidatePreview(c)}${c.unlocked?`<p><b>Email:</b> ${esc(c.email)}<br><b>Telefon:</b> ${esc(c.phone)}</p>`:'<p class="sub">Kontakt je zaključan.</p>'}<div style="height:12px"></div><button class="btn ${c.unlocked?'ghost':'blue'}" onclick="unlockCandidate(${c.id})">${c.unlocked?'Kontakt otključan':'Unlock kontakt'}</button></div>`).join('')}</div>`)}
function unlockCandidate(id){const c=D.candidates.find(x=>x.id===id);if(c.unlocked)return toast('Već otključano');if(D.credits<=0)return toast('Nema kredita');c.unlocked=true;D.credits--;toast('Otključan kontakt: '+c.name);rCandidates()}
function rBilling(){appPage(`<div class="sectionHead"><div><h2>Plan i uplate</h2><p class="sub">Bankovni flow sa admin potvrdom i kodom.</p></div></div><div class="grid grid3"><div class="card"><h2>Starter</h2><p class="sub">25€/mj · 10 kredita</p><button class="btn ghost" onclick="orderPlan('Starter',25)">Naruči</button></div><div class="card"><h2>Growth</h2><p class="sub">80€/mj · 50 kredita</p><button class="btn blue" onclick="orderPlan('Growth',80)">Naruči</button></div><div class="card"><h2>Pro</h2><p class="sub">200€/mj · 200 kredita</p><button class="btn pink" onclick="orderPlan('Pro',200)">Naruči</button></div></div><div style="height:16px"></div>${ordersHTML()}`)}
function orderPlan(plan,amount){const id='WH-2026-'+Math.floor(1000+Math.random()*9000);D.orders.unshift({id,co:'EventPro d.o.o.',plan,amount,status:'PENDING',date:new Date().toLocaleDateString('sr-ME'),code:''});showModal(`<div class="sheetTop"><div><h3>Narudžba kreirana</h3><p class="sub">Uplati i admin generiše kod.</p></div><button class="x" onclick="closeModal()">×</button></div><div class="card" style="box-shadow:none"><b>Primalac:</b> WorkingHub d.o.o.<br><b>IBAN:</b> ME25 5050 0000 1234 5678 90<br><b>Iznos:</b> ${amount},00 EUR<br><b>Poziv na broj:</b> ${id}</div><button class="btn blue" style="width:100%;margin-top:12px" onclick="closeModal();rBilling()">OK</button>`)}
function ordersHTML(){return `<div class="card"><div class="miniTitle">Narudžbine</div><div class="tableLike">${D.orders.map(o=>`<div class="row"><div><b>${esc(o.id)}</b><small>${esc(o.co)} · ${o.date}</small></div><div>${esc(o.plan)}<small>${o.amount}€</small></div><div>${badge(o.status,o.status==='PAID'?'green':'gray')}</div>${D.role==='admin'&&o.status==='PENDING'?`<button class="btn blue" onclick="confirmOrder('${o.id}')">Potvrdi</button>`:`<button class="btn ghost" onclick="toast('${esc(o.code||'Čeka kod')}')">Kod</button>`}</div>`).join('')}</div></div>`}
function confirmOrder(id){const o=D.orders.find(x=>x.id===id);o.status='PAID';o.code='WH-2026-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();toast('Kod generisan: '+o.code);rOrders()}
function rOrders(){appPage(`<div class="sectionHead"><div><h2>Uplate i kodovi</h2><p class="sub">Admin potvrđuje bankovne uplate.</p></div></div>${ordersHTML()}`)}
function rModeration(){appPage(`<div class="sectionHead"><div><h2>Moderacija oglasa</h2><p class="sub">Admin može urediti, odobriti i istaknuti oglase.</p></div><button class="btn ghost" onclick="exportData('oglasi')">Export oglasa</button></div><div class="jobList">${D.jobs.map(j=>`<div class="jobCard"><div class="logo">${company(j.cid).logo}</div><div><div class="jobTitle">${esc(j.title)}</div><p class="meta">${esc(j.co)} · ${j.status} · ${j.posted}</p></div><div class="jobSide"><button class="btn ghost" onclick="toast('Edit mode demo')">Uredi</button><button class="btn lime" onclick="jFeatured(${j.id})">Istakni</button></div></div>`).join('')}</div>`)}
function jFeatured(id){D.jobs.find(j=>j.id===id).featured=true;toast('Oglas istaknut');rModeration()}
function rUsers(){appPage(`<div class="sectionHead"><div><h2>Korisnici</h2><p class="sub">Lista kandidata i firmi sa filterima.</p></div><button class="btn ghost" onclick="exportData('korisnici')">Export korisnika</button></div><div class="grid grid2"><div class="card"><div class="miniTitle">Kandidati</div>${D.candidates.map(c=>`<p><b>${esc(c.name)}</b><br><span class="sub">${esc(c.city)} · ${esc(c.title)}</span></p><br>`).join('')}</div><div class="card"><div class="miniTitle">Firme</div>${D.companies.map(c=>`<p><b>${esc(c.name)}</b><br><span class="sub">${esc(c.city)} · ${esc(c.email)}</span></p><br>`).join('')}</div></div>`)}
function exportData(type){toast('Export simulacija: '+type+'.csv')}

updateNav();rHome();
</script>
</body>
</html>
