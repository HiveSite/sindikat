<!doctype html>
<html lang="sr-ME" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WorkingHub — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════ LIGHT THEME ═══════════════ */
    :root,[data-theme="light"]{
      --bg:#f5f1e8;--ink:#171717;--muted:#6d665f;--soft:#fffaf0;--paper:#fffdf8;
      --line:#ded5c6;--line2:#cabcaa;
      --blue:#2148ff;--lime:#c8ff3d;--pink:#ff4fa3;--orange:#ff8a2a;--green:#13b76d;--red:#e5484d;
      --shadow:0 16px 45px rgba(28,22,12,.12);--shadow2:0 28px 80px rgba(28,22,12,.18);
      --r:20px;--r2:30px;
    }

    /* ═══════════════ DARK THEME — proper palette ═══════════════ */
    [data-theme="dark"]{
      --bg:#111318;
      --ink:#e8e4dc;
      --muted:#8a8580;
      --soft:#1c1f26;
      --paper:#171a21;
      --line:#252830;
      --line2:#2e3140;
      --blue:#5b8aff;
      --lime:#aadd00;
      --pink:#ff6ab0;
      --orange:#f5903a;
      --green:#22c87a;
      --red:#f05252;
      --shadow:0 8px 32px rgba(0,0,0,.5);
      --shadow2:0 20px 60px rgba(0,0,0,.65);
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
      min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;
      transition:background .25s,color .25s;
    }
    body:before{
      content:"";position:fixed;inset:-20%;z-index:-2;
      background:radial-gradient(circle at 12% 8%,rgba(33,72,255,.11),transparent 26%),
                 radial-gradient(circle at 88% 12%,rgba(255,79,163,.08),transparent 26%),
                 radial-gradient(circle at 50% 95%,rgba(200,255,61,.12),transparent 30%);
    }
    [data-theme="dark"] body:before{opacity:.35}
    body:after{
      content:"";position:fixed;inset:0;z-index:-1;opacity:.15;
      background-image:linear-gradient(rgba(23,23,23,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(23,23,23,.06) 1px,transparent 1px);
      background-size:36px 36px;mask-image:linear-gradient(to bottom,#000,transparent 90%);
    }
    [data-theme="dark"] body:after{opacity:.04}
    button,input,select,textarea{font:inherit;color:inherit;border:none;background:none}
    button{cursor:pointer}a{color:inherit;text-decoration:none}
    .hidden{display:none!important}
    .wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}
    input[type="file"]{display:none}
    --display:'Space Grotesk',system-ui,sans-serif;

    /* ── TOP NAV ── */
    .top{
      position:sticky;top:0;z-index:40;
      background:rgba(245,241,232,.92);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(23,23,23,.08);
    }
    [data-theme="dark"] .top{background:rgba(17,19,24,.94);border-bottom-color:var(--line)}
    .topIn{height:66px;display:flex;align-items:center;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-family:'Space Grotesk',system-ui;letter-spacing:-.04em;font-size:19px;white-space:nowrap}
    .mark{
      width:34px;height:34px;border-radius:12px;background:var(--ink);color:var(--lime);
      display:grid;place-items:center;font-weight:900;font-size:13px;
      box-shadow:3px 3px 0 var(--blue);transform:rotate(-3deg);transition:.3s;flex-shrink:0;
    }
    .nav{display:flex;align-items:center;gap:3px;margin-left:14px}
    .nav button{padding:8px 11px;border-radius:999px;font-size:12px;font-weight:700;color:var(--muted);transition:.15s}
    .nav button:hover,.nav button.on{background:var(--ink);color:var(--soft)}
    .topActions{margin-left:auto;display:flex;align-items:center;gap:7px}
    .iconBtn,.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      border:2px solid var(--ink);background:var(--paper);box-shadow:3px 3px 0 var(--ink);
      border-radius:999px;font-weight:800;font-size:12px;padding:8px 14px;
      transition:.15s;cursor:pointer;white-space:nowrap;
    }
    .iconBtn{width:38px;height:38px;padding:0}
    .btn:hover,.iconBtn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
    .btn:active,.iconBtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
    .btn.blue{background:var(--blue);color:white;border-color:var(--blue)}
    .btn.blue:hover{background:color-mix(in srgb,var(--blue) 85%,black)}
    .btn.lime{background:var(--lime);color:#111;border-color:var(--lime)}
    .btn.pink{background:var(--pink);color:white;border-color:var(--pink)}
    .btn.green{background:var(--green);color:white;border-color:var(--green)}
    .btn.red{background:var(--red);color:white;border-color:var(--red)}
    .btn.ghost{background:transparent;box-shadow:none;border-color:var(--line2);color:var(--muted)}
    .btn.ghost:hover{border-color:var(--ink);color:var(--ink);transform:none;box-shadow:none}
    .btn.sm{padding:6px 11px;font-size:11px}
    .btn.xs{padding:4px 8px;font-size:10px;box-shadow:2px 2px 0 var(--ink)}
    .rolePill{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:var(--lime);color:#111;border:2px solid var(--ink);border-radius:999px;padding:5px 9px}
    .hamb{display:none}
    .mobileNav{display:none}
    .bottomNav{display:none}
    .themeBtn{font-size:16px;transition:.2s;width:36px;height:36px}
    .themeBtn:hover{transform:rotate(20deg)}

    /* ── HERO ── */
    .hero{padding:36px 0 24px}
    .heroGrid{display:grid;grid-template-columns:1.08fr .92fr;gap:22px;align-items:stretch}
    .heroCard{
      position:relative;border:2px solid var(--ink);border-radius:34px;
      background:var(--paper);padding:34px;box-shadow:var(--shadow2);overflow:hidden;
    }
    .heroCard:before{
      content:"POSLOVI / KANDIDATI / FIRME";position:absolute;right:-55px;top:18px;
      transform:rotate(12deg);font-size:11px;font-weight:900;letter-spacing:.18em;
      color:rgba(23,23,23,.05);white-space:nowrap;
    }
    [data-theme="dark"] .heroCard:before{color:rgba(255,255,255,.04)}
    .kicker{
      display:inline-flex;align-items:center;gap:6px;border:2px solid var(--ink);
      background:var(--lime);color:#111;border-radius:999px;padding:6px 11px;
      font-size:11px;font-weight:900;margin-bottom:14px;box-shadow:2px 2px 0 var(--ink);
    }
    h1{font-family:'Space Grotesk',system-ui;font-size:clamp(36px,6vw,72px);line-height:.93;letter-spacing:-.07em;margin-bottom:14px}
    .gradText{background:linear-gradient(90deg,var(--blue),var(--pink),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
    .lead{font-size:15px;color:var(--muted);max-width:680px;line-height:1.75;margin-bottom:20px}
    .searchBox{
      background:var(--ink);border:2px solid var(--ink);border-radius:22px;padding:9px;
      box-shadow:6px 6px 0 var(--blue);
      display:grid;grid-template-columns:1.3fr .8fr .8fr auto;gap:6px;margin-top:18px;
    }
    .searchBox input,.searchBox select{background:var(--paper);border-radius:12px;padding:12px 13px;font-weight:700;color:var(--ink);min-width:0}
    .searchBox button{border-radius:12px;box-shadow:none;background:var(--lime);border:0;padding:0 16px;color:#111;font-weight:950;font-size:12px}
    .heroSide{display:grid;gap:11px}
    .statMosaic{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .stat{border:2px solid var(--ink);border-radius:24px;background:var(--paper);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .stat:nth-child(2){background:var(--blue);color:white}
    .stat:nth-child(3){background:var(--lime);color:#111}
    .stat:nth-child(4){background:var(--pink);color:white}
    .stat b{display:block;font-family:'Space Grotesk',system-ui;font-size:38px;line-height:1;letter-spacing:-.08em}
    .stat span{font-size:10px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;opacity:.72}
    .notice{border:2px dashed var(--line2);border-radius:22px;background:rgba(255,255,255,.3);padding:14px;font-weight:700;color:var(--muted);font-size:12px}
    [data-theme="dark"] .notice{background:rgba(255,255,255,.04)}

    /* ── GENERAL ── */
    .section{padding:26px 0}
    .sectionHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:14px}
    h2{font-family:'Space Grotesk',system-ui;font-size:30px;letter-spacing:-.05em;line-height:1}
    .sub{color:var(--muted);font-weight:600;margin-top:5px;font-size:12px}
    .grid{display:grid;gap:11px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}.grid4{grid-template-columns:repeat(4,1fr)}
    .card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r2);padding:18px;box-shadow:var(--shadow)}
    .miniTitle{font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
    .badge{
      display:inline-flex;align-items:center;gap:4px;padding:4px 8px;
      border-radius:999px;border:1.5px solid var(--ink);font-size:10px;font-weight:900;
      background:var(--paper);white-space:nowrap;
    }
    .badge.blue{background:var(--blue);color:white;border-color:var(--blue)}
    .badge.lime{background:var(--lime);color:#111;border-color:color-mix(in srgb,var(--lime) 70%,black)}
    .badge.pink{background:var(--pink);color:white;border-color:var(--pink)}
    .badge.green{background:var(--green);color:white;border-color:var(--green)}
    .badge.red{background:var(--red);color:white;border-color:var(--red)}
    .badge.orange{background:var(--orange);color:white;border-color:var(--orange)}
    .badge.gray{border-color:var(--line2);color:var(--muted);background:transparent}
    .badge.purple{background:#7c3aed;color:white;border-color:#7c3aed}

    /* ── JOB CARDS ── */
    .filters{
      display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr .8fr;gap:6px;
      margin-bottom:12px;background:var(--paper);border:2px solid var(--ink);
      border-radius:22px;padding:8px;box-shadow:var(--shadow);
    }
    .filters input,.filters select,
    .form input,.form select,.form textarea{
      width:100%;background:var(--soft);border:2px solid var(--line);
      border-radius:12px;padding:10px 11px;font-weight:700;outline:none;color:var(--ink);
    }
    [data-theme="dark"] .filters input,[data-theme="dark"] .filters select,
    [data-theme="dark"] .form input,[data-theme="dark"] .form select,
    [data-theme="dark"] .form textarea{
      background:var(--soft);border-color:var(--line2);
    }
    .filters input:focus,.filters select:focus,
    .form input:focus,.form select:focus,.form textarea:focus{border-color:var(--blue)}
    .jobList{display:grid;gap:9px}
    .jobCard{
      background:var(--paper);border:2px solid var(--ink);border-radius:24px;
      padding:15px;box-shadow:var(--shadow);
      display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:start;transition:.15s;
    }
    .jobCard:hover{transform:translateY(-2px);box-shadow:6px 6px 0 rgba(23,23,23,.14)}
    [data-theme="dark"] .jobCard:hover{box-shadow:6px 6px 0 rgba(91,138,255,.2)}
    .logo{
      width:50px;height:50px;border:2px solid var(--ink);border-radius:15px;
      display:grid;place-items:center;font-weight:950;font-family:'Space Grotesk',system-ui;
      background:var(--lime);box-shadow:3px 3px 0 var(--ink);flex-shrink:0;overflow:hidden;
    }
    .logo img{width:100%;height:100%;object-fit:cover;border-radius:13px}
    .jobTitle{
      font-family:'Space Grotesk',system-ui;font-size:18px;font-weight:800;
      letter-spacing:-.03em;margin-bottom:3px;display:block;text-align:left;cursor:pointer;
    }
    .jobTitle:hover{color:var(--blue);text-decoration:underline}
    .meta{color:var(--muted);font-size:11px;font-weight:700}
    .jobDesc{color:var(--muted);margin:8px 0;line-height:1.65;font-size:12px}
    .tags{display:flex;gap:5px;flex-wrap:wrap}
    .tag{
      border:1px solid var(--line2);background:var(--soft);border-radius:999px;
      padding:3px 8px;font-size:10px;font-weight:800;color:var(--muted);
    }
    .jobSide{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:140px}
    .deadline{font-size:10px;color:var(--muted);font-weight:800;text-align:right}
    .featured{background:linear-gradient(135deg,var(--paper),color-mix(in srgb,var(--lime) 12%,var(--paper)))}
    .featured:before{
      content:"★ ISTAKNUTO";position:absolute;top:-10px;left:18px;
      background:var(--orange);border:2px solid var(--ink);padding:3px 8px;
      border-radius:999px;font-size:9px;font-weight:950;color:white;
    }
    .featured{position:relative;overflow:visible}

    /* ── DETAIL ── */
    .detailLayout{display:grid;grid-template-columns:1fr 300px;gap:13px}
    .detailTitle{font-family:'Space Grotesk',system-ui;font-size:40px;line-height:.98;letter-spacing:-.06em;margin-bottom:9px}
    .detailText{font-size:14px;color:var(--muted);line-height:1.8}
    .detailText ul{padding-left:18px;margin:9px 0}
    .stickyApply{position:sticky;top:82px}

    /* ── COMPANY CARDS ── */
    .companyCard{display:flex;gap:13px;align-items:flex-start;background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:15px;box-shadow:var(--shadow)}
    .companyCard h3{font-family:'Space Grotesk',system-ui;font-size:19px;letter-spacing:-.04em;margin-bottom:3px}
    .companyCard p{color:var(--muted);line-height:1.65;margin:6px 0;font-size:12px}

    /* ── APP SHELL ── */
    .appShell{display:grid;grid-template-columns:232px 1fr;gap:15px;padding:15px 0 38px}
    .side{
      position:sticky;top:82px;align-self:start;
      background:var(--ink);color:var(--soft);border-radius:26px;padding:11px;
      box-shadow:var(--shadow2);
    }
    [data-theme="dark"] .side{background:#1e2130;border:1.5px solid var(--line2)}
    .sideHead{padding:9px 9px 11px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:7px}
    .sideAvatar{
      width:42px;height:42px;border-radius:13px;border:2px solid rgba(255,255,255,.18);
      display:grid;place-items:center;font-weight:900;font-family:'Space Grotesk',system-ui;
      background:var(--lime);color:#111;overflow:hidden;margin-bottom:7px;
    }
    .sideAvatar img{width:100%;height:100%;object-fit:cover}
    .sideHead b{font-family:'Space Grotesk',system-ui;font-size:16px;display:block}
    .sideHead small{display:block;color:rgba(255,255,255,.45);margin-top:2px;font-size:10px}
    [data-theme="dark"] .sideHead small{color:var(--muted)}
    .side button{
      display:flex;width:100%;align-items:center;gap:7px;padding:10px 9px;
      border-radius:14px;color:rgba(255,255,255,.6);font-weight:700;text-align:left;
      font-size:12px;transition:.15s;
    }
    [data-theme="dark"] .side button{color:var(--muted)}
    .side button:hover,.side button.on{background:rgba(255,255,255,.1);color:white}
    [data-theme="dark"] .side button:hover,[data-theme="dark"] .side button.on{color:var(--ink)}
    .side button.on{background:var(--lime)!important;color:#111!important;font-weight:900}

    /* ── STAT GRID — 2x2 on mobile ── */
    .dashStat{background:var(--paper);border:2px solid var(--ink);border-radius:22px;padding:16px;box-shadow:var(--shadow)}
    .dashStat b{font-family:'Space Grotesk',system-ui;font-size:30px;line-height:1}
    .dashStat span{display:block;font-size:9px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .statGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}

    /* ── ATS ── */
    /* Desktop: side-by-side kanban + detail panel */
    .atsPageLayout{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start}
    .atsKanbanWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .kanban{display:flex;gap:9px;min-width:max-content;padding-bottom:4px}
    .kcol{
      width:220px;background:var(--soft);border:2px solid var(--ink);
      border-radius:20px;padding:9px;flex-shrink:0;
    }
    [data-theme="dark"] .kcol{background:rgba(255,255,255,.03);border-color:var(--line2)}
    .kcolHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding:2px 3px}
    .kcolHead h4{font-family:'Space Grotesk',system-ui;font-size:12px;font-weight:700}
    .kcolCount{background:var(--ink);color:var(--soft);border-radius:999px;font-size:9px;font-weight:900;padding:2px 6px}
    .kcard{
      background:var(--paper);border:1.5px solid var(--line2);border-radius:14px;
      padding:11px;margin-bottom:7px;cursor:pointer;transition:.15s;
    }
    .kcard:hover{border-color:var(--blue);box-shadow:2px 2px 0 var(--blue)}
    .kcard.selected{border-color:var(--blue);box-shadow:0 0 0 2px color-mix(in srgb,var(--blue) 30%,transparent)}
    .kcardTop{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .kcardAv{
      width:32px;height:32px;border-radius:9px;border:1.5px solid var(--ink);
      display:grid;place-items:center;font-weight:900;font-family:'Space Grotesk',system-ui;
      font-size:12px;flex-shrink:0;overflow:hidden;
    }
    .kcardAv img{width:100%;height:100%;object-fit:cover}
    .kcardName{font-weight:800;font-size:12px;margin-bottom:1px}
    .kcardSub{font-size:10px;color:var(--muted)}
    .kcardMeta{font-size:10px;color:var(--muted);margin-bottom:7px}
    .kcardLabels{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
    .kcardLabel{font-size:8px;font-weight:900;padding:2px 6px;border-radius:999px;border:1.5px solid currentColor}
    .kcardLastComment{font-size:10px;color:var(--muted);border-top:1px solid var(--line);margin-top:7px;padding-top:6px;font-style:italic;line-height:1.4}
    .kcardActions{display:flex;gap:4px}
    .kcardActions button{
      flex:1;padding:4px 5px;border-radius:8px;font-size:9px;font-weight:800;
      border:1.5px solid var(--line2);background:var(--soft);transition:.12s;color:var(--ink);
    }
    .kcardActions button.fwd{background:var(--blue);color:white;border-color:var(--blue)}
    .kcardActions button:disabled{opacity:.3;cursor:not-allowed}
    .kcardActions button:not(:disabled):hover{transform:translateY(-1px)}

    /* ATS Detail Panel */
    .atsDetail{
      background:var(--paper);border:2px solid var(--ink);border-radius:22px;
      padding:16px;position:sticky;top:82px;max-height:calc(100vh - 120px);overflow-y:auto;
    }
    .atsDetailEmpty{text-align:center;padding:36px 18px;color:var(--muted)}
    .atsDetailEmpty .ei{font-size:34px;margin-bottom:10px}
    .candDetailHead{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
    .candDetailAv{
      width:54px;height:54px;border-radius:15px;border:2px solid var(--ink);
      display:grid;place-items:center;font-weight:900;font-family:'Space Grotesk',system-ui;
      font-size:19px;flex-shrink:0;overflow:hidden;
    }
    .candDetailAv img{width:100%;height:100%;object-fit:cover}

    /* Comments */
    .commentsSection{margin-top:12px;border-top:1.5px solid var(--line);padding-top:11px}
    .commentItem{background:var(--soft);border-radius:11px;padding:8px 10px;margin-bottom:6px;font-size:11px;line-height:1.5}
    [data-theme="dark"] .commentItem{background:var(--line)}
    .commentMeta{font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    .commentItem.candidate-side{border-left:3px solid var(--blue)}
    .commentItem.company-side{border-left:3px solid var(--orange)}
    .commentForm{display:flex;gap:6px;margin-top:9px}
    .commentForm input{
      flex:1;background:var(--soft);border:1.5px solid var(--line2);
      border-radius:11px;padding:7px 10px;font-size:11px;color:var(--ink);outline:none;
    }
    .commentForm input:focus{border-color:var(--blue)}
    [data-theme="dark"] .commentForm input{background:var(--line)}

    /* Label picker */
    .labelPicker{display:flex;gap:4px;flex-wrap:wrap;margin:9px 0}
    .labelOpt{font-size:9px;font-weight:900;padding:3px 8px;border-radius:999px;border:1.5px solid currentColor;cursor:pointer;opacity:.45;transition:.15s}
    .labelOpt.active{opacity:1}
    .labelOpt:hover{opacity:.85}

    /* ATS Mobile — card list instead of kanban */
    .atsMobileList{display:none}
    .atsMobileCard{
      background:var(--paper);border:2px solid var(--ink);border-radius:20px;
      padding:13px;margin-bottom:9px;
    }
    .atsMobileCardHead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .atsMobileCardActions{display:flex;gap:7px;flex-wrap:wrap}

    /* ── PROFILE ── */
    .profLayout{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .profPreview{background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
    .profPreviewHead{display:flex;gap:13px;align-items:flex-start;margin-bottom:13px}
    .profAvLarge{
      width:68px;height:68px;border-radius:19px;border:2px solid var(--ink);
      display:grid;place-items:center;font-weight:900;font-family:'Space Grotesk',system-ui;
      font-size:24px;background:var(--lime);flex-shrink:0;overflow:hidden;cursor:pointer;position:relative;
    }
    .profAvLarge img{width:100%;height:100%;object-fit:cover}
    .profAvLarge:hover:after{content:"📷";position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.45);border-radius:17px;font-size:20px}
    .pbar{height:7px;background:var(--line);border-radius:999px;margin-top:9px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px;transition:width .4s}
    .visNote{font-size:10px;color:var(--muted);line-height:1.55;margin-top:5px;padding:7px 10px;background:var(--soft);border-radius:10px;border:1px solid var(--line)}

    /* ── ORDERS / BILLING ── */
    .bkBox{background:var(--soft);border:1.5px solid var(--line2);border-radius:14px;padding:12px;font-family:monospace;font-size:11px;line-height:2.2;margin:11px 0}
    .planCard{background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:17px;box-shadow:var(--shadow);transition:.15s}
    .planCard:hover{transform:translateY(-2px);box-shadow:6px 6px 0 var(--ink)}
    .planCard.active{background:var(--blue);color:white;border-color:var(--blue)}
    .planCard.active .sub{color:rgba(255,255,255,.7)}
    .planPrice{font-family:'Space Grotesk',system-ui;font-size:36px;font-weight:900;letter-spacing:-.06em;margin:9px 0}
    .planFeat{list-style:none;font-size:11px;color:var(--muted);display:grid;gap:4px;margin-bottom:13px}
    .planFeat li:before{content:"✓ ";color:var(--green);font-weight:900}
    .planCard.active .planFeat{color:rgba(255,255,255,.7)}
    .tableLike{display:grid;gap:6px}
    .row{display:grid;grid-template-columns:1.2fr .8fr .7fr auto;gap:8px;align-items:center;background:var(--soft);border:1.5px solid var(--line);border-radius:14px;padding:10px}
    .row b{font-weight:900;font-size:12px}
    .row small{color:var(--muted);font-weight:700;display:block;font-size:10px}

    /* ── MODAL ── */
    .modal{
      position:fixed;inset:0;z-index:80;
      background:rgba(23,23,23,.55);backdrop-filter:blur(8px);
      display:none;align-items:center;justify-content:center;padding:14px;
    }
    [data-theme="dark"] .modal{background:rgba(0,0,0,.72)}
    .modal.open{display:flex}
    .sheet{
      background:var(--paper);border:2px solid var(--ink);border-radius:28px;
      padding:19px;box-shadow:8px 8px 0 var(--ink);
      width:min(580px,100%);max-height:90vh;overflow-y:auto;
    }
    .sheetTop{display:flex;justify-content:space-between;gap:11px;margin-bottom:13px}
    .sheet h3{font-family:'Space Grotesk',system-ui;font-size:22px;letter-spacing:-.04em}
    .x{width:34px;height:34px;border:2px solid var(--ink);border-radius:999px;background:var(--pink);color:white;font-weight:950;display:grid;place-items:center;flex-shrink:0;font-size:15px}
    .form{display:grid;gap:9px}
    .label{font-size:9px;font-weight:950;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .form textarea{min-height:95px;resize:vertical}
    .counter{font-size:10px;color:var(--muted);font-weight:800;text-align:right;margin-top:2px}
    .upload{
      border:2px dashed var(--line2);border-radius:16px;padding:13px;
      background:color-mix(in srgb,var(--lime) 8%,var(--paper));

    }
    .upload:hover{border-color:var(--blue)}
    .sendNote{background:var(--soft);border:1.5px solid var(--line2);border-radius:12px;padding:11px;font-size:11px;color:var(--muted);line-height:1.6}

    /* ── TOAST ── */
    .toast{
      position:fixed;top:84px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:120;
      background:var(--ink);color:var(--soft);border-radius:999px;padding:10px 16px;
      font-weight:900;opacity:0;transition:.2s;box-shadow:var(--shadow2);
      max-width:calc(100vw - 24px);text-align:center;font-size:12px;pointer-events:none;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── FOOTER ── */
    .footer{margin-top:32px;background:var(--ink);color:var(--soft);border-radius:32px 32px 0 0;padding:28px 0}
    [data-theme="dark"] .footer{background:#0d0f14;border-top:1.5px solid var(--line2)}
    .footGrid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:18px}
    .footer h4{font-family:'Space Grotesk',system-ui;font-size:16px;margin-bottom:8px}
    .footer a,.footer p{display:block;color:rgba(255,255,255,.5);font-weight:700;margin:5px 0;font-size:12px;cursor:pointer}
    .footer a:hover{color:white}

    /* ── RESPONSIVE ── */
    @media(max-width:960px){
      .nav{display:none}.hamb{display:inline-flex}
      .topIn{height:60px}.rolePill{display:none}
      .heroGrid,.detailLayout,.appShell,.grid2,.grid3,.grid4,.profLayout{grid-template-columns:1fr}
      .heroCard{padding:22px;border-radius:26px}
      .searchBox,.filters{grid-template-columns:1fr}
      .statMosaic{grid-template-columns:1fr 1fr}
      .jobCard{grid-template-columns:auto 1fr}
      .jobSide{grid-column:1/-1;align-items:stretch;flex-direction:row;flex-wrap:wrap}
      .deadline{text-align:left}
      .side{display:none}
      .atsDetail{position:static;max-height:none}
      .stickyApply{position:static}
      /* ATS: hide kanban on mobile, show card list */
      .atsPageLayout{grid-template-columns:1fr}
      .atsKanbanWrap{display:none}
      .atsMobileList{display:block}
      .bottomNav{
        display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;
        background:rgba(245,241,232,.94);backdrop-filter:blur(18px);
        border-top:1.5px solid rgba(23,23,23,.1);
        padding:5px 5px calc(5px + env(safe-area-inset-bottom));gap:3px;
      }
      [data-theme="dark"] .bottomNav{background:rgba(17,19,24,.97);border-top-color:var(--line)}
      .bottomNav button{flex:1;border-radius:14px;padding:6px 2px;font-size:9px;font-weight:950;color:var(--muted)}
      .bottomNav button.on{background:var(--ink);color:var(--soft)}
      .contentPad{padding-bottom:68px}
      .mobileNav.open{
        display:grid;position:absolute;left:11px;right:11px;top:64px;
        background:var(--paper);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);
        border-radius:20px;padding:7px;gap:3px;z-index:50;
      }
      .mobileNav button{text-align:left;padding:10px;border-radius:13px;font-weight:800;font-size:12px}
      .mobileNav button:hover{background:var(--soft)}
      .footGrid{grid-template-columns:1fr 1fr}
      /* 2x2 stat grid on mobile */
      .statGrid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:560px){
      .wrap{width:calc(100% - 18px)}
      h1{font-size:38px}
      .hero{padding-top:18px}
      .heroCard{padding:18px}
      .statMosaic{grid-template-columns:1fr}
      .sectionHead{align-items:flex-start;flex-direction:column}
      .jobCard{grid-template-columns:1fr}
      .logo{width:44px;height:44px}
      .detailTitle{font-size:32px}
      .footGrid{grid-template-columns:1fr}
      .sheet{border-radius:24px;box-shadow:4px 4px 0 var(--ink)}
      .kcol{width:200px}
      .statGrid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('on');clearTimeout(window.__t);window.__t=setTimeout(()=>el.classList.remove('on'),2800)}
function badge(t,c='gray'){return`<span class="badge ${c}">${esc(t)}</span>`}
function company(id){return D.companies.find(c=>c.id===id)||D.companies[0]}
function activeJobs(){return D.jobs.filter(j=>j.status==='ACTIVE')}

function candAv(c,size=32,cls='kcardAv'){const img=c.avatarImg?`<img src="${c.avatarImg}" alt="">`:`<span style="font-size:${Math.round(size*.38)}px;font-family:'Space Grotesk',system-ui">${esc(c.avatar)}</span>`;return`<div class="${cls}" style="background:${c.color};color:${c.colorText};width:${size}px;height:${size}px">${img}</div>`}

function toggleTheme(){
  D.theme=D.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',D.theme);
  document.getElementById('themeIcon').textContent=D.theme==='dark'?'☀️':'🌙';
}

function updateNav(){
  const nav=D.mode==='public'?NAV_PUBLIC:(NAV_ROLE[D.role]||[]);

  document.getElementById('mobileNav').innerHTML=nav.map(([v,l])=>`<button onclick="toggleMobileNav(false);${D.mode==='public'?`goPublic('${v}')`:`goApp('${v}')`}">${l}</button>`).join('');
  document.getElementById('rolePill').textContent=D.mode==='public'?'JAVNO':D.role.toUpperCase();
  document.getElementById('loginBtn').textContent=D.mode==='public'?'Login':'Logout';
  document.getElementById('loginBtn').onclick=D.mode==='public'?openLogin:logout;

  document.getElementById('bottomNav').innerHTML=botNav.map(([v,l])=>`<button class="${D.view===v?'on':''}" onclick="goApp('${v}')">${l}</button>`).join('');
}

/* ══ PUBLIC JOBS ══ */
function rPublicJobs(){
  const q=sessionStorage.q||'',city=sessionStorage.city||'',cat=sessionStorage.cat||'';sessionStorage.clear();
  root.innerHTML=`<section class="section"><div class="wrap"><div class="sectionHead"><div><h2>Svi oglasi</h2><p class="sub">Pretraga je javna — login nije potreban.</p></div><span class="badge lime" id="resultCount"></span></div><div class="filters"><input id="fQ" placeholder="Pretraga..." value="${esc(q)}" oninput="filterJobs()"><select id="fCity" onchange="filterJobs()"><option value="">Svi gradovi</option>${D.cities.map(c=>`<option ${c===city?'selected':''}>${c}</option>`).join('')}</select><select id="fCat" onchange="filterJobs()"><option value="">Sve kategorije</option>${D.cats.map(c=>`<option ${c===cat?'selected':''}>${c}</option>`).join('')}</select><select id="fSalary" onchange="filterJobs()"><option value="">Svaka plata</option><option value="600">600€+</option><option value="800">800€+</option><option value="1000">1000€+</option></select><select id="fSort" onchange="filterJobs()"><option value="new">Najnoviji</option><option value="popular">Najpopularniji</option></select></div><div class="jobList" id="jobsOut"></div></div></section>${footer()}`;
  filterJobs();
}
function salaryNum(s){const m=String(s).match(/\d+/g);return m?Math.max(...m.map(Number)):0}
function filterJobs(){
  let q=(document.getElementById('fQ')?.value||'').toLowerCase(),city=document.getElementById('fCity')?.value||'',cat=document.getElementById('fCat')?.value||'',sal=+(document.getElementById('fSalary')?.value||0),sort=document.getElementById('fSort')?.value||'new';
  let arr=activeJobs().filter(j=>(!q||(j.title+j.co+j.city+j.cat+j.desc+j.tags.join(' ')).toLowerCase().includes(q))&&(!city||j.city===city)&&(!cat||j.cat===cat)&&(!sal||salaryNum(j.salary)>=sal));
  if(sort==='popular')arr.sort((a,b)=>b.views-a.views);
  const cnt=document.getElementById('resultCount');if(cnt)cnt.textContent=`Pronađeno ${arr.length}`;
  const out=document.getElementById('jobsOut');if(out)out.innerHTML=arr.length?arr.map(jobCard).join(''):`<div class="card"><h2>Nema rezultata</h2><p class="sub">Promijeni filtere.</p></div>`;
}

/* ══ APPLY MODAL ══ */
function applyModal(id){
  const j=D.jobs.find(x=>x.id===id),c=company(j.cid);
  showModal(`<div class="sheetTop"><div><h3>Prijava na oglas</h3><p class="sub">${esc(j.title)} · ${esc(j.co)}</p></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="form">
    <div class="grid grid2">
      <div><div class="label">Ime i prezime *</div><input id="apName" value="${esc(D.cv.name)}"></div>
      <div><div class="label">Email *</div><input id="apEmail" type="email" value="${esc(D.cv.email)}"></div>
    </div>
    <div class="grid grid2">
      <div><div class="label">Telefon *</div><input id="apPhone" value="${esc(D.cv.phone)}"></div>
      <div><div class="label">Grad *</div><input id="apCity" value="${esc(D.cv.city)}"></div>
    </div>
    <div><div class="label">CV (PDF, DOC, DOCX) *</div>
      <label class="upload" for="apCvFile">📎 <span id="cvFN">Klikni ili prevuci CV fajl</span>
        <input type="file" id="apCvFile" accept=".pdf,.doc,.docx,.odt" onchange="document.getElementById('cvFN').textContent=this.files[0]?.name||'Klikni ili prevuci CV fajl'">
      </label>
    </div>
    <div><div class="label">Motivaciono pismo *</div>
      <textarea id="apLetter" maxlength="1200" oninput="document.getElementById('apCnt').textContent=this.value.length+'/1200'" placeholder="Kratko napiši zašto si pravi izbor..."></textarea>
      <div class="counter" id="apCnt">0/1200</div>
    </div>
    <div class="sendNote">📧 Prijava ide na: <strong>${esc(c.email)}</strong><br><span style="font-size:10px">Potvrda stiže i na tvoj email odmah.</span></div>
    <button class="btn blue" onclick="submitApp(${j.id})">Pošalji prijavu →</button>
  </div>`);
}
function submitApp(id){
  const name=document.getElementById('apName')?.value.trim(),email=document.getElementById('apEmail')?.value.trim();
  const phone=document.getElementById('apPhone')?.value.trim(),city=document.getElementById('apCity')?.value.trim();
  const letter=document.getElementById('apLetter')?.value.trim();
  if(!name||!email||!phone||!city){toast('⚠️ Popuni sva obavezna polja');return}
  if(!letter){toast('⚠️ Upiši motivaciono pismo');return}
  const file=document.getElementById('apCvFile')?.files[0]?.name||'CV_demo.pdf';
  const j=D.jobs.find(x=>x.id===id);
  const ref='WH-APP-'+Math.floor(10000+Math.random()*90000);
  D.apps.unshift({jid:id,title:j.title,co:j.co,status:'APPLIED',date:new Date().toLocaleDateString('sr-ME'),phone,city,cv:file,ref,candidateLetter:letter,companyReply:''});
  j.apps++;
  D.notifs.unshift({text:`Prijava poslata za ${j.title}. Ref: ${ref}.`,time:'Upravo',read:false,type:'apply'});
  closeModal();toast(`✓ Prijava poslata! Ref: ${ref}`);
}

function rATS(){
  D.selectedCandidate=D.selectedCandidate||D.candidates[0];
  const sel=D.selectedCandidate;

  /* KANBAN HTML */
  const kanbanHTML=STATUS_ORDER.map(s=>{
    const cands=D.candidates.filter(c=>c.status===s);
    const cards=cands.map(c=>{
      const labs=c.labels.map(l=>{const lo=LABEL_OPTS.find(x=>x.key===l);return lo?`<span class="kcardLabel" style="color:${lo.color};border-color:${lo.color}">${esc(l)}</span>`:''}).join('');
      const lastComment=c.comments.length?c.comments[c.comments.length-1]:null;
      return`<div class="kcard${c.id===sel?.id?' selected':''}" onclick="selectCandidate(${c.id})">
        <div class="kcardTop">${candAv(c,32)}<div><div class="kcardName">${esc(c.name)}</div><div class="kcardSub">${esc(c.title)}</div></div></div>
        <div class="kcardMeta">📍 ${esc(c.city)} · 📎 ${esc(c.cv||'CV.pdf')}</div>
        ${labs?`<div class="kcardLabels">${labs}</div>`:''}
        ${lastComment?`<div class="kcardLastComment">💬 "${esc(lastComment.text)}"</div>`:''}
        <div class="kcardActions">
          <button onclick="event.stopPropagation();moveC(${c.id},'prev')" ${STATUS_ORDER.indexOf(s)===0?'disabled':''}>← Nazad</button>
          <button class="fwd" onclick="event.stopPropagation();moveC(${c.id},'next')" ${STATUS_ORDER.indexOf(s)===STATUS_ORDER.length-1?'disabled':''}>Dalje →</button>
        </div>
      </div>`;
    }).join('')||`<div style="text-align:center;padding:18px 10px;color:var(--muted);font-size:11px">—</div>`;
    return`<div class="kcol"><div class="kcolHead"><h4>${STATUS_LABELS[s]}</h4><span class="kcolCount">${cands.length}</span></div>${cards}</div>`;
  }).join('');

  const detailHTML=sel?`
    <div class="atsDetail">
      <div class="candDetailHead">
        ${candAv(sel,54,'candDetailAv')}
        <div style="flex:1">
          <div style="display:flex;align-items:start;justify-content:space-between;gap:8px">

              <p class="sub" style="font-size:11px">${esc(sel.title)} · ${esc(sel.city)}</p>

            <button class="btn blue xs" onclick="openCandidateProfile(${sel.id})">Profil</button>
          </div>
        </div>
      </div>

        ${badge(sel.status,STATUS_COLORS[sel.status]||'gray')}
        ${sel.unlocked?badge('Kontakt otključan','green'):badge('Zaključano','gray')}
        ${sel.public?badge('Javni profil','blue'):''}
      </div>

      <div class="tags" style="margin-bottom:11px">${sel.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>

      ${sel.unlocked?
        `<div style="background:var(--soft);border:1.5px solid var(--line2);border-radius:13px;padding:11px;font-size:12px;line-height:2.2;margin-bottom:11px">
          📧 <b>${esc(sel.email)}</b><br>📞 <b>${esc(sel.phone)}</b>
        </div>`
        :`<button class="btn blue sm" style="width:100%;margin-bottom:11px" onclick="unlockCandATS(${sel.id})">🔓 Unlock kontakt (1 kredit)</button>`
      }

      <button class="btn ghost sm" style="width:100%;margin-bottom:11px" onclick="toast('CV: ${esc(sel.cv||'CV.pdf')}')">📎 ${esc(sel.cv||'CV.pdf')}</button>

      ${sel.appliedLetter?`
        <div style="background:var(--soft);border-radius:12px;padding:10px;margin-bottom:11px;font-size:11px;color:var(--muted);line-height:1.6;border-left:3px solid var(--blue)">
          <div style="font-size:9px;font-weight:900;letter-spacing:.08em;margin-bottom:4px">MOTIVACIONO PISMO</div>
          ${esc(sel.appliedLetter)}
        </div>`:''

      <div class="commentsSection">
        <div class="miniTitle">Prepiška (${sel.comments.length})</div>

          <input id="cmtIn_${sel.id}" placeholder="Poruka firme kandidatu..." onkeydown="if(event.key==='Enter')addComment(${sel.id})">

        </div>

      </div>

    :`<div class="atsDetail"><div class="atsDetailEmpty"><div class="ei">👆</div><p>Klikni na kandidata da vidiš detalje, prepišku i oznake.</p></div></div>`;

    return`<div style="margin-bottom:16px">

      ${cands.map(c=>`

            ${candAv(c,42,'kcardAv')}
            <div style="flex:1">
              <div style="font-weight:800;font-size:13px">${esc(c.name)}</div>
              <div style="font-size:11px;color:var(--muted)">${esc(c.title)} · ${esc(c.city)}</div>
              <div class="kcardLabels" style="margin-top:4px">${c.labels.map(l=>{const lo=LABEL_OPTS.find(x=>x.key===l);return lo?`<span class="kcardLabel" style="color:${lo.color};border-color:${lo.color}">${esc(l)}</span>`:''}).join('')}</div>
            </div>
            ${badge(s,STATUS_COLORS[s]||'gray')}
          </div>
          <div class="atsMobileCardActions">
            <button class="btn ghost sm" onclick="openCandidateProfile(${c.id})">Profil</button>
            <button class="btn ghost sm" onclick="moveC(${c.id},'next')" ${s==='HIRED'?'disabled':''}>Dalje →</button>
            <button class="btn ghost sm" onclick="moveC(${c.id},'prev')" ${s==='APPLIED'?'disabled':''}>← Nazad</button>
            <button class="btn ghost sm" onclick="addCommentMobile(${c.id})">💬 ${c.comments.length}</button>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');

  appPage(`
    <div class="sectionHead">
      <div><h2>ATS aplikanti</h2><p class="sub">Pomjeraj kandidate kroz faze. Klikni za detalje.</p></div>
      <button class="btn ghost sm" onclick="toast('Export: ATS_prijave.xlsx')">Export</button>
    </div>
    <div class="atsPageLayout">
      <div>
        <div class="atsKanbanWrap"><div class="kanban">${kanbanHTML}</div></div>
        <div class="atsMobileList">${mobileHTML}</div>
      </div>
      ${detailHTML}
    </div>`);
}

function selectCandidate(id){D.selectedCandidate=D.candidates.find(x=>x.id===id);rATS()}
function moveC(id,dir){
  const c=D.candidates.find(x=>x.id===id),i=STATUS_ORDER.indexOf(c.status);
  const ni=dir==='next'?Math.min(STATUS_ORDER.length-1,i+1):Math.max(0,i-1);
  if(ni===i)return;
  c.status=STATUS_ORDER[ni];
  D.notifs.unshift({text:`${c.name} → ${STATUS_LABELS[c.status]}`,time:'Upravo',read:false,type:'status'});
  toast(`${c.name} → ${STATUS_LABELS[c.status]}`);
  D.selectedCandidate=c;rATS();
}
function unlockCandATS(id){
  const c=D.candidates.find(x=>x.id===id);
  if(D.credits<=0){toast('⚠️ Nema kredita. Kupi plan.');return}
  c.unlocked=true;D.credits--;toast(`Otključan: ${c.name}`);rATS();
}
function toggleLabel(id,label){
  const c=D.candidates.find(x=>x.id===id),idx=c.labels.indexOf(label);
  if(idx>=0)c.labels.splice(idx,1);else c.labels.push(label);
  rATS();
}
function addComment(id){
  const input=document.getElementById(`cmtIn_${id}`);
  const text=input?.value?.trim();if(!text){toast('Upiši komentar');return}
  const c=D.candidates.find(x=>x.id===id);
  c.comments.push({author:'Mila HR',side:'company',time:new Date().toLocaleString('sr-ME'),text});
  input.value='';toast('Komentar dodan ✓');rATS();
}
function addCommentMobile(id){
  const c=D.candidates.find(x=>x.id===id);
  showModal(`<div class="sheetTop"><div><h3>Komentari — ${esc(c.name)}</h3></div><button class="x" onclick="closeModal()">×</button></div>
  <div style="max-height:300px;overflow-y:auto;margin-bottom:12px">
    ${c.comments.map(cm=>`<div class="commentItem ${cm.side==='candidate'?'candidate-side':'company-side'}" style="margin-bottom:7px"><div class="commentMeta"><span>${esc(cm.author)}</span><span>${esc(cm.time)}</span></div>${esc(cm.text)}</div>`).join('')||'<p class="sub">Nema komentara.</p>'}
  </div>
  <div class="commentForm">
    <input id="mcmtIn" placeholder="Poruka kandidatu...">
    <button class="btn lime xs" onclick="const t=document.getElementById('mcmtIn').value.trim();if(!t)return;D.candidates.find(x=>x.id===${id}).comments.push({author:'Mila HR',side:'company',time:new Date().toLocaleString('sr-ME'),text:t});closeModal();toast('Komentar dodan ✓');rATS()">Pošalji</button>
  </div>`);
}
function removeCandFromATS(id){
  if(!confirm('Ukloni kandidata iz ATS flowa? Profil ostaje u bazi.'))return;
  const c=D.candidates.find(x=>x.id===id);
  c.status='REMOVED';
  D.selectedCandidate=D.candidates.find(x=>x.status!=='REMOVED')||null;
  toast(`${c.name} uklonjen iz flowa`);rATS();
}
function openCandidateProfile(id){
  const c=D.candidates.find(x=>x.id===id);
  showModal(`<div class="sheetTop"><div><h3>${esc(c.name)}</h3><p class="sub">${esc(c.title)}</p></div><button class="x" onclick="closeModal()">×</button></div>
  <div style="display:flex;gap:13px;align-items:start;margin-bottom:14px">
    ${candAv(c,60,'candDetailAv')}
    <div style="flex:1">
      <div style="font-size:16px;font-weight:800;font-family:'Space Grotesk',system-ui">${esc(c.name)}</div>
      <p class="sub">${esc(c.title)} · ${esc(c.city)}</p>
      <div class="tags" style="margin-top:7px">${c.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>
    </div>
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px">
    ${badge(c.status,STATUS_COLORS[c.status]||'gray')}
    ${c.public?badge('Javni profil','blue'):''}
    ${c.unlocked?badge('Kontakt otključan','green'):''}
  </div>
  ${c.appliedLetter?`<div style="background:var(--soft);border-radius:12px;padding:10px;margin-bottom:13px;font-size:12px;color:var(--muted);line-height:1.6;border-left:3px solid var(--blue)"><div style="font-size:9px;font-weight:900;margin-bottom:4px">MOTIVACIONO PISMO</div>${esc(c.appliedLetter)}</div>`:''}
  ${c.unlocked?`<div style="background:var(--soft);border:1.5px solid var(--line2);border-radius:13px;padding:11px;font-size:12px;line-height:2.2;margin-bottom:13px">📧 <b>${esc(c.email)}</b><br>📞 <b>${esc(c.phone)}</b><br>📎 <b>${esc(c.cv||'CV.pdf')}</b></div>`:`<button class="btn blue sm" style="width:100%;margin-bottom:13px" onclick="unlockCandATS(${c.id});closeModal()">🔓 Unlock kontakt (1 kredit)</button>`}
  <div class="grid grid2">
    <button class="btn ghost sm" onclick="closeModal()">Zatvori</button>
    <button class="btn blue sm" onclick="closeModal()">Vrati se na ATS</button>
  </div>`);
}

/* ══ CANDIDATES ══ */
function rCandidates(){
  appPage(`<div class="sectionHead"><div><h2>Baza kandidata</h2></div><span class="badge lime">${D.credits} kredita</span></div>
  <div class="filters" style="grid-template-columns:1.4fr .8fr .8fr;margin-bottom:13px">
    <input id="cQ" placeholder="Ime, vještina, grad..." oninput="filterCands()">
    <select id="cCity" onchange="filterCands()"><option value="">Svi gradovi</option>${D.cities.map(c=>`<option>${c}</option>`).join('')}</select>
    <select id="cVis" onchange="filterCands()"><option value="">Svi profili</option><option value="true">Javni profili</option></select>
  </div>
  <div class="grid grid2" id="cOut">${renderCands(D.candidates.filter(c=>c.status!=='REMOVED'))}</div>`);
}
function renderCands(list){
  return list.map(c=>`<div class="card"><div style="display:flex;gap:11px;align-items:start;margin-bottom:11px">${candAv(c,44,'kcardAv')}
  <div style="flex:1"><b style="font-size:14px">${esc(c.name)}</b><p class="sub">${esc(c.title)}</p><p style="font-size:11px;color:var(--muted)">📍 ${esc(c.city)} · ${c.public?'🌐 Javni':'🔒 Privatno'}</p></div>${badge(c.status,STATUS_COLORS[c.status]||'gray')}</div>
  <div class="tags" style="margin-bottom:11px">${c.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>
  ${c.unlocked?`<div style="background:var(--soft);border:1.5px solid var(--line2);border-radius:12px;padding:10px;font-size:11px;line-height:2;margin-bottom:11px">📧 <b>${esc(c.email)}</b><br>📞 <b>${esc(c.phone)}</b></div>`:`<p class="sub" style="font-size:11px;margin-bottom:11px">Kontakt zaključan.</p>`}
  <div style="display:flex;gap:6px"><button class="btn ${c.unlocked?'ghost':'blue'} sm" onclick="unlockCand(${c.id})">${c.unlocked?'✓ Otključano':'🔓 Unlock'}</button><button class="btn ghost sm" onclick="openCandidateProfile(${c.id})">Profil</button></div></div>`).join('');
}
function filterCands(){
  const q=(document.getElementById('cQ')?.value||'').toLowerCase(),city=document.getElementById('cCity')?.value||'',vis=document.getElementById('cVis')?.value||'';
  const r=D.candidates.filter(c=>c.status!=='REMOVED'&&(!q||(c.name+c.title+c.city+c.skills.join(' ')).toLowerCase().includes(q))&&(!city||c.city===city)&&(!vis||c.public===true));
  const out=document.getElementById('cOut');if(out)out.innerHTML=renderCands(r)||'<p class="sub">Nema kandidata.</p>';
}
function unlockCand(id){const c=D.candidates.find(x=>x.id===id);if(c.unlocked)return toast('Već otključano');if(D.credits<=0)return toast('⚠️ Nema kredita.');c.unlocked=true;D.credits--;toast(`Otključan: ${c.name} · ${D.credits} kredita`);rCandidates()}

/* ══ BILLING ══ */
function rBilling(){
  const plans=[
    {name:'Starter',price:'25',features:['3 aktivna oglasa','10 unlock kredita/mj','Osnovna podrška'],color:'ghost'},
    {name:'Growth',price:'80',features:['10 aktivnih oglasa','50 unlock kredita/mj','Logo na oglasima','Priority podrška'],color:'blue',active:D.plan==='Growth'},
    {name:'Pro',price:'200',features:['Neograničeni oglasi','200 unlock kredita/mj','API pristup','Dedicated podrška'],color:'pink'}
  ];
  appPage(`<div class="sectionHead"><div><h2>Plan i uplate</h2><p class="sub">Bankovni transfer → admin potvrdi → aktivacioni kod → plan aktivan.</p></div></div>
  <div class="grid grid3" style="margin-bottom:18px">${plans.map(p=>`<div class="planCard ${p.active?'active':''}"><h2>${p.name}</h2><div class="planPrice">${p.price}€<span style="font-size:13px;font-weight:400"> /mjes</span></div><ul class="planFeat">${p.features.map(f=>`<li>${f}</li>`).join('')}</ul><button class="btn ${p.active?'lime':p.color}" onclick="orderPlan('${p.name}',${p.price})">${p.active?'✓ Aktivan':'Naruči'}</button></div>`).join('')}</div>
  <div class="card" style="margin-bottom:13px"><div class="miniTitle">Aktiviraj kod</div><p class="sub" style="margin-bottom:11px">Nakon što admin potvrdi uplatu, generiše se kod i šalje na email.</p><div style="display:flex;gap:7px"><input id="actCode" placeholder="WH-2026-XXXX-XXXX" style="flex:1;background:var(--soft);border:2px solid var(--line2);border-radius:13px;padding:10px 11px;font-weight:700;color:var(--ink)"><button class="btn blue" onclick="activateCode()">Aktiviraj</button></div></div>
  <div class="card"><div class="miniTitle">Moje narudžbine</div>${ordersTable()}</div>`);
}
function orderPlan(plan,amount){
  const id='WH-'+new Date().getFullYear()+'-'+Math.floor(1000+Math.random()*9000);
  D.orders.unshift({id,co:'EventPro d.o.o.',plan,amount,status:'PENDING',date:new Date().toLocaleDateString('sr-ME'),code:''});
  showModal(`<div class="sheetTop"><div><h3>Narudžba kreirana ✓</h3><p class="sub">Uplati na račun — admin potvrđuje u roku 24h.</p></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="bkBox">Primalac: <b>WorkingHub d.o.o.</b><br>IBAN: <b>ME25 5050 0000 1234 5678 90</b><br>Iznos: <b>${amount},00 EUR</b><br>Svrha: <b>${plan} plan</b><br>Poziv na br: <b>${id}</b></div>
  <button class="btn blue" style="width:100%" onclick="closeModal();rBilling()">Razumijem</button>`);
}
function activateCode(){const code=document.getElementById('actCode')?.value.trim();if(!code||!code.startsWith('WH-')){toast('⚠️ Upiši validan kod');return}D.plan='Growth';D.credits+=50;toast('🎉 Plan aktiviran! +50 kredita');rBilling()}
function ordersTable(){return`<div class="tableLike">${D.orders.map(o=>`<div class="row"><div><b>${esc(o.id)}</b><small>${esc(o.co)} · ${o.date}</small>${o.code?`<br><small style="color:var(--green);font-family:monospace">Kod: ${esc(o.code)}</small>`:''}</div><div>${esc(o.plan)}<small>${o.amount}€</small></div><div>${badge(o.status,o.status==='PAID'?'green':o.status==='PENDING'?'orange':'gray')}</div><div>${D.role==='admin'&&o.status==='PENDING'?`<button class="btn blue xs" onclick="confirmOrder('${o.id}')">Potvrdi</button>`:o.status==='PAID'?`<button class="btn ghost xs" onclick="toast('Kod: ${esc(o.code)}')">Kod</button>`:badge('Čeka','gray')}</div></div>`).join('')}</div>`}

/* ══ ADMIN ══ */
function rOrders(){appPage(`<div class="sectionHead"><div><h2>Uplate i kodovi</h2></div></div><div class="card">${ordersTable()}</div>`)}
function confirmOrder(id){const o=D.orders.find(x=>x.id===id);o.status='PAID';o.code='WH-'+new Date().getFullYear()+'-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();toast('✓ Potvrđeno. Kod: '+o.code);rOrders()}
function rModeration(){
  appPage(`<div class="sectionHead"><div><h2>Moderacija oglasa</h2></div><button class="btn ghost sm" onclick="toast('Export oglasa.csv')">Export</button></div>
  <div class="jobList">${D.jobs.map(j=>`<div class="jobCard"><div class="logo" style="font-size:15px">${company(j.cid).logoImg?`<img src="${company(j.cid).logoImg}" alt="">`:esc(company(j.cid).logo)}</div><div><div class="tags" style="margin-bottom:5px">${badge(j.cat,'blue')}${badge(j.status,j.status==='ACTIVE'?'green':'gray')}${j.featured?badge('★ Istaknuto','orange'):''}</div><div class="jobTitle" style="cursor:default">${esc(j.title)}</div><p class="meta">${esc(j.co)} · ${j.views} pregleda · ${j.apps} prijava</p></div><div class="jobSide"><button class="btn ghost sm" onclick="toast('Uredi oglas')">Uredi</button><button class="btn lime sm" onclick="D.jobs.find(j=>j.id===${j.id}).featured=true;toast('Istaknuto');rModeration()">Istakni</button><button class="btn red sm" onclick="D.jobs.find(j=>j.id===${j.id}).status='PAUSED';toast('Pauziran');rModeration()">Pauziraj</button></div></div>`).join('')}`);
}
function rUsers(){
  appPage(`<div class="sectionHead"><div><h2>Korisnici</h2></div><button class="btn ghost sm" onclick="toast('Export korisnici.csv')">Export</button></div>
  <div class="grid grid2">
    <div class="card"><div class="miniTitle">Kandidati (${D.candidates.length})</div>${D.candidates.filter(c=>c.status!=='REMOVED').map(c=>`<div style="display:flex;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">${candAv(c,34,'kcardAv')}<div><b style="font-size:12px">${esc(c.name)}</b><p class="sub" style="font-size:10px">${esc(c.city)} · ${esc(c.title)}</p></div>${badge(c.public?'PUBLIC':'PRIVATE',c.public?'green':'gray')}</div>`).join('')}</div>
    <div class="card"><div class="miniTitle">Firme (${D.companies.length})</div>${D.companies.map(c=>`<div style="display:flex;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)"><div class="logo" style="width:34px;height:34px;font-size:12px">${c.logoImg?`<img src="${c.logoImg}" alt="">`:esc(c.logo)}</div><div><b style="font-size:12px">${esc(c.name)}</b><p class="sub" style="font-size:10px">${esc(c.city)} · ${esc(c.email)}</p></div></div>`).join('')}</div>
  </div>`);
}

/* ══ INIT ══ */
updateNav();
rHome();
</script>
</body>
</html>
