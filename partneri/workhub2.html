<!doctype html>
<html lang="sr-ME">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>WorkingHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0f1117;--s2:#14161f;--s3:#1c1f2e;--s4:#242840;
  --border:#272b3f;--borderHi:#3a3f5c;
  --text:#eef0f8;--muted:#7880a4;--faint:#363b56;
  --brand:#5b8def;--brandH:#7aa3f5;--brandG:rgba(91,141,239,.14);
  --green:#22d07a;--greenD:rgba(34,208,122,.12);
  --amber:#f0a500;--amberD:rgba(240,165,0,.12);
  --red:#ef5050;--redD:rgba(239,80,80,.12);
  --purple:#a78bfa;--purpleD:rgba(167,139,250,.12);
  --teal:#38bdf8;--tealD:rgba(56,189,248,.12);
  --nav:60px;--tab:58px;--r:12px;--rL:18px;--rXL:24px;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit;background:none;border:none}
button{cursor:pointer}
.hidden{display:none!important}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(91,141,239,.18),transparent),radial-gradient(ellipse 50% 60% at 85% 100%,rgba(167,139,250,.15),transparent),var(--bg)}
.lCard{width:100%;max-width:400px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.lBrand{display:flex;align-items:center;gap:10px;margin-bottom:26px}
.mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--purple));display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.lBrand span{font-size:20px;font-weight:800;letter-spacing:-.04em}
.lTitle{font-size:23px;font-weight:800;letter-spacing:-.04em;margin-bottom:5px}
.lSub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.rCards{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.rCard{border:1px solid var(--border);border-radius:var(--r);padding:13px;background:var(--s1);display:flex;align-items:center;gap:12px;transition:border-color .18s,background .18s;text-align:left;width:100%}
.rCard:hover{border-color:var(--brand);background:var(--brandG)}
.rIco{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.rc-c .rIco{background:var(--tealD);color:var(--teal)}
.rc-f .rIco{background:var(--amberD);color:var(--amber)}
.rc-a .rIco{background:var(--purpleD);color:var(--purple)}
.rCard b{display:block;font-size:13px;font-weight:700;margin-bottom:1px}
.rCard small{font-size:11px;color:var(--muted)}
.lDiv{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:11px;font-weight:600;letter-spacing:.06em;margin:0 0 14px}
.lDiv::before,.lDiv::after{content:'';flex:1;height:1px;background:var(--border)}
.lForm{display:flex;flex-direction:column;gap:9px}
.lFld label{display:block;font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--muted);margin-bottom:4px}
.lFld input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:13px;transition:border-color .18s}
.lFld input:focus{outline:none;border-color:var(--brand)}
.lBtn{width:100%;padding:12px;border-radius:var(--r);background:linear-gradient(135deg,var(--brand),#7c5cfc);color:#fff;font-weight:700;font-size:13px;transition:opacity .18s,transform .1s}
.lBtn:active{transform:scale(.98);opacity:.88}

/* APP SHELL */
#appScreen{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:215px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 8px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbBrand{display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:14px}
.sbBrand .mark{width:28px;height:28px;border-radius:8px;font-size:12px}
.sbBrand span{font-size:14px;font-weight:800;letter-spacing:-.04em}
.sbWho{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:10px}
.sbWhoR{font-size:9px;font-weight:700;letter-spacing:.09em;color:var(--muted);margin-bottom:2px}
.sbWhoN{font-size:12px;font-weight:700}
.sbNav{display:flex;flex-direction:column;gap:2px;flex:1}
.sbI{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;border:1px solid transparent;text-align:left;width:100%}
.sbI .ico{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.sbI:hover{background:var(--s2);color:var(--text)}
.sbI.on{background:var(--brandG);color:var(--brand);border-color:rgba(91,141,239,.2)}
.sbDiv{height:1px;background:var(--border);margin:6px 0}
.sbBottom{margin-top:auto;padding-top:8px}
.sbRoles{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.sbRBtn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;font-size:11px;font-weight:700;color:var(--muted);transition:all .15s;text-align:left;border:1px solid transparent}
.sbRBtn:hover{background:var(--s2);color:var(--text)}
.sbRBtn.on{background:var(--brandG);color:var(--brand);border-color:rgba(91,141,239,.2)}

/* MAIN */
.mainWrap{flex:1;min-width:0;display:flex;flex-direction:column}

/* TOP BAR */
.topBar{height:var(--nav);background:rgba(8,9,15,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;position:sticky;top:0;z-index:30}
.tbSrch{flex:1;position:relative;max-width:360px}
.tbSrch input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:8px 12px 8px 32px;font-size:12px;transition:border-color .18s}
.tbSrch input:focus{outline:none;border-color:var(--brand)}
.tbSrch .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.tbR{display:flex;align-items:center;gap:7px;margin-left:auto}
.tbAv{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--purple));display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff}
.tbNt{position:relative;width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--border);display:grid;place-items:center;font-size:13px}
.tbNt .dot{position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--red);border-radius:50%;border:2px solid var(--bg)}
.rPill{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:999px;background:var(--s3);border:1px solid var(--border);color:var(--muted)}

/* BOTTOM TAB */
.tabBar{position:fixed;bottom:0;left:0;right:0;z-index:30;height:var(--tab);background:rgba(8,9,15,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:0 4px;padding-bottom:env(safe-area-inset-bottom)}
.tI{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:9px;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.03em;transition:color .15s;position:relative;padding:4px 2px}
.tI .ti{font-size:19px;line-height:1}
.tI.on{color:var(--brand)}
.tI .tbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:999px}

/* CONTENT */
.content{flex:1;padding:14px;padding-bottom:calc(var(--tab) + 14px + env(safe-area-inset-bottom));max-width:680px;width:100%}
.view{display:none}
.view.on{display:block}

/* PAGE HEAD */
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px}
.ph h1{font-size:21px;font-weight:800;letter-spacing:-.04em;line-height:1.2}
.ph .sub{font-size:11px;color:var(--muted);margin-top:3px}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);padding:13px}
.cT{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.sv{font-size:24px;font-weight:800;letter-spacing:-.05em;margin-bottom:2px}
.sl{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted)}

/* BADGE */
.b{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:700;border:1px solid transparent;flex-shrink:0}
.b-blue{background:var(--brandG);color:var(--brandH);border-color:rgba(91,141,239,.25)}
.b-green{background:var(--greenD);color:var(--green);border-color:rgba(34,208,122,.25)}
.b-amber{background:var(--amberD);color:var(--amber);border-color:rgba(240,165,0,.25)}
.b-red{background:var(--redD);color:var(--red);border-color:rgba(239,80,80,.25)}
.b-purple{background:var(--purpleD);color:var(--purple);border-color:rgba(167,139,250,.25)}
.b-teal{background:var(--tealD);color:var(--teal);border-color:rgba(56,189,248,.25)}
.b-gray{background:var(--s3);color:var(--muted);border-color:var(--border)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r);padding:8px 12px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--text);transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn:hover{background:var(--s3);border-color:var(--borderHi)}
.btn.sm{padding:6px 10px;font-size:11px;border-radius:9px}
.bp{background:var(--brand);border-color:var(--brand);color:#fff}.bp:hover{background:var(--brandH)}
.bg{background:var(--green);border-color:var(--green);color:#fff}
.br{background:var(--redD);border-color:rgba(239,80,80,.35);color:var(--red)}
.ba{background:var(--amberD);border-color:rgba(240,165,0,.35);color:var(--amber)}
.brow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* FORM */
.fg{display:flex;flex-direction:column;gap:11px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.fi{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:12px;transition:border-color .18s}
.fi:focus{outline:none;border-color:var(--brand)}
.fi::placeholder{color:var(--faint)}
textarea.fi{min-height:80px;resize:vertical;line-height:1.55}
select.fi{cursor:pointer}

/* JOB CARD */
.jc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);padding:13px;transition:border-color .18s;margin-bottom:9px}
.jc:hover{border-color:var(--borderHi)}
.jc.feat{border-color:rgba(240,165,0,.35)}
.jcT{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:7px}
.jcT h3{font-size:14px;font-weight:700;letter-spacing:-.02em;line-height:1.3;margin-bottom:2px}
.jmeta{font-size:11px;color:var(--muted);line-height:1.7}
.jmeta span{color:var(--text);font-weight:600}
.jdesc{font-size:11px;color:var(--muted);line-height:1.6;margin:7px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.tag{background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted)}

/* CHIPS */
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--s2);font-size:11px;font-weight:700;color:var(--muted);transition:all .15s}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}

/* PROFILE */
.pHero{background:linear-gradient(135deg,var(--s2),rgba(91,141,239,.06));border:1px solid var(--border);border-radius:var(--rL);padding:14px;margin-bottom:10px}
.pTop{display:flex;gap:11px;align-items:flex-start;margin-bottom:10px}
.pAv{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--purple));display:grid;place-items:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.pName{font-size:16px;font-weight:800;letter-spacing:-.03em;margin-bottom:2px}
.pHL{font-size:11px;color:var(--muted);line-height:1.45}
.pbar{height:4px;background:var(--s3);border-radius:999px;overflow:hidden;margin-top:8px}
.pfill{height:100%;background:linear-gradient(90deg,var(--brand),var(--green));border-radius:999px}

/* CV SECTION */
.cvs{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.cvsH{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;user-select:none}
.cvsH span{font-size:12px;font-weight:700}
.cvsH .arr{font-size:10px;color:var(--muted);transition:transform .2s}
.cvsH.open .arr{transform:rotate(90deg)}
.cvsB{padding:0 13px 13px;border-top:1px solid var(--border)}
.cvi{padding:9px 0;border-bottom:1px solid var(--border)}
.cvi:last-child{border-bottom:none}
.cviT{font-size:12px;font-weight:700;margin-bottom:1px}
.cviS{font-size:11px;color:var(--muted);margin-bottom:3px}
.cviD{font-size:11px;color:var(--muted);line-height:1.6}

/* CAND CARD */
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);padding:13px;margin-bottom:9px}
.ccT{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.ccAv{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.ccN{font-size:13px;font-weight:700}
.ccHL{font-size:10px;color:var(--muted);margin-top:1px;line-height:1.4}
.ccCont{background:var(--s2);border:1px solid var(--greenD);border-radius:var(--r);padding:9px;margin-top:7px;font-size:11px;line-height:2;color:var(--muted)}
.ccCont strong{color:var(--green)}

/* KANBAN */
.kWrap{overflow-x:auto;margin:0 -14px;padding:0 14px 6px;scrollbar-width:none}
.kWrap::-webkit-scrollbar{display:none}
.kanban{display:flex;gap:7px;min-width:max-content}
.kcol{width:178px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px;flex-shrink:0}
.kcolH{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.kcount{background:var(--s3);border:1px solid var(--border);border-radius:999px;padding:1px 6px;font-size:10px;font-weight:700;color:var(--muted)}
.kcard{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:5px}
.kcardN{font-size:11px;font-weight:700;margin-bottom:2px}
.kcardS{font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.karr{display:flex;gap:4px}
.karr button{flex:1;padding:4px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:all .15s}
.karr .kf{color:var(--brand);border-color:rgba(91,141,239,.3);background:var(--brandG)}

/* PLAN */
.pc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);padding:14px;margin-bottom:9px;transition:border-color .18s}
.pc.cur{border-color:var(--brand);background:linear-gradient(160deg,var(--s1),var(--brandG))}
.pc.pop{border-color:rgba(240,165,0,.4)}
.pcN{font-size:16px;font-weight:800;letter-spacing:-.03em;margin-bottom:5px}
.pcP{font-size:26px;font-weight:800;letter-spacing:-.05em;margin-bottom:9px}
.pcP span{font-size:12px;font-weight:500;color:var(--muted)}
.pcF{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:12px;font-size:11px;color:var(--muted)}
.pcF li::before{content:'✓  ';color:var(--green);font-weight:800}

/* ORDER */
.oc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px}
.ocT{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:9px}
.ocId{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--brand)}
.ocM{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.6}
.ocCode{font-family:var(--mono);font-size:10px;color:var(--green);margin-top:3px}

/* BANK */
.bkBox{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:var(--mono);font-size:11px;line-height:2.2;color:var(--muted);margin:11px 0}
.bkBox strong{color:var(--text)}

/* APP ITEM */
.appc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:7px}
.appT{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:7px}

/* NOTIF */
.nc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:7px;display:flex;gap:9px}
.ndot{width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:4px}
.nc.read .ndot{background:var(--faint)}
.ntext{font-size:12px;line-height:1.6}
.ntime{font-size:10px;color:var(--faint);margin-top:2px}

/* MODAL */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);padding:10px}
.modal.open{display:flex}
.mSheet{background:var(--s1);border:1px solid var(--border);border-radius:var(--rXL) var(--rXL) var(--r) var(--r);padding:20px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.mTitle{font-size:17px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.mSub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.mX{display:flex;justify-content:flex-end;margin-bottom:2px}
.mX button{font-size:17px;color:var(--muted);padding:4px}

/* TOAST */
.toast{position:fixed;top:calc(var(--nav)+8px);left:50%;transform:translateX(-50%) translateY(-8px);z-index:80;background:var(--s3);border:1px solid var(--borderHi);border-radius:var(--r);padding:9px 14px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:calc(100vw - 28px);text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:32px 20px;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:9px}
.empty p{font-size:12px;line-height:1.6}

/* SEP */
.sep{height:1px;background:var(--border);margin:12px 0}

/* HINT */
.hint{background:var(--brandG);border:1px solid rgba(91,141,239,.2);border-radius:var(--r);padding:10px 12px;font-size:11px;color:var(--brandH);line-height:1.6;margin-bottom:11px}
.hint strong{color:#fff}

/* DESKTOP */
@media(min-width:700px){
  .tabBar{display:none}
  .content{padding:16px;padding-bottom:16px;max-width:700px}
  .f2{grid-template-columns:1fr 1fr}
}
@media(max-width:699px){
  .sidebar{display:none}
  .f2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loginScreen">
<div class="lCard">

};

function login(r){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('appScreen').classList.remove('hidden');switchRole(r);}
function logout(){document.getElementById('appScreen').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');}
function switchRole(r){
  D.role=r;
  const m={candidate:{name:'Ana Jović',ini:'A',lbl:'Candidate',role:'KANDIDAT'},company:{name:'EventPro d.o.o.',ini:'E',lbl:'Company',role:'FIRMA'},admin:{name:'WorkingHub Admin',ini:'W',lbl:'Admin',role:'ADMIN'}}[r];
  document.getElementById('sbRole').textContent=m.role;
  document.getElementById('sbName').textContent=m.name;
  document.getElementById('rPill').textContent=m.lbl;
  document.getElementById('tbAv').textContent=m.ini;
  document.querySelectorAll('.sbRBtn').forEach(b=>b.classList.toggle('on',b.dataset.r===r));
  buildSB();buildTabs();go('dash');toast('Ulogovan/a: '+m.name);
}
function go(v){
  D.view=v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById('v-'+v);
  if(el)el.classList.add('on');
  buildSB();buildTabs();
  const fn=RR[v];if(fn)fn();
  document.getElementById('content').scrollTop=0;
}
function buildTabs(){
  const tabs=TABS[D.role]||[];
  const u=D.notifs.filter(n=>!n.read).length;
  document.getElementById('tabBar').innerHTML=tabs.map(t=>`<button class="tI ${D.view===t.v?'on':''}" onclick="go('${t.v}')"><span class="ti">${t.ico}</span><span>${t.lbl}</span>${t.v==='notif'&&u?`<span class="tbadge">${u}</span>`:''}</button>`).join('');
}
function buildSB(){
  document.getElementById('sbNav').innerHTML=(SB[D.role]||[]).map(i=>i.d?'<div class="sbDiv"></div>':`<button class="sbI ${D.view===i.v?'on':''}" onclick="go('${i.v}')"><span class="ico">${i.ico}</span>${i.lbl}</button>`).join('');
}
function gSrch(v){if(!v)return;activeCat='';go('jobs');setTimeout(()=>{const q=document.getElementById('jQ');if(q){q.value=v;filterJobs();}},50);}

// HELPERS
function ph(t,s,a=''){return`<div class="ph"><div><h1>${t}</h1>${s?`<div class="sub">${s}</div>`:''}</div>${a?`<div>${a}</div>`:''}</div>`;}
function bs(s){const m={ACTIVE:'b-green',PAUSED:'b-amber',DRAFT:'b-gray',PENDING:'b-amber',PAID:'b-green',CANCELED:'b-red',APPLIED:'b-blue',VIEWED:'b-amber',INTERVIEW:'b-purple',OFFER:'b-teal',HIRED:'b-green',REJECTED:'b-red',PUBLIC:'b-green',COMPANIES:'b-amber',PRIVATE:'b-gray'};return`<span class="b ${m[s]||'b-gray'}">${s}</span>`;}
function jCard(j,{apply=false,manage=false}={}){
  const app=D.myApps.some(a=>a.jid===j.id);
  return`<div class="jc ${j.feat?'feat':''}"><div class="jcT"><div><h3>${j.title}</h3><div class="jmeta">${j.co} · ${j.loc} · <span>${j.sal}</span></div><div class="jmeta">${j.type} · ${j.days}d · ${j.apps} prijav${j.apps===1?'a':'e'}</div></div>${j.feat?'<span class="b b-amber">★</span>':bs(j.status)}</div><p class="jdesc">${j.desc}</p><div class="tags">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="brow"><button class="btn sm" onclick="openJob(${j.id})">Detalji</button>${apply?`<button class="btn sm ${app?'':'bp'}" onclick="${app?'toast(\'Već si aplicirala.\')':'applyFlow('+j.id+')'}">${app?'✓ Aplicirala':'Apliciraj'}</button>`:''}${manage?`<button class="btn sm ${j.status==='ACTIVE'?'ba':'bg'}" onclick="toggleJob(${j.id})">${j.status==='ACTIVE'?'Pauziraj':'Aktiviraj'}</button><button class="btn sm" onclick="go('ats')">👥 ${j.apps}</button>`:''}</div></div>`;
}

// DASHBOARD
function rDash(){
  const el=document.getElementById('v-dash');
  if(D.role==='candidate'){
    const u=D.notifs.filter(n=>!n.read).length;
    el.innerHTML=ph('Dobrodošla, Ana 👋','Pregled profila, prijava i preporuka.')+
    `<div class="sg"><div class="sc"><div class="sv" style="color:var(--brand)">${D.myApps.length}</div><div class="sl">AKTIVNE PRIJAVE</div></div><div class="sc"><div class="sv" style="color:var(--green)">${D.cv.pct}%</div><div class="sl">CV POPUNJENO</div></div></div>`+
    `<div class="sg"><div class="sc"><div class="sv">${D.jobs.length}</div><div class="sl">NOVIH OGLASA</div></div><div class="sc"><div class="sv" ${u?'style="color:var(--amber)"':''}>${u}</div><div class="sl">NEPROČITANO</div></div></div>`+
    (D.myApps.length===0?`<div class="hint">💡 <strong>Počni ovdje:</strong> Pretraži oglase i pošalji prvu prijavu u manje od minute.</div>`:'')+
    `<div class="card" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div class="pAv">A</div><div style="flex:1"><div style="font-weight:700;font-size:13px">${D.cv.name}</div><div style="font-size:10px;color:var(--muted)">${D.cv.hl}</div></div>${bs(D.cv.vis)}</div><div class="pbar"><div class="pfill" style="width:${D.cv.pct}%"></div></div><div style="font-size:10px;color:var(--muted);margin-top:4px">CV ${D.cv.pct}% · <span style="color:var(--brand);cursor:pointer" onclick="go('profile')">Dopuni →</span></div></div>`+
    (D.myApps.length?`<div class="cT">MOJE PRIJAVE</div>${D.myApps.slice(0,2).map(a=>`<div class="appc"><div class="appT"><div><div style="font-weight:700;font-size:12px">${a.title}</div><div style="font-size:10px;color:var(--muted)">${a.co} · ${a.date}</div></div>${bs(a.status)}</div></div>`).join('')}`:'<div class="cT" style="margin-top:12px">PREPORUČENI OGLASI</div>')+
    D.jobs.slice(0,2).map(j=>jCard(j,{apply:true})).join('')+
    `<button class="btn bp" style="width:100%;margin-top:6px" onclick="go('jobs')">Vidi sve oglase →</button>`;

  } else if(D.role==='company'){
    const mine=D.jobs.filter(j=>j.co==='EventPro');
    const total=mine.reduce((s,j)=>s+j.apps,0);
    const pend=D.orders.filter(o=>o.status==='PENDING');
    el.innerHTML=ph('EventPro 🏢','Oglasi, aplikanti i pretplata.','<button class="btn sm bp" onclick="go(\'newjob\')">+ Novi oglas</button>')+
    `<div class="sg"><div class="sc"><div class="sv" style="color:var(--green)">${mine.filter(j=>j.status==='ACTIVE').length}</div><div class="sl">AKTIVNI OGLASI</div></div><div class="sc"><div class="sv" style="color:var(--brand)">${total}</div><div class="sl">UKUPNE PRIJAVE</div></div></div>`+
    `<div class="sg"><div class="sc"><div class="sv" style="color:var(--amber)">${D.credits}</div><div class="sl">UNLOCK KREDITI</div></div><div class="sc"><div class="sv">${D.plan}</div><div class="sl">PLAN</div></div></div>`+
    (pend.length?`<div class="hint" style="background:var(--amberD);border-color:rgba(240,165,0,.3);color:var(--amber)">⚠️ <strong>${pend.length} narudžb${pend.length===1?'a':'e'}</strong> čeka potvrdu. <span style="text-decoration:underline;cursor:pointer" onclick="go('sub')">Vidi →</span></div>`:'')+
    `<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px"><button class="btn bp" style="width:100%;justify-content:center" onclick="go('newjob')">✏️ Objavi novi oglas</button><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><button class="btn" style="width:100%;justify-content:center" onclick="go('ats')">🗂 ATS aplikanti</button><button class="btn" style="width:100%;justify-content:center" onclick="go('cands')">👥 Kandidati</button></div></div>`+
    `<div class="cT">MOJI OGLASI</div>${mine.map(j=>jCard(j,{manage:true})).join('')||'<div class="empty"><div class="ei">📢</div><p>Nema oglasa. Objavi prvi.</p></div>'}`;

  } else {
    const pend=D.orders.filter(o=>o.status==='PENDING');
    el.innerHTML=ph('Admin ⚡','Pregled i upravljanje platformom.')+
    `<div class="sg"><div class="sc"><div class="sv" ${pend.length?'style="color:var(--amber)"':''}>${pend.length}</div><div class="sl">PENDING UPLATA</div></div><div class="sc"><div class="sv" style="color:var(--green)">${D.orders.filter(o=>o.status==='PAID').length}</div><div class="sl">POTVRĐENO</div></div></div>`+
    `<div class="sg"><div class="sc"><div class="sv">${D.jobs.length}</div><div class="sl">AKTIVNI OGLASI</div></div><div class="sc"><div class="sv">128</div><div class="sl">KORISNICI</div></div></div>`+
    (pend.length?
      `<div class="hint" style="background:var(--amberD);border-color:rgba(240,165,0,.3);color:var(--amber)">⚠️ <strong>${pend.length} narudžb${pend.length===1?'a':'e'}</strong> čeka potvrdu uplate.</div>`+
      pend.map(o=>`<div class="oc"><div class="ocT"><div><div class="ocId">${o.id}</div><div class="ocM">${o.co} · ${o.plan} · ${o.amt}€ · ${o.date}</div></div>${bs(o.status)}</div><div class="brow"><button class="btn sm bp" onclick="confirmOrder('${o.id}')">✓ Potvrdi uplatu</button><button class="btn sm br" onclick="cancelOrder('${o.id}')">Otkaži</button></div></div>`).join('')
      :`<div class="hint">✓ <strong>Sve narudžbine su obrađene.</strong></div>`)+
    `<div class="sep"></div><div class="cT">MODERACIJA</div>`+
    D.jobs.slice(0,2).map(j=>`<div class="jc" style="margin-bottom:7px"><div class="jcT" style="margin-bottom:7px"><div><h3 style="font-size:12px">${j.title}</h3><div class="jmeta">${j.co} · ${j.days}d</div></div>${bs(j.status)}</div><div class="brow"><button class="btn sm bg" onclick="toast('Oglas odobren ✓')">Odobri</button><button class="btn sm br" onclick="toast('Oglas uklonjen')">Ukloni</button><button class="btn sm" onclick="openJob(${j.id})">Detalji</button></div></div>`).join('');
  }
}

// JOBS
let activeCat='';
function rJobs(){
  const cats=[...new Set(D.jobs.map(j=>j.cat))];
  document.getElementById('v-jobs').innerHTML=ph('Oglasi','Sve aktivne pozicije na platformi.')+
  `<input class="fi" id="jQ" placeholder="Pretraži poziciju, firmu, grad..." oninput="filterJobs()" style="margin-bottom:9px">`+
  `<div class="chips" id="chips"><button class="chip on" data-c="" onclick="setCat(this,'')">Sve</button>${cats.map(c=>`<button class="chip" data-c="${c}" onclick="setCat(this,'${c}')">${c}</button>`).join('')}</div>`+
  `<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px"><select class="fi" id="jLoc" onchange="filterJobs()" style="font-size:11px"><option value="">Sva mjesta</option><option>Podgorica</option><option>Remote</option><option>Budva</option></select><select class="fi" id="jType" onchange="filterJobs()" style="font-size:11px"><option value="">Svi tipovi</option><option>Full-time</option><option>Part-time</option><option>Freelance</option></select></div>`+
  `<div id="jOut">${D.jobs.map(j=>jCard(j,{apply:D.role!=='company'})).join('')}</div>`;
}
function setCat(btn,c){activeCat=c;document.querySelectorAll('#chips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.c===c));filterJobs();}
function filterJobs(){
  const q=(document.getElementById('jQ')?.value||'').toLowerCase();
  const loc=document.getElementById('jLoc')?.value||'';
  const type=document.getElementById('jType')?.value||'';
  const r=D.jobs.filter(j=>(!q||(j.title+j.co+j.desc+j.tags.join(' ')).toLowerCase().includes(q))&&(!loc||j.loc===loc)&&(!type||j.type===type)&&(!activeCat||j.cat===activeCat));
  const out=document.getElementById('jOut');
  if(out)out.innerHTML=r.length?r.map(j=>jCard(j,{apply:D.role!=='company'})).join(''):'<div class="empty"><div class="ei">🔍</div><p>Nema oglasa za ove filtere.</p></div>';
}

  const u=D.notifs.filter(n=>!n.read).length;
  document.getElementById('v-notif').innerHTML=ph('Obavijesti','',u?`<button class="btn sm" onclick="markRead()">Sve pročitano</button>`:'')+
  (D.notifs.length?D.notifs.map(n=>`<div class="nc ${n.read?'read':''}"><div class="ndot"></div><div><div class="ntext">${n.txt}</div><div class="ntime">${n.time}</div></div></div>`).join(''):'<div class="empty"><div class="ei">🔔</div><p>Nema obavijesti.</p></div>');
}
function markRead(){D.notifs.forEach(n=>n.read=true);buildTabs();const d=document.getElementById('tbNt').querySelector('.dot');if(d)d.remove();rNotif();toast('Sve pročitano ✓');}

// JOB MODAL
function openJob(id){
  const j=D.jobs.find(x=>x.id===id);const app=D.myApps.some(a=>a.jid===id);
  showM(`<div class="mX"><button onclick="closeM()">✕</button></div><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:11px"><div><div style="font-size:17px;font-weight:800;letter-spacing:-.03em">${j.title}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${j.co} · ${j.loc} · ${j.type}</div></div>${bs(j.status)}</div><div class="tags" style="margin-bottom:10px">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:11px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:10px">${j.desc}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;font-size:11px"><div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px"><div style="color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.07em;margin-bottom:1px">PLATA</div><strong>${j.sal}</strong></div><div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px"><div style="color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.07em;margin-bottom:1px">PRIJAVE</div><strong>${j.apps}</strong></div></div>${D.role==='candidate'?`<button class="btn ${app?'':'bp'}" style="width:100%" onclick="${app?'toast(\'Već si aplicirala.\')':'applyFlow('+id+')'}">${app?'✓ Već aplicirala':'Apliciraj na oglas'}</button>`:''}`);
}
function openJobByTitle(t){const j=D.jobs.find(x=>x.title===t);if(j)openJob(j.id);}
function applyFlow(id){const j=D.jobs.find(x=>x.id===id);showM(`<div class="mX"><button onclick="closeM()">✕</button></div><div class="mTitle">Apliciraj</div><div class="mSub">${j.title} · ${j.co}</div><div><label class="fl">Cover letter (opciono)</label><textarea class="fi" id="m-cl" placeholder="Zašto si pravi izbor?"></textarea></div><div class="brow" style="margin-top:11px"><button class="btn bp" style="flex:1" onclick="doApply(${id})">Pošalji prijavu →</button><button class="btn" onclick="closeM()">Otkaži</button></div>`);}
function doApply(id){const j=D.jobs.find(x=>x.id===id);if(D.myApps.some(a=>a.jid===id)){toast('Već si aplicirala.');closeM();return;}const cl=document.getElementById('m-cl')?.value||'';D.myApps.unshift({jid:id,title:j.title,co:j.co,status:'APPLIED',date:new Date().toLocaleDateString('hr'),cl});j.apps++;D.notifs.unshift({id:Date.now(),txt:`Prijava poslata: ${j.title} · ${j.co}`,time:'Upravo',read:false});closeM();toast('Prijava poslata: '+j.title+' ✓');buildTabs();}

// MODAL & TOAST
function showM(html){document.getElementById('mSheet').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeM(){document.getElementById('modal').classList.remove('open');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('on'),2600);}

const RR={dash:rDash,jobs:rJobs,profile:rProfile,myapps:rMyApps,notif:rNotif,cjobs:rCJobs,newjob:rNewJob,ats:rAts,cands:rCands,sub:rSub,admin:rAdmin};
</script>
</body>
