<!doctype html>
<html lang="sr-ME" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WorkingHub — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f1e8;--ink:#171717;--muted:#6d665f;--soft:#fffaf0;--paper:#fffdf8;
      --line:#ded5c6;--line2:#cabcaa;
      --blue:#2148ff;--lime:#c8ff3d;--pink:#ff4fa3;--orange:#ff8a2a;--green:#13b76d;--red:#e5484d;
      --shadow:0 16px 45px rgba(28,22,12,.12);--shadow2:0 28px 80px rgba(28,22,12,.18);
      --r:20px;--r2:30px;--font:'Inter',system-ui,sans-serif;--display:'Space Grotesk',system-ui,sans-serif;
    }
    [data-theme="dark"]{
      --bg:#0f0f0f;--ink:#f0ede8;--muted:#9a9590;--soft:#1a1a1a;--paper:#181818;
      --line:#2a2a2a;--line2:#333;
      --blue:#4d6fff;--lime:#b8f020;--pink:#ff6ab5;--orange:#ff9a45;--green:#1ed47a;--red:#ff5c61;
      --shadow:0 16px 45px rgba(0,0,0,.4);--shadow2:0 28px 80px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;transition:background .3s,color .3s}
    body:before{content:"";position:fixed;inset:-20%;z-index:-2;background:radial-gradient(circle at 12% 8%,rgba(33,72,255,.14),transparent 26%),radial-gradient(circle at 88% 12%,rgba(255,79,163,.11),transparent 26%),radial-gradient(circle at 50% 95%,rgba(200,255,61,.16),transparent 30%);transition:opacity .3s}
    [data-theme="dark"] body:before{opacity:.4}
    body:after{content:"";position:fixed;inset:0;z-index:-1;opacity:.2;background-image:linear-gradient(rgba(23,23,23,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(23,23,23,.06) 1px,transparent 1px);background-size:36px 36px;mask-image:linear-gradient(to bottom,#000,transparent 90%)}
    [data-theme="dark"] body:after{opacity:.06}
    button,input,select,textarea{font:inherit;color:inherit;border:none;background:none}
    button{cursor:pointer}a{color:inherit;text-decoration:none}.hidden{display:none!important}
    .wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    input[type="file"]{display:none}

    /* ── TOP NAV ── */
    .top{position:sticky;top:0;z-index:40;background:rgba(245,241,232,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(23,23,23,.08)}
    [data-theme="dark"] .top{background:rgba(15,15,15,.9)}
    .topIn{height:68px;display:flex;align-items:center;gap:14px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-family:var(--display);letter-spacing:-.04em;font-size:20px;white-space:nowrap}
    .mark{width:36px;height:36px;border-radius:13px;background:var(--ink);color:var(--lime);display:grid;place-items:center;font-weight:900;font-size:14px;box-shadow:4px 4px 0 var(--blue);transform:rotate(-3deg);transition:.3s}
    .nav{display:flex;align-items:center;gap:4px;margin-left:16px}
    .nav button{padding:9px 12px;border-radius:999px;font-size:13px;font-weight:700;color:var(--muted);transition:.15s}
    .nav button:hover,.nav button.on{background:var(--ink);color:var(--soft)}
    .topActions{margin-left:auto;display:flex;align-items:center;gap:8px}
    .iconBtn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:2px solid var(--ink);background:var(--paper);box-shadow:4px 4px 0 var(--ink);border-radius:999px;font-weight:800;font-size:13px;padding:9px 15px;transition:.15s;cursor:pointer;white-space:nowrap}
    .iconBtn{width:40px;height:40px;padding:0}
    .btn:hover,.iconBtn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
    .btn:active,.iconBtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
    .btn.blue{background:var(--blue);color:white}
    .btn.lime{background:var(--lime);color:var(--ink)}
    .btn.pink{background:var(--pink);color:white}
    .btn.green{background:var(--green);color:white}
    .btn.red{background:var(--red);color:white}
    .btn.ghost{background:transparent;box-shadow:none;border-color:var(--line2);color:var(--muted)}
    .btn.sm{padding:7px 12px;font-size:12px}
    .btn.xs{padding:5px 9px;font-size:11px;box-shadow:2px 2px 0 var(--ink)}
    .rolePill{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:var(--lime);color:var(--ink);border:2px solid var(--ink);border-radius:999px;padding:6px 10px}
    .hamb{display:none}
    .mobileNav{display:none}
    .bottomNav{display:none}

    /* ── THEME TOGGLE ── */
    .themeBtn{font-size:17px;transition:.2s}
    .themeBtn:hover{transform:rotate(20deg) scale(1.1)}

    /* ── HERO ── */
    .hero{padding:40px 0 28px}
    .heroGrid{display:grid;grid-template-columns:1.08fr .92fr;gap:24px;align-items:stretch}
    .heroCard{position:relative;border:2px solid var(--ink);border-radius:36px;background:var(--paper);padding:36px;box-shadow:var(--shadow2);overflow:hidden}
    .heroCard:before{content:"POSLOVI / KANDIDATI / FIRME";position:absolute;right:-55px;top:20px;transform:rotate(12deg);font-size:12px;font-weight:900;letter-spacing:.18em;color:rgba(23,23,23,.06);white-space:nowrap}
    .kicker{display:inline-flex;align-items:center;gap:7px;border:2px solid var(--ink);background:var(--lime);color:var(--ink);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;margin-bottom:16px;box-shadow:3px 3px 0 var(--ink)}
    h1{font-family:var(--display);font-size:clamp(38px,6.5vw,76px);line-height:.94;letter-spacing:-.07em;margin-bottom:16px}
    .gradText{background:linear-gradient(90deg,var(--blue),var(--pink),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
    .lead{font-size:16px;color:var(--muted);max-width:680px;line-height:1.75;margin-bottom:22px}
    .searchBox{background:var(--ink);border:2px solid var(--ink);border-radius:24px;padding:10px;box-shadow:7px 7px 0 var(--blue);display:grid;grid-template-columns:1.3fr .8fr .8fr auto;gap:7px;margin-top:20px}
    .searchBox input,.searchBox select{background:var(--paper);border-radius:14px;padding:13px 14px;font-weight:700;color:var(--ink);min-width:0}
    .searchBox button{border-radius:14px;box-shadow:none;background:var(--lime);border:0;padding:0 18px;color:var(--ink);font-weight:950;font-size:13px}
    .heroSide{display:grid;gap:12px}
    .statMosaic{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .stat{border:2px solid var(--ink);border-radius:26px;background:var(--paper);padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .stat:nth-child(2){background:var(--blue);color:white}
    .stat:nth-child(3){background:var(--lime);color:var(--ink)}
    .stat:nth-child(4){background:var(--pink);color:white}
    .stat b{display:block;font-family:var(--display);font-size:40px;line-height:1;letter-spacing:-.08em}
    .stat span{font-size:11px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;opacity:.72}
    .notice{border:2px dashed var(--line2);border-radius:24px;background:rgba(255,255,255,.35);padding:16px;font-weight:700;color:var(--muted);font-size:13px}
    [data-theme="dark"] .notice{background:rgba(255,255,255,.05)}

    /* ── GENERAL ── */
    .section{padding:28px 0}
    .sectionHead{display:flex;justify-content:space-between;gap:14px;align-items:flex-end;margin-bottom:16px}
    h2{font-family:var(--display);font-size:32px;letter-spacing:-.05em;line-height:1}
    .sub{color:var(--muted);font-weight:600;margin-top:6px;font-size:13px}
    .grid{display:grid;gap:12px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}.grid4{grid-template-columns:repeat(4,1fr)}
    .card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow)}
    .miniTitle{font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;border:1.5px solid var(--ink);font-size:11px;font-weight:900;background:var(--paper);white-space:nowrap}
    .badge.blue{background:var(--blue);color:white;border-color:var(--blue)}
    .badge.lime{background:var(--lime);color:var(--ink);border-color:var(--ink)}
    .badge.pink{background:var(--pink);color:white;border-color:var(--pink)}
    .badge.green{background:var(--green);color:white;border-color:var(--green)}
    .badge.red{background:var(--red);color:white;border-color:var(--red)}
    .badge.orange{background:var(--orange);color:white;border-color:var(--orange)}
    .badge.gray{border-color:var(--line2);color:var(--muted);background:transparent}
    .badge.purple{background:#7c3aed;color:white;border-color:#7c3aed}

    /* ── JOB CARDS ── */
    .filters{display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr .8fr;gap:7px;margin-bottom:14px;background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:9px;box-shadow:var(--shadow)}
    .filters input,.filters select,.form input,.form select,.form textarea{width:100%;background:var(--soft);border:2px solid var(--line);border-radius:14px;padding:11px 12px;font-weight:700;outline:none;color:var(--ink)}
    .filters input:focus,.filters select:focus,.form input:focus,.form select:focus,.form textarea:focus{border-color:var(--blue)}
    .jobList{display:grid;gap:10px}
    .jobCard{background:var(--paper);border:2px solid var(--ink);border-radius:26px;padding:16px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;transition:.15s}
    .jobCard:hover{transform:translateY(-2px);box-shadow:7px 7px 0 rgba(23,23,23,.15)}
    [data-theme="dark"] .jobCard:hover{box-shadow:7px 7px 0 rgba(255,255,255,.08)}
    .logo{width:52px;height:52px;border:2px solid var(--ink);border-radius:16px;display:grid;place-items:center;font-weight:950;font-family:var(--display);background:var(--lime);box-shadow:3px 3px 0 var(--ink);flex-shrink:0;overflow:hidden;position:relative}
    .logo img{width:100%;height:100%;object-fit:cover;border-radius:14px}
    .logo-upload{cursor:pointer;font-size:10px;text-align:center;color:var(--muted)}
    .jobTitle{font-family:var(--display);font-size:19px;font-weight:800;letter-spacing:-.03em;margin-bottom:3px;display:block;text-align:left;cursor:pointer}
    .jobTitle:hover{color:var(--blue);text-decoration:underline}
    .meta{color:var(--muted);font-size:12px;font-weight:700}
    .jobDesc{color:var(--muted);margin:9px 0;line-height:1.65;font-size:13px}
    .tags{display:flex;gap:5px;flex-wrap:wrap}
    .tag{border:1px solid var(--line2);background:var(--soft);border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;color:var(--muted)}
    .jobSide{display:flex;flex-direction:column;align-items:flex-end;gap:7px;min-width:148px}
    .deadline{font-size:11px;color:var(--muted);font-weight:800;text-align:right}
    .featured{background:linear-gradient(135deg,var(--paper),color-mix(in srgb,var(--lime) 15%,var(--paper)))}
    .featured:before{content:"★ ISTAKNUTO";position:absolute;top:-10px;left:20px;background:var(--orange);border:2px solid var(--ink);padding:3px 9px;border-radius:999px;font-size:10px;font-weight:950;color:white}
    .featured{position:relative;overflow:visible}

    /* ── DETAIL ── */
    .detailLayout{display:grid;grid-template-columns:1fr 310px;gap:14px}
    .detailTitle{font-family:var(--display);font-size:42px;line-height:.98;letter-spacing:-.06em;margin-bottom:10px}
    .detailText{font-size:15px;color:var(--muted);line-height:1.8}
    .detailText ul{padding-left:20px;margin:10px 0}
    .stickyApply{position:sticky;top:86px}

    /* ── COMPANY CARDS ── */
    .companyCard{display:flex;gap:14px;align-items:flex-start;background:var(--paper);border:2px solid var(--ink);border-radius:26px;padding:16px;box-shadow:var(--shadow)}
    .companyCard h3{font-family:var(--display);font-size:20px;letter-spacing:-.04em;margin-bottom:3px}
    .companyCard p{color:var(--muted);line-height:1.65;margin:7px 0;font-size:13px}

    /* ── APP SHELL ── */
    .appShell{display:grid;grid-template-columns:240px 1fr;gap:16px;padding:16px 0 40px}
    .side{position:sticky;top:86px;align-self:start;background:var(--ink);color:var(--soft);border-radius:28px;padding:12px;box-shadow:var(--shadow2)}
    .sideHead{padding:10px 10px 12px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:8px}
    .sideHead .sideAvatar{width:44px;height:44px;border-radius:14px;border:2px solid rgba(255,255,255,.2);display:grid;place-items:center;font-weight:900;font-family:var(--display);background:var(--lime);color:var(--ink);overflow:hidden;margin-bottom:8px}
    .sideHead .sideAvatar img{width:100%;height:100%;object-fit:cover}
    .sideHead b{font-family:var(--display);font-size:17px;display:block}
    .sideHead small{display:block;color:rgba(255,255,255,.5);margin-top:2px;font-size:11px}
    .side button{display:flex;width:100%;align-items:center;gap:8px;padding:11px 10px;border-radius:16px;color:rgba(255,255,255,.65);font-weight:750;text-align:left;font-size:13px;transition:.15s}
    .side button:hover,.side button.on{background:rgba(255,255,255,.12);color:white}
    .side button.on{background:var(--lime) !important;color:var(--ink) !important;font-weight:900}
    .dashStat{background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
    .dashStat b{font-family:var(--display);font-size:32px;line-height:1}
    .dashStat span{display:block;font-size:10px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px}
    .tableLike{display:grid;gap:7px}
    .row{display:grid;grid-template-columns:1.2fr .8fr .7fr auto;gap:9px;align-items:center;background:var(--soft);border:1.5px solid var(--line);border-radius:16px;padding:11px}
    .row b{font-weight:900;font-size:13px}
    .row small{color:var(--muted);font-weight:700;display:block;font-size:11px}

    /* ── ATS KANBAN ── */
    .atsWrap{overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
    .kanban{display:flex;gap:10px;min-width:max-content;padding-bottom:4px}
    .kcol{width:236px;background:var(--soft);border:2px solid var(--ink);border-radius:22px;padding:10px;flex-shrink:0}
    [data-theme="dark"] .kcol{background:rgba(255,255,255,.04)}
    .kcolHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 4px}
    .kcolHead h4{font-family:var(--display);font-size:13px;font-weight:700}
    .kcolCount{background:var(--ink);color:var(--soft);border-radius:999px;font-size:10px;font-weight:900;padding:2px 7px}
    .kcard{background:var(--paper);border:1.5px solid var(--line2);border-radius:16px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
    .kcard:hover{border-color:var(--blue);box-shadow:3px 3px 0 var(--blue)}
    .kcard.selected{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue)}
    .kcardTop{display:flex;align-items:center;gap:9px;margin-bottom:8px}
    .kcardAv{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--ink);display:grid;place-items:center;font-weight:900;font-family:var(--display);font-size:13px;flex-shrink:0;overflow:hidden}
    .kcardAv img{width:100%;height:100%;object-fit:cover}
    .kcardName{font-weight:800;font-size:13px;margin-bottom:1px}
    .kcardTitle{font-size:11px;color:var(--muted)}
    .kcardMeta{font-size:11px;color:var(--muted);margin-bottom:8px}
    .kcardLabels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .kcardLabel{font-size:9px;font-weight:900;padding:2px 7px;border-radius:999px;border:1.5px solid currentColor}
    .kcardActions{display:flex;gap:5px}
    .kcardActions button{flex:1;padding:5px 6px;border-radius:9px;font-size:10px;font-weight:800;border:1.5px solid var(--line2);background:var(--soft);transition:.15s;color:var(--ink)}
    .kcardActions button.fwd{background:var(--blue);color:white;border-color:var(--blue)}
    .kcardActions button:hover{transform:translateY(-1px)}
    .kcardComment{font-size:11px;color:var(--muted);border-top:1px solid var(--line);margin-top:8px;padding-top:7px;font-style:italic}

    /* ATS DETAIL PANEL */
    .atsLayout{display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:start}
    .atsDetail{background:var(--paper);border:2px solid var(--ink);border-radius:24px;padding:18px;position:sticky;top:86px}
    .atsDetailEmpty{text-align:center;padding:40px 20px;color:var(--muted)}
    .atsDetailEmpty span{display:block;font-size:36px;margin-bottom:10px}
    .candDetailHead{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
    .candDetailAv{width:56px;height:56px;border-radius:16px;border:2px solid var(--ink);display:grid;place-items:center;font-weight:900;font-family:var(--display);font-size:20px;flex-shrink:0;overflow:hidden}
    .candDetailAv img{width:100%;height:100%;object-fit:cover}
    .commentsSection{margin-top:14px;border-top:1.5px solid var(--line);padding-top:12px}
    .commentItem{background:var(--soft);border-radius:12px;padding:9px;margin-bottom:7px;font-size:12px;line-height:1.5}
    .commentMeta{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700}
    .commentForm{display:flex;gap:7px;margin-top:10px}
    .commentForm input{flex:1;background:var(--soft);border:1.5px solid var(--line);border-radius:12px;padding:8px 11px;font-size:12px}
    .labelPicker{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}
    .labelOpt{font-size:10px;font-weight:900;padding:4px 9px;border-radius:999px;border:1.5px solid currentColor;cursor:pointer;opacity:.5;transition:.15s}
    .labelOpt.active{opacity:1}

    /* ── PROFILE ── */
    .profLayout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .profPreview{background:var(--paper);border:2px solid var(--ink);border-radius:26px;padding:20px;box-shadow:var(--shadow)}
    .profPreviewHead{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
    .profAvLarge{width:72px;height:72px;border-radius:20px;border:2px solid var(--ink);display:grid;place-items:center;font-weight:900;font-family:var(--display);font-size:26px;background:var(--lime);flex-shrink:0;overflow:hidden;cursor:pointer;position:relative}
    .profAvLarge img{width:100%;height:100%;object-fit:cover}
    .profAvLarge:hover:after{content:"📷";position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.4);border-radius:18px;font-size:22px}
    .pbar{height:8px;background:var(--line);border-radius:999px;margin-top:10px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px;transition:width .4s}
    .visNote{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px;padding:8px 11px;background:var(--soft);border-radius:11px;border:1px solid var(--line)}

    /* ── ORDERS ── */
    .orderCard{background:var(--paper);border:2px solid var(--ink);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
    .orderHead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
    .orderCode{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--blue)}
    .bkBox{background:var(--soft);border:1.5px solid var(--line2);border-radius:16px;padding:14px;font-family:var(--mono);font-size:12px;line-height:2.2;margin:12px 0}

    /* ── MODAL ── */
    .modal{position:fixed;inset:0;z-index:80;background:rgba(23,23,23,.55);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:14px}
    [data-theme="dark"] .modal{background:rgba(0,0,0,.7)}
    .modal.open{display:flex}
    .sheet{background:var(--paper);border:2px solid var(--ink);border-radius:30px;padding:20px;box-shadow:9px 9px 0 var(--ink);width:min(560px,100%);max-height:90vh;overflow-y:auto}
    .sheetTop{display:flex;justify-content:space-between;gap:12px;margin-bottom:14px}
    .sheet h3{font-family:var(--display);font-size:24px;letter-spacing:-.04em}
    .x{width:36px;height:36px;border:2px solid var(--ink);border-radius:999px;background:var(--pink);color:white;font-weight:950;display:grid;place-items:center;flex-shrink:0;font-size:16px}
    .form{display:grid;gap:9px}
    .label{font-size:10px;font-weight:950;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .form textarea{min-height:100px;resize:vertical}
    .counter{font-size:11px;color:var(--muted);font-weight:800;text-align:right;margin-top:2px}

    .upload:hover{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 5%,var(--paper))}
    .sendNote{background:var(--soft);border:1.5px solid var(--line2);border-radius:14px;padding:12px;font-size:12px;color:var(--muted);line-height:1.6}

    /* ── TOAST ── */
    .toast{position:fixed;top:86px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:120;background:var(--ink);color:var(--soft);border-radius:999px;padding:11px 18px;font-weight:900;opacity:0;transition:.2s;box-shadow:var(--shadow2);max-width:calc(100vw - 24px);text-align:center;font-size:13px;pointer-events:none}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── FOOTER ── */
    .footer{margin-top:36px;background:var(--ink);color:var(--soft);border-radius:34px 34px 0 0;padding:32px 0}
    .footGrid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:20px}
    .footer h4{font-family:var(--display);font-size:17px;margin-bottom:9px}
    .footer a,.footer p{display:block;color:rgba(255,255,255,.55);font-weight:700;margin:6px 0;font-size:13px;cursor:pointer}
    .footer a:hover{color:white}

    /* ── PLAN CARDS ── */
    .planCard{background:var(--paper);border:2px solid var(--ink);border-radius:26px;padding:18px;box-shadow:var(--shadow);transition:.15s}
    .planCard:hover{transform:translateY(-2px);box-shadow:7px 7px 0 var(--ink)}
    .planCard.active{background:var(--blue);color:white;border-color:var(--blue)}
    .planCard.active .sub{color:rgba(255,255,255,.7)}
    .planCard h2{margin-bottom:4px}
    .planPrice{font-family:var(--display);font-size:38px;font-weight:900;letter-spacing:-.06em;margin:10px 0}
    .planFeat{list-style:none;font-size:12px;color:var(--muted);display:grid;gap:5px;margin-bottom:14px}
    .planFeat li:before{content:"✓ ";color:var(--green);font-weight:900}
    .planCard.active .planFeat{color:rgba(255,255,255,.75)}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .nav{display:none}.hamb{display:inline-flex}
      .topIn{height:62px}.rolePill{display:none}
      .heroGrid,.detailLayout,.appShell,.grid2,.grid3,.grid4,.atsLayout,.profLayout{grid-template-columns:1fr}
      .heroCard{padding:24px;border-radius:26px}
      .searchBox,.filters{grid-template-columns:1fr}
      .statMosaic{grid-template-columns:1fr 1fr}
      .jobCard{grid-template-columns:auto 1fr}
      .jobSide{grid-column:1/-1;align-items:stretch;flex-direction:row;flex-wrap:wrap}
      .deadline{text-align:left}
      .side{display:none}
      .atsDetail{position:static}
      .stickyApply{position:static}
      .bottomNav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(245,241,232,.92);backdrop-filter:blur(18px);border-top:1.5px solid rgba(23,23,23,.1);padding:5px 6px calc(5px + env(safe-area-inset-bottom));gap:3px}
      [data-theme="dark"] .bottomNav{background:rgba(15,15,15,.95)}
      .bottomNav button{flex:1;border-radius:16px;padding:7px 3px;font-size:9px;font-weight:950;color:var(--muted)}
      .bottomNav button.on{background:var(--ink);color:var(--soft)}
      .contentPad{padding-bottom:70px}
      .mobileNav.open{display:grid;position:absolute;left:12px;right:12px;top:66px;background:var(--paper);border:2px solid var(--ink);box-shadow:6px 6px 0 var(--ink);border-radius:22px;padding:8px;gap:4px;z-index:50}
      .mobileNav button{text-align:left;padding:11px;border-radius:14px;font-weight:800;font-size:13px}
      .mobileNav button:hover{background:var(--soft)}
      .footGrid{grid-template-columns:1fr 1fr}
      .toast{top:74px}
      .kanban{min-width:0;flex-wrap:nowrap}
    }
    @media(max-width:560px){
      .wrap{width:calc(100% - 20px)}
      h1{font-size:40px}
      .hero{padding-top:20px}
      .heroCard{padding:20px}

      .sheet{border-radius:26px;box-shadow:5px 5px 0 var(--ink)}
      .tableLike .row{grid-template-columns:1fr 1fr;gap:7px}
      .kcol{width:200px}
    }

  filterJobs();

function salaryNum(s){const m=String(s).match(/\d+/g);return m?Math.max(...m.map(Number)):0}
function filterJobs(){
  let q=(document.getElementById('fQ')?.value||'').toLowerCase(),city=document.getElementById('fCity')?.value||'',cat=document.getElementById('fCat')?.value||'',sal=+(document.getElementById('fSalary')?.value||0),sort=document.getElementById('fSort')?.value||'new';
  let arr=activeJobs().filter(j=>(!q||(j.title+j.co+j.city+j.cat+j.desc+j.tags.join(' ')).toLowerCase().includes(q))&&(!city||j.city===city)&&(!cat||j.cat===cat)&&(!sal||salaryNum(j.salary)>=sal));
  if(sort==='popular')arr.sort((a,b)=>b.views-a.views);
  const cnt=document.getElementById('resultCount');if(cnt)cnt.textContent=`Pronađeno ${arr.length}`;
  const out=document.getElementById('jobsOut');if(out)out.innerHTML=arr.length?arr.map(jobCard).join(''):`<div class="card"><h2>Nema rezultata</h2><p class="sub">Promijeni filtere.</p></div>`;
}

      <div><div class="label">Email *</div><input id="apEmail" type="email" value="${esc(D.cv.email)}" placeholder="email@primjer.me"></div>
    </div>
    <div class="grid grid2">
      <div><div class="label">Broj telefona *</div><input id="apPhone" value="${esc(D.cv.phone)}" placeholder="+382 67 000 000"></div>
      <div><div class="label">Grad *</div><input id="apCity" value="${esc(D.cv.city)}" placeholder="Podgorica"></div>
    </div>
    <div>

      <label class="upload" for="apCvFile">
        📎 <span id="cvFileName">Klikni ili prevuci CV fajl ovdje</span>
        <input type="file" id="apCvFile" accept=".pdf,.doc,.docx,.odt" onchange="document.getElementById('cvFileName').textContent=this.files[0]?.name||'Klikni ili prevuci CV fajl ovdje'">
      </label>
    </div>
    <div>
      <div class="label">Motivaciono pismo / propratni tekst *</div>
      <textarea id="apLetter" maxlength="1200" oninput="document.getElementById('apCnt').textContent=this.value.length+'/1200'" placeholder="Kratko napiši zašto si pravi izbor za ovu poziciju..."></textarea>
      <div class="counter" id="apCnt">0/1200</div>
    </div>
    <div class="sendNote">📧 Prijava se šalje na email poslodavca: <strong>${esc(c.email)}</strong><br><span style="font-size:11px">Potvrda stiže i na tvoj email odmah nakon slanja.</span></div>
    <button class="btn blue" onclick="submitApp(${j.id})">Pošalji prijavu →</button>
  </div>`);
}
function submitApp(id){
  const name=document.getElementById('apName')?.value.trim();
  const email=document.getElementById('apEmail')?.value.trim();
  const phone=document.getElementById('apPhone')?.value.trim();
  const city=document.getElementById('apCity')?.value.trim();
  const letter=document.getElementById('apLetter')?.value.trim();
  if(!name||!email||!phone||!city){toast('⚠️ Popuni sva obavezna polja');return}
  if(!letter){toast('⚠️ Upiši motivaciono pismo');return}
  const file=document.getElementById('apCvFile')?.files[0]?.name||'CV_demo.pdf';
  const j=D.jobs.find(x=>x.id===id);
  const appRef='WH-APP-'+Math.floor(10000+Math.random()*90000);
  D.apps.unshift({jid:id,title:j.title,co:j.co,status:'APPLIED',date:new Date().toLocaleDateString('sr-ME'),phone,city,cv:file,ref:appRef});
  j.apps++;
  D.notifs.unshift({text:`Prijava poslata za ${j.title} · ${j.co}. Referenca: ${appRef}. Potvrda je poslata na tvoj email.`,time:'Upravo',read:false,type:'apply'});
  closeModal();
  toast(`✓ Prijava poslata! Ref: ${appRef}`);
}

// ── ATS — FULL KANBAN WITH DETAIL ──
function rATS(){
  D.selectedCandidate = D.selectedCandidate || D.candidates[0];
  const selId = D.selectedCandidate?.id;
  const kanbanHTML = STATUS_ORDER.map(s=>{
    const cands = D.candidates.filter(c=>c.status===s);
    const cards = cands.map(c=>{
      const labelsHTML = c.labels.map(l=>{const lo=LABEL_OPTS.find(x=>x.key===l);return lo?`<span class="kcardLabel" style="color:${lo.color};border-color:${lo.color}">${esc(l)}</span>`:''}).join('');
      return`<div class="kcard ${c.id===selId?'selected':''}" onclick="selectCandidate(${c.id})">
        <div class="kcardTop">${candAvEl(c,34)}<div><div class="kcardName">${esc(c.name)}</div><div class="kcardTitle">${esc(c.title)}</div></div></div>
        <div class="kcardMeta">📍 ${esc(c.city)} · 📎 ${esc(c.cv||'CV.pdf')}</div>
        ${labelsHTML?`<div class="kcardLabels">${labelsHTML}</div>`:''}
        ${c.comments.length?`<div class="kcardComment">💬 ${esc(c.comments[c.comments.length-1].text)}</div>`:''}
        <div class="kcardActions">
          <button onclick="event.stopPropagation();moveC(${c.id},'prev')" ${STATUS_ORDER.indexOf(s)===0?'disabled style="opacity:.4"':''}>← Nazad</button>
          <button class="fwd" onclick="event.stopPropagation();moveC(${c.id},'next')" ${STATUS_ORDER.indexOf(s)===STATUS_ORDER.length-1?'disabled style="opacity:.4"':''}>Dalje →</button>
        </div>
      </div>`;
    }).join('') || `<div style="text-align:center;padding:20px 10px;color:var(--muted);font-size:12px">—</div>`;
    return`<div class="kcol"><div class="kcolHead"><h4>${STATUS_LABELS[s]}</h4><span class="kcolCount">${cands.length}</span></div>${cards}</div>`;
  }).join('');

  const sel = D.selectedCandidate;
  const detailHTML = sel ? `
    <div class="atsDetail">
      <div class="candDetailHead">
        ${candAvEl(sel,56)}
        <div style="flex:1">
          <h2 style="font-size:19px">${esc(sel.name)}</h2>
          <p class="sub">${esc(sel.title)}</p>
          <p style="font-size:12px;color:var(--muted);margin-top:3px">📍 ${esc(sel.city)}</p>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${badge(sel.status,STATUS_COLORS[sel.status]||'gray')}
        ${sel.unlocked?badge('Kontakt otključan','green'):badge('Kontakt zaključan','gray')}
      </div>
      ${sel.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join(' ')}
      ${sel.unlocked?`<div style="background:var(--soft);border:1.5px solid var(--line2);border-radius:14px;padding:12px;margin-top:10px;font-size:12px;line-height:2">📧 <b>${esc(sel.email)}</b><br>📞 <b>${esc(sel.phone)}</b></div>`:`<div style="margin-top:10px"><button class="btn blue sm" style="width:100%" onclick="unlockCandidateATS(${sel.id})">🔓 Unlock kontakt (1 kredit)</button></div>`}
      <div style="margin-top:10px"><button class="btn ghost sm" style="width:100%" onclick="toast('CV: ${esc(sel.cv||'CV.pdf')}')">📎 Vidi CV — ${esc(sel.cv||'CV.pdf')}</button></div>
      <div style="margin-top:12px">
        <div class="miniTitle">Oznake</div>
        <div class="labelPicker">${LABEL_OPTS.map(l=>`<span class="labelOpt ${sel.labels.includes(l.key)?'active':''}" style="color:${l.color};border-color:${l.color}" onclick="toggleLabel(${sel.id},'${l.key}')">${esc(l.key)}</span>`).join('')}</div>
      </div>
      <div class="commentsSection">
        <div class="miniTitle">Komentari tima (${sel.comments.length})</div>
        ${sel.comments.map(c=>`<div class="commentItem"><div class="commentMeta">${esc(c.author)} · ${esc(c.time)}</div>${esc(c.text)}</div>`).join('')}
        <div class="commentForm">
          <input id="commentInput_${sel.id}" placeholder="Dodaj komentar..." onkeydown="if(event.key==='Enter')addComment(${sel.id})">
          <button class="btn lime xs" onclick="addComment(${sel.id})">Dodaj</button>
        </div>
      </div>
      <div style="margin-top:12px"><button class="btn red xs" style="width:100%" onclick="D.candidates.find(x=>x.id===${sel.id}).status='APPLIED';D.selectedCandidate=null;rATS();toast('Kandidat vraćen na Prijave')">Vrati na početak</button></div>
    </div>` : `<div class="atsDetail"><div class="atsDetailEmpty"><span>👆</span><p style="font-size:13px">Klikni na kandidata da vidiš detalje, komentare i oznake.</p></div></div>`;

  appPage(`<div class="sectionHead"><div><h2>ATS aplikanti</h2><p class="sub">Klikni kandidata za detalje. Koristite ← → za pomjeranje kroz faze.</p></div><button class="btn ghost sm" onclick="exportATS()">Export prijava</button></div>
  <div class="atsLayout">
    <div>
      <div class="atsWrap"><div class="kanban">${kanbanHTML}</div></div>
    </div>
    ${detailHTML}
  </div>`);
}
function selectCandidate(id){D.selectedCandidate=D.candidates.find(x=>x.id===id);rATS()}
function moveC(id,dir){
  const c=D.candidates.find(x=>x.id===id);
  const i=STATUS_ORDER.indexOf(c.status);
  const ni=dir==='next'?Math.min(STATUS_ORDER.length-1,i+1):Math.max(0,i-1);
  if(ni===i)return;
  c.status=STATUS_ORDER[ni];
  D.notifs.unshift({text:`Kandidat ${c.name} pomjeren u fazu: ${STATUS_LABELS[c.status]}`,time:'Upravo',read:false,type:'status'});
  toast(`${c.name} → ${STATUS_LABELS[c.status]}`);
  D.selectedCandidate=c;
  rATS();
}
function unlockCandidateATS(id){
  const c=D.candidates.find(x=>x.id===id);
  if(D.credits<=0){toast('⚠️ Nema unlock kredita. Kupi plan.');return}
  c.unlocked=true;D.credits--;
  toast(`Kontakt otključan: ${c.name} · ostalo ${D.credits} kredita`);
  rATS();
}
function toggleLabel(id,label){
  const c=D.candidates.find(x=>x.id===id);
  const idx=c.labels.indexOf(label);
  if(idx>=0)c.labels.splice(idx,1);else c.labels.push(label);
  rATS();
}
function addComment(id){
  const input=document.getElementById(`commentInput_${id}`);
  const text=input?.value?.trim();
  if(!text){toast('Upiši komentar');return}
  const c=D.candidates.find(x=>x.id===id);
  c.comments.push({author:'Mila HR',time:new Date().toLocaleString('sr-ME'),text});
  input.value='';
  toast('Komentar dodan ✓');
  rATS();
}
function exportATS(){toast('Export simulacija: ATS_prijave.xlsx')}

}
function renderCandidates(list){
  return list.map(c=>`<div class="card"><div style="display:flex;gap:12px;align-items:start;margin-bottom:12px">${candAvEl(c,48)}<div style="flex:1"><b style="font-size:15px">${esc(c.name)}</b><p class="sub">${esc(c.title)}</p><p style="font-size:12px;color:var(--muted)">📍 ${esc(c.city)} · ${c.public?'🌐 Javni profil':'🔒 Privatno'}</p></div>${badge(c.status,STATUS_COLORS[c.status]||'gray')}</div><div class="tags" style="margin-bottom:12px">${c.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>${c.unlocked?`<div style="background:var(--soft);border:1.5px solid var(--line2);border-radius:14px;padding:10px;font-size:12px;line-height:2">📧 <b>${esc(c.email)}</b><br>📞 <b>${esc(c.phone)}</b></div>`:`<p class="sub" style="font-size:12px">Kontakt zaključan — koristi kredit da vidiš podatke.</p>`}<div style="display:flex;gap:7px;margin-top:10px"><button class="btn ${c.unlocked?'ghost':'blue'} sm" onclick="unlockCand(${c.id})">${c.unlocked?'✓ Otključano':'🔓 Unlock (1 kredit)'}</button></div></div>`).join('');
}
function filterCandidates(){
  const q=(document.getElementById('candQ')?.value||'').toLowerCase(),city=document.getElementById('candCity')?.value||'',vis=document.getElementById('candVis')?.value||'';
  const r=D.candidates.filter(c=>(!q||(c.name+c.title+c.city+c.skills.join(' ')).toLowerCase().includes(q))&&(!city||c.city===city)&&(!vis||c.public===true));
  const out=document.getElementById('candidatesOut');if(out)out.innerHTML=renderCandidates(r)||'<p class="sub">Nema kandidata.</p>';
}
function unlockCand(id){
  const c=D.candidates.find(x=>x.id===id);
  if(c.unlocked)return toast('Već otključano');
  if(D.credits<=0)return toast('⚠️ Nema kredita. Kupi plan.');
  c.unlocked=true;D.credits--;toast(`Otključan: ${c.name} · ostalo ${D.credits} kredita`);rCandidates();
}

// ── BILLING ──
function rBilling(){
  const plans=[
    {name:'Starter',price:'25',features:['3 aktivna oglasa','10 unlock kredita/mj','Osnovna podrška'],color:'ghost'},
    {name:'Growth',price:'80',features:['10 aktivnih oglasa','50 unlock kredita/mj','Logo firme na oglasima','Priority podrška'],color:'blue',active:D.plan==='Growth'},
    {name:'Pro',price:'200',features:['Neograničeni oglasi','200 unlock kredita/mj','API pristup','Dedicated podrška'],color:'pink'}
  ];
  appPage(`<div class="sectionHead"><div><h2>Plan i uplate</h2><p class="sub">Bankovni transfer → admin potvrđuje → aktivacioni kod → plan aktivan.</p></div></div>
  <div class="grid grid3" style="margin-bottom:20px">${plans.map(p=>`<div class="planCard ${p.active?'active':''}"><h2>${p.name}</h2><div class="planPrice">${p.price}€<span style="font-size:14px;font-weight:400"> /mjes</span></div><ul class="planFeat">${p.feats||p.features.map(f=>`<li>${f}</li>`).join('')}</ul><button class="btn ${p.active?'lime':p.color}" onclick="orderPlan('${p.name}',${p.price})">${p.active?'✓ Aktivan plan':'Naruči'}</button></div>`).join('')}</div>
  <div class="card"><div class="miniTitle">Aktiviraj kod</div><p class="sub" style="margin-bottom:12px">Nakon što admin potvrdi uplatu, generiše se aktivacioni kod i šalje ti na email.</p><div style="display:flex;gap:8px"><input id="activationCode" placeholder="WH-2026-XXXX-XXXX" style="flex:1;background:var(--soft);border:2px solid var(--line2);border-radius:14px;padding:11px 12px;font-weight:700"><button class="btn blue" onclick="activateCode()">Aktiviraj</button></div></div>
  <div style="height:16px"></div>
  <div class="card"><div class="miniTitle">Moje narudžbine</div>${ordersTable(true)}</div>`);
}
function orderPlan(plan,amount){
  const id='WH-'+new Date().getFullYear()+'-'+Math.floor(1000+Math.random()*9000);
  D.orders.unshift({id,co:'EventPro d.o.o.',plan,amount,status:'PENDING',date:new Date().toLocaleDateString('sr-ME'),code:''});
  showModal(`<div class="sheetTop"><div><h3>Narudžba kreirana ✓</h3><p class="sub">Uplati na račun — admin potvrđuje u roku 24h.</p></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="bkBox"><b>Primalac:</b> WorkingHub d.o.o.<br><b>IBAN:</b> ME25 5050 0000 1234 5678 90<br><b>Iznos:</b> ${amount},00 EUR<br><b>Svrha uplate:</b> ${plan} plan<br><b>Poziv na broj:</b> ${id}</div>
  <p class="sub" style="font-size:12px;margin-bottom:12px">Nakon uplate, admin potvrđuje i generiše aktivacioni kod koji stigne na tvoj email.</p>
  <button class="btn blue" style="width:100%" onclick="closeModal();rBilling()">Razumijem</button>`);
}
function activateCode(){
  const code=document.getElementById('activationCode')?.value.trim();
  if(!code||!code.startsWith('WH-')){toast('⚠️ Upiši validan kod');return}
  D.plan='Growth';D.credits+=50;
  toast('🎉 Plan aktiviran! +50 kredita');closeModal();rBilling();
}
function ordersTable(showActivate=false){
  return`<div class="tableLike">${D.orders.map(o=>`<div class="row"><div><b>${esc(o.id)}</b><small>${esc(o.co)} · ${o.date}</small>${o.code?`<br><small style="color:var(--green);font-family:monospace">Kod: ${esc(o.code)}</small>`:''}</div><div>${esc(o.plan)}<small>${o.amount}€</small></div><div>${badge(o.status,o.status==='PAID'?'green':o.status==='PENDING'?'orange':'gray')}</div><div>${D.role==='admin'&&o.status==='PENDING'?`<button class="btn blue xs" onclick="confirmOrder('${o.id}')">Potvrdi</button>`:o.status==='PAID'?`<button class="btn ghost xs" onclick="toast('Kod: ${esc(o.code)}')">Kod</button>`:badge('Čeka','gray')}</div></div>`).join('')}</div>`;
}

// ── ADMIN ──
function rOrders(){appPage(`<div class="sectionHead"><div><h2>Uplate i kodovi</h2><p class="sub">Admin potvrđuje bankovne uplate i generiše aktivacione kodove.</p></div></div><div class="card">${ordersTable()}</div>`)}
function confirmOrder(id){
  const o=D.orders.find(x=>x.id===id);
  o.status='PAID';
  o.code='WH-'+new Date().getFullYear()+'-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
  toast('✓ Uplata potvrđena. Kod: '+o.code);
  rOrders();
}
function rModeration(){
  appPage(`<div class="sectionHead"><div><h2>Moderacija oglasa</h2><p class="sub">Admin odobrava, ističe i uklanja oglase.</p></div><button class="btn ghost sm" onclick="exportData('oglasi')">Export</button></div>
  <div class="jobList">${D.jobs.map(j=>`<div class="jobCard"><div class="logo" style="font-size:16px">${company(j.cid).logoImg?`<img src="${company(j.cid).logoImg}" alt="">`:esc(company(j.cid).logo)}</div><div><div class="tags" style="margin-bottom:6px">${badge(j.cat,'blue')}${badge(j.status,j.status==='ACTIVE'?'green':'gray')}${j.featured?badge('★ Istaknuto','orange'):''}</div><div class="jobTitle">${esc(j.title)}</div><p class="meta">${esc(j.co)} · ${esc(j.city)} · ${j.views} pregleda · ${j.apps} prijava</p></div><div class="jobSide"><button class="btn ghost sm" onclick="toast('Uredi: '+${j.id})">Uredi</button><button class="btn lime sm" onclick="D.jobs.find(j=>j.id===${j.id}).featured=true;toast('★ Istaknuto');rModeration()">Istakni</button><button class="btn red sm" onclick="D.jobs.find(j=>j.id===${j.id}).status='PAUSED';toast('Oglas pauziran');rModeration()">Pauziraj</button></div></div>`).join('')}`);
}
function rUsers(){
  appPage(`<div class="sectionHead"><div><h2>Korisnici</h2><p class="sub">Lista kandidata i firmi.</p></div><button class="btn ghost sm" onclick="exportData('korisnici')">Export</button></div>
  <div class="grid grid2">
    <div class="card"><div class="miniTitle">Kandidati (${D.candidates.length})</div>${D.candidates.map(c=>`<div style="display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">${candAvEl(c,36)}<div><b style="font-size:13px">${esc(c.name)}</b><p class="sub" style="font-size:11px">${esc(c.city)} · ${esc(c.title)}</p></div>${badge(c.public?'PUBLIC':'PRIVATE',c.public?'green':'gray')}</div>`).join('')}</div>
    <div class="card"><div class="miniTitle">Firme (${D.companies.length})</div>${D.companies.map(c=>`<div style="display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)"><div class="logo" style="width:36px;height:36px;font-size:13px">${c.logoImg?`<img src="${c.logoImg}" alt="">`:esc(c.logo)}</div><div><b style="font-size:13px">${esc(c.name)}</b><p class="sub" style="font-size:11px">${esc(c.city)} · ${esc(c.email)}</p></div></div>`).join('')}</div>
  </div>`);
}
function exportData(type){toast('Export simulacija: '+type+'.csv')}

// ── INIT ──
updateNav();
rHome();
</script>
</body>
</html>
