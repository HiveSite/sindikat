<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terrain Studio</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <style>
    :root{
      --bg:#070b11;
      --panel:#0f1520;
      --panel2:#141c29;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.12);
      --text:#edf3fb;
      --muted:#8d9bb0;
      --accent:#74eadb;
      --accent2:#75a7ff;
      --danger:#ff6e91;
      --radius:20px;
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;width:100%;height:100%;
      font-family:Inter,Arial,sans-serif;
      background:radial-gradient(circle at top left,#0d1623 0%,#070b11 60%);
      color:var(--text);overflow:hidden;
    }
    button,input,select{font:inherit}
    .app{
      width:100%;height:100vh;display:grid;grid-template-columns:390px 1fr;
    }
    .sidebar{
      border-right:1px solid var(--line);
      background:linear-gradient(180deg,rgba(10,14,21,.98),rgba(7,10,16,.98));
      padding:18px;overflow:auto;
    }
    .brand{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      margin-bottom:16px;padding-bottom:4px;
    }
    .brand-left{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:42px;height:42px;border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 10px 30px rgba(117,167,255,.28);
      flex:0 0 auto;
    }
    .brand h1{
      margin:0;font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1;
    }
    .brand p{
      margin:4px 0 0;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    }
    .pill{
      padding:8px 10px;border-radius:999px;font-size:11px;font-weight:800;
      background:rgba(116,234,219,.08);border:1px solid rgba(116,234,219,.18);color:#cbfff8;
      white-space:nowrap;
    }
    .card{
      background:rgba(15,21,32,.95);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }
    .label-top{
      margin:0 0 14px;font-size:12px;font-weight:800;letter-spacing:.14em;
      color:var(--muted);text-transform:uppercase;
    }
    .field{display:grid;gap:8px;margin-bottom:12px}
    .field:last-child{margin-bottom:0}
    .field label{
      font-size:12px;font-weight:700;color:#dce5f3;
    }
    input[type="text"],select{
      height:46px;width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.08);
      background:var(--panel2);color:var(--text);padding:0 14px;outline:none;
    }
    input[type="text"]:focus,select:focus{
      border-color:rgba(117,167,255,.5);
      box-shadow:0 0 0 3px rgba(117,167,255,.14);
    }
    input[type="range"]{width:100%;accent-color:var(--accent)}
    .range-row{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;color:var(--muted);font-size:12px;
    }
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{
      height:46px;border:0;border-radius:14px;font-weight:800;cursor:pointer;
      transition:transform .18s ease,opacity .18s ease,box-shadow .18s ease;
    }
    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#07131d;box-shadow:0 14px 34px rgba(117,167,255,.18);
    }
    .btn-secondary{
      background:#1b2432;color:var(--text);border:1px solid rgba(255,255,255,.06);
    }
    .btn-danger{
      background:rgba(255,110,145,.08);color:#ffd4df;border:1px solid rgba(255,110,145,.18);
    }
    .status{
      min-height:56px;border-radius:16px;border:1px solid var(--line2);
      background:rgba(255,255,255,.03);display:flex;align-items:center;padding:12px 14px;
      font-size:13px;line-height:1.45;color:#deebff;
    }
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .stat{
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      border-radius:16px;padding:12px;
    }
    .stat .k{
      color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      margin-bottom:6px;font-weight:700;
    }
    .stat .v{font-size:15px;font-weight:800}
    .main{
      min-width:0;min-height:0;display:grid;grid-template-rows:48% 52%;padding:14px;gap:14px;
    }
    .surface{
      position:relative;width:100%;height:100%;border-radius:28px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,rgba(10,16,26,.88),rgba(7,10,16,.96));
      box-shadow:var(--shadow);
    }
    #map,#viewer{width:100%;height:100%}
    .overlay{
      position:absolute;top:18px;left:18px;right:18px;z-index:500;
      display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:none;
    }
    .overlay > *{
      pointer-events:auto;
      display:inline-flex;align-items:center;gap:10px;
      border-radius:16px;padding:10px 12px;
      background:rgba(8,12,18,.74);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);font-size:12px;font-weight:800;color:var(--text);
    }
    .overlay-right{display:flex;gap:8px;flex-wrap:wrap}
    .overlay-right > span{
      border-radius:12px;padding:9px 11px;background:rgba(8,12,18,.74);
      border:1px solid rgba(255,255,255,.08);
    }
    .leaflet-control-container .leaflet-top.leaflet-left{top:74px;left:14px}
    .leaflet-control-zoom,.leaflet-draw{border:none!important;box-shadow:none!important}
    .leaflet-bar a,.leaflet-draw-toolbar a,.leaflet-draw-actions a{
      background-color:rgba(12,17,25,.92)!important;color:#fff!important;
      border:1px solid rgba(255,255,255,.08)!important;backdrop-filter:blur(10px);
    }
    .leaflet-bar a:hover,.leaflet-draw-toolbar a:hover,.leaflet-draw-actions a:hover{
      background-color:rgba(22,29,41,.98)!important;
    }
    @media (max-width:1180px){
      .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
      .sidebar{border-right:0;border-bottom:1px solid var(--line)}
      .main{grid-template-rows:44vh 56vh}
    }
    @media (max-width:760px){
      .grid-2,.stats{grid-template-columns:1fr}
      .overlay{flex-direction:column;align-items:stretch}
      .pill{display:none}
      .sidebar,.main{padding:12px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-left">
          <div class="logo"></div>
          <div>
            <h1>Terrain Studio</h1>
            <p>Map to 3D export</p>
          </div>
        </div>
        <div class="pill">Single file</div>
      </div>

      <section class="card">
        <p class="label-top">Search</p>
        <div class="field">
          <label for="searchInput">Location</label>
          <input id="searchInput" type="text" placeholder="Search place" />
        </div>
        <div class="grid-2">
          <button id="searchBtn" class="btn-secondary">Find</button>
          <button id="fitSelectionBtn" class="btn-secondary">Fit Area</button>
        </div>
      </section>

      <section class="card">
        <p class="label-top">Build</p>
        <div class="field">
          <label for="datasetSelect">Dataset</label>
          <select id="datasetSelect">
            <option value="eudem" selected>EU-DEM</option>
            <option value="mapzen">Mapzen</option>
            <option value="srtm30m">SRTM 30m</option>
            <option value="aster30m">ASTER 30m</option>
          </select>
        </div>
        <div class="field">
          <label for="gridSize">Resolution</label>
          <select id="gridSize">
            <option value="24">24 × 24</option>
            <option value="32">32 × 32</option>
            <option value="40" selected>40 × 40</option>
            <option value="48">48 × 48</option>
          </select>
        </div>
        <div class="field">
          <label for="heightScale">Relief</label>
          <input id="heightScale" type="range" min="0.5" max="8" value="2.8" step="0.1" />
          <div class="range-row"><span>Scale</span><strong id="heightScaleValue">2.8x</strong></div>
        </div>
        <div class="field">
          <label for="baseHeight">Base</label>
          <input id="baseHeight" type="range" min="0" max="100" value="20" step="1" />
          <div class="range-row"><span>Height</span><strong id="baseHeightValue">20</strong></div>
        </div>
        <div class="grid-2">
          <button id="generateBtn" class="btn-primary">Generate</button>
          <button id="clearSelectionBtn" class="btn-danger">Clear</button>
        </div>
      </section>

      <section class="card">
        <p class="label-top">Edit</p>
        <div class="field">
          <label for="smoothStrength">Smoothing</label>
          <input id="smoothStrength" type="range" min="0" max="5" value="1" step="1" />
          <div class="range-row"><span>Passes</span><strong id="smoothStrengthValue">1</strong></div>
        </div>
        <div class="grid-2">
          <button id="applySmoothBtn" class="btn-secondary">Smooth</button>
          <button id="toggleWireframeBtn" class="btn-secondary">Wireframe</button>
        </div>
        <div class="grid-2" style="margin-top:10px">
          <button id="resetCameraBtn" class="btn-secondary">Reset View</button>
          <button id="centerModelBtn" class="btn-secondary">Center</button>
        </div>
      </section>

      <section class="card">
        <p class="label-top">Export</p>
        <div class="grid-2">
          <button id="exportGLBBtn" class="btn-primary" disabled>GLB</button>
          <button id="exportSTLBtn" class="btn-primary" disabled>STL</button>
        </div>
        <div class="grid-2" style="margin-top:10px">
          <button id="captureBtn" class="btn-secondary">PNG</button>
          <button id="rebuildBtn" class="btn-secondary">Rebuild</button>
        </div>
      </section>

      <section class="card">
        <p class="label-top">Status</p>
        <div id="statusBox" class="status">Ready</div>
        <div class="stats">
          <div class="stat"><div class="k">Dataset</div><div class="v" id="datasetStat">—</div></div>
          <div class="stat"><div class="k">Samples</div><div class="v" id="samplesStat">—</div></div>
          <div class="stat"><div class="k">Min</div><div class="v" id="minStat">—</div></div>
          <div class="stat"><div class="k">Max</div><div class="v" id="maxStat">—</div></div>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="surface">
        <div class="overlay">
          <div id="selectionMeta">No selection</div>
          <div class="overlay-right">
            <span id="locationMeta">—</span>
          </div>
        </div>
        <div id="map"></div>
      </section>

      <section class="surface">
        <div class="overlay">
          <div>3D Preview</div>
          <div class="overlay-right">
            <span>Orbit</span>
            <span>Pan</span>
            <span>Zoom</span>
          </div>
        </div>
        <div id="viewer"></div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.1.0/turf.min.js"></script>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFExporter } from 'https://unpkg.com/three@0.163.0/examples/jsm/exporters/GLTFExporter.js';
    import { STLExporter } from 'https://unpkg.com/three@0.163.0/examples/jsm/exporters/STLExporter.js';

    const el = {
      searchInput: document.getElementById('searchInput'),
      searchBtn: document.getElementById('searchBtn'),
      fitSelectionBtn: document.getElementById('fitSelectionBtn'),
      clearSelectionBtn: document.getElementById('clearSelectionBtn'),
      datasetSelect: document.getElementById('datasetSelect'),
      gridSize: document.getElementById('gridSize'),
      heightScale: document.getElementById('heightScale'),
      heightScaleValue: document.getElementById('heightScaleValue'),
      baseHeight: document.getElementById('baseHeight'),
      baseHeightValue: document.getElementById('baseHeightValue'),
      generateBtn: document.getElementById('generateBtn'),
      smoothStrength: document.getElementById('smoothStrength'),
      smoothStrengthValue: document.getElementById('smoothStrengthValue'),
      applySmoothBtn: document.getElementById('applySmoothBtn'),
      toggleWireframeBtn: document.getElementById('toggleWireframeBtn'),
      resetCameraBtn: document.getElementById('resetCameraBtn'),
      centerModelBtn: document.getElementById('centerModelBtn'),
      exportGLBBtn: document.getElementById('exportGLBBtn'),
      exportSTLBtn: document.getElementById('exportSTLBtn'),
      captureBtn: document.getElementById('captureBtn'),
      rebuildBtn: document.getElementById('rebuildBtn'),
      statusBox: document.getElementById('statusBox'),
      datasetStat: document.getElementById('datasetStat'),
      samplesStat: document.getElementById('samplesStat'),
      minStat: document.getElementById('minStat'),
      maxStat: document.getElementById('maxStat'),
      selectionMeta: document.getElementById('selectionMeta'),
      locationMeta: document.getElementById('locationMeta'),
      viewer: document.getElementById('viewer')
    };

    const state = {
      selectedLayer: null,
      selectedGeoJSON: null,
      terrainMesh: null,
      baseMesh: null,
      sceneGroup: null,
      wireframe: false,
      generating: false,
      lastGridData: null,
      lastHeights: null,
      locationLabel: 'Podgorica'
    };

    function setStatus(text){ el.statusBox.textContent = text; }

    function updateRanges(){
      el.heightScaleValue.textContent = `${parseFloat(el.heightScale.value).toFixed(1)}x`;
      el.baseHeightValue.textContent = `${parseInt(el.baseHeight.value,10)}`;
      el.smoothStrengthValue.textContent = `${parseInt(el.smoothStrength.value,10)}`;
    }
    updateRanges();
    el.heightScale.addEventListener('input', updateRanges);
    el.baseHeight.addEventListener('input', updateRanges);
    el.smoothStrength.addEventListener('input', updateRanges);

    const map = L.map('map', { zoomControl:true, preferCanvas:true }).setView([42.441, 19.262], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:19,
      attribution:'&copy; OpenStreetMap contributors'
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit:{ featureGroup: drawnItems, remove:true },
      draw:{
        polyline:false,
        circle:false,
        circlemarker:false,
        marker:false,
        polygon:{
          allowIntersection:false,
          shapeOptions:{ color:'#74eadb', weight:2, fillColor:'#74eadb', fillOpacity:.08 }
        },
        rectangle:{
          shapeOptions:{ color:'#75a7ff', weight:2, fillColor:'#75a7ff', fillOpacity:.08 }
        }
      }
    });
    map.addControl(drawControl);

    function updateSelectionMeta(){
      if(!state.selectedGeoJSON){
        el.selectionMeta.textContent = 'No selection';
        return;
      }
      const bbox = turf.bbox(state.selectedGeoJSON);
      const area = turf.area(state.selectedGeoJSON) / 1000000;
      el.selectionMeta.textContent = `${area.toFixed(2)} km² · ${bbox.map(v => v.toFixed(4)).join(', ')}`;
    }

    function setSelection(layer){
      state.selectedLayer = layer;
      state.selectedGeoJSON = layer.toGeoJSON();
      updateSelectionMeta();
    }

    map.on(L.Draw.Event.CREATED, e => {
      drawnItems.clearLayers();
      drawnItems.addLayer(e.layer);
      setSelection(e.layer);
      setStatus('Area selected');
    });

    map.on(L.Draw.Event.EDITED, () => {
      drawnItems.eachLayer(layer => setSelection(layer));
      setStatus('Area updated');
    });

    map.on(L.Draw.Event.DELETED, () => {
      state.selectedLayer = null;
      state.selectedGeoJSON = null;
      updateSelectionMeta();
      setStatus('Selection cleared');
    });

    el.clearSelectionBtn.addEventListener('click', () => {
      drawnItems.clearLayers();
      state.selectedLayer = null;
      state.selectedGeoJSON = null;
      updateSelectionMeta();
      setStatus('Selection cleared');
    });

    el.fitSelectionBtn.addEventListener('click', () => {
      if(state.selectedLayer) map.fitBounds(state.selectedLayer.getBounds(), { padding:[30,30] });
    });

    async function geocodeLocation(query){
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(query)}`;
      const r = await fetch(url, { headers:{ 'Accept':'application/json' } });
      if(!r.ok) throw new Error('Search failed');
      return r.json();
    }

    async function doSearch(){
      const query = el.searchInput.value.trim();
      if(!query){ setStatus('Enter location'); return; }
      setStatus('Searching');
      try{
        const res = await geocodeLocation(query);
        if(!res.length){ setStatus('No result'); return; }
        const item = res[0];
        state.locationLabel = item.display_name.split(',').slice(0,2).join(', ');
        el.locationMeta.textContent = state.locationLabel;
        map.setView([parseFloat(item.lat), parseFloat(item.lon)], 13);
        setStatus('Location found');
      }catch(err){
        console.error(err);
        setStatus('Search error');
      }
    }

    el.searchBtn.addEventListener('click', doSearch);
    el.searchInput.addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });
    el.locationMeta.textContent = state.locationLabel;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x09111a);

    const camera = new THREE.PerspectiveCamera(50, el.viewer.clientWidth / el.viewer.clientHeight, 0.1, 5000);
    camera.position.set(160, 130, 180);

    const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(el.viewer.clientWidth, el.viewer.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    el.viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = .08;
    controls.target.set(0, 20, 0);
    controls.minDistance = 40;
    controls.maxDistance = 800;

    scene.add(new THREE.HemisphereLight(0xb7d2ff, 0x16202d, 1.4));

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.5);
    dir1.position.set(160, 240, 120);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x86b6ff, 0.9);
    dir2.position.set(-120, 100, -140);
    scene.add(dir2);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(420, 80),
      new THREE.MeshBasicMaterial({ color:0x0d1624, transparent:true, opacity:.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.2;
    scene.add(floor);

    const grid = new THREE.GridHelper(420, 28, 0x223147, 0x16202d);
    scene.add(grid);

    function resetCamera(){
      camera.position.set(160, 130, 180);
      controls.target.set(0, 20, 0);
      controls.update();
    }
    el.resetCameraBtn.addEventListener('click', resetCamera);

    window.addEventListener('resize', () => {
      camera.aspect = el.viewer.clientWidth / el.viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(el.viewer.clientWidth, el.viewer.clientHeight);
    });

    function animate(){
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    function clearModel(){
      if(state.sceneGroup){
        scene.remove(state.sceneGroup);
        state.sceneGroup.traverse(obj => {
          if(obj.geometry) obj.geometry.dispose();
          if(obj.material){
            if(Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
          }
        });
      }
      state.sceneGroup = null;
      state.terrainMesh = null;
      state.baseMesh = null;
      el.exportGLBBtn.disabled = true;
      el.exportSTLBtn.disabled = true;
    }

    function buildSamplingGrid(geojson, gridSize){
      const bbox = turf.bbox(geojson);
      const [minLng, minLat, maxLng, maxLat] = bbox;
      const points = [];
      for(let y = 0; y < gridSize; y++){
        for(let x = 0; x < gridSize; x++){
          const lng = minLng + (x / (gridSize - 1)) * (maxLng - minLng);
          const lat = maxLat - (y / (gridSize - 1)) * (maxLat - minLat);
          const point = turf.point([lng, lat]);
          const inside = turf.booleanPointInPolygon(point, geojson, { ignoreBoundary:false });
          points.push({ x, y, lng, lat, inside });
        }
      }
      return { bbox, points, gridSize };
    }

    async function fetchElevations(dataset, points){
      const chunkSize = 100;
      const results = [];
      for(let i = 0; i < points.length; i += chunkSize){
        const chunk = points.slice(i, i + chunkSize);
        const locations = chunk.map(p => `${p.lat},${p.lng}`).join('|');
        const url = `https://api.opentopodata.org/v1/${dataset}?locations=${encodeURIComponent(locations)}`;
        const r = await fetch(url);
        if(!r.ok) throw new Error('Elevation unavailable');
        const data = await r.json();
        if(!data.results) throw new Error('Invalid elevation data');
        results.push(...data.results);
      }
      return results;
    }

    function fillNullHeights(gridSize, heights){
      let result = [...heights];
      for(let pass = 0; pass < 8; pass++){
        const next = [...result];
        for(let y = 0; y < gridSize; y++){
          for(let x = 0; x < gridSize; x++){
            const i = y * gridSize + x;
            if(result[i] !== null && Number.isFinite(result[i])) continue;
            const neighbors = [];
            for(let oy = -1; oy <= 1; oy++){
              for(let ox = -1; ox <= 1; ox++){
                if(ox === 0 && oy === 0) continue;
                const nx = x + ox;
                const ny = y + oy;
                if(nx < 0 || ny < 0 || nx >= gridSize || ny >= gridSize) continue;
                const ni = ny * gridSize + nx;
                const v = result[ni];
                if(v !== null && Number.isFinite(v)) neighbors.push(v);
              }
            }
            if(neighbors.length) next[i] = neighbors.reduce((a,b)=>a+b,0)/neighbors.length;
          }
        }
        result = next;
      }
      const fallback = result.find(v => v !== null && Number.isFinite(v)) ?? 0;
      return result.map(v => (v !== null && Number.isFinite(v)) ? v : fallback);
    }

    function smoothHeights(gridSize, heights, passes){
      let current = [...heights];
      for(let p = 0; p < passes; p++){
        const next = [...current];
        for(let y = 1; y < gridSize - 1; y++){
          for(let x = 1; x < gridSize - 1; x++){
            const i = y * gridSize + x;
            const vals = [];
            for(let oy = -1; oy <= 1; oy++){
              for(let ox = -1; ox <= 1; ox++){
                vals.push(current[(y + oy) * gridSize + (x + ox)]);
              }
            }
            next[i] = vals.reduce((a,b)=>a+b,0) / vals.length;
          }
        }
        current = next;
      }
      return current;
    }

    function buildMaskTexture(gridSize, points){
      const canvas = document.createElement('canvas');
      canvas.width = gridSize;
      canvas.height = gridSize;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(gridSize, gridSize);
      for(let i = 0; i < points.length; i++){
        const a = points[i].inside ? 255 : 0;
        img.data[i * 4 + 0] = 255;
        img.data[i * 4 + 1] = 255;
        img.data[i * 4 + 2] = 255;
        img.data[i * 4 + 3] = a;
      }
      ctx.putImageData(img, 0, 0);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      return texture;
    }

    function buildTerrainModel({ gridSize, points, heights, heightScale, baseHeight }){
      clearModel();

      const width = 170;
      const depth = 170;
      const plane = new THREE.PlaneGeometry(width, depth, gridSize - 1, gridSize - 1);
      plane.rotateX(-Math.PI / 2);

      const min = Math.min(...heights);
      const max = Math.max(...heights);
      const relief = Math.max(1, max - min);
      const normalization = 80 / relief;

      const pos = plane.attributes.position;
      for(let i = 0; i < pos.count; i++){
        const h = heights[i];
        const y = (h - min) * normalization * heightScale;
        pos.setY(i, y);
      }
      plane.computeVertexNormals();

      const maskTexture = buildMaskTexture(gridSize, points);

      const terrainMat = new THREE.MeshStandardMaterial({
        color:0x96c4ff,
        roughness:.86,
        metalness:.02,
        transparent:true,
        alphaMap: maskTexture,
        side: THREE.DoubleSide,
        wireframe: state.wireframe
      });

      const terrain = new THREE.Mesh(plane, terrainMat);

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(width, baseHeight, depth),
        new THREE.MeshStandardMaterial({ color:0x182231, roughness:.96, metalness:.02 })
      );
      base.position.y = -baseHeight / 2;

      const edge = new THREE.Mesh(
        new THREE.BoxGeometry(width + .8, baseHeight + .6, depth + .8),
        new THREE.MeshBasicMaterial({ color:0x243247, transparent:true, opacity:.4 })
      );
      edge.position.y = -baseHeight / 2;

      const group = new THREE.Group();
      group.add(base, edge, terrain);
      scene.add(group);

      state.sceneGroup = group;
      state.terrainMesh = terrain;
      state.baseMesh = base;

      el.datasetStat.textContent = el.datasetSelect.value;
      el.samplesStat.textContent = `${gridSize * gridSize}`;
      el.minStat.textContent = `${min.toFixed(1)} m`;
      el.maxStat.textContent = `${max.toFixed(1)} m`;
      el.exportGLBBtn.disabled = false;
      el.exportSTLBtn.disabled = false;

      centerModel();
    }

    function centerModel(){
      if(!state.sceneGroup) return;
      const box = new THREE.Box3().setFromObject(state.sceneGroup);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + size.x * 1.1, center.y + size.y * 1.2 + 70, center.z + size.z * 1.1);
      controls.update();
    }
    el.centerModelBtn.addEventListener('click', centerModel);

    async function generateModel(){
      if(state.generating) return;
      if(!state.selectedGeoJSON){
        setStatus('Draw an area first');
        return;
      }

      state.generating = true;
      el.generateBtn.disabled = true;

      try{
        setStatus('Sampling terrain');
        const gridSize = parseInt(el.gridSize.value, 10);
        const dataset = el.datasetSelect.value;
        const heightScale = parseFloat(el.heightScale.value);
        const baseHeight = parseFloat(el.baseHeight.value);

        const gridData = buildSamplingGrid(state.selectedGeoJSON, gridSize);
        const elevationResults = await fetchElevations(dataset, gridData.points);

        const rawHeights = gridData.points.map((p, i) => {
          const v = elevationResults[i]?.elevation;
          return p.inside && v !== null ? Number(v) : null;
        });

        const heights = fillNullHeights(gridSize, rawHeights);

        state.lastGridData = gridData;
        state.lastHeights = [...heights];

        buildTerrainModel({
          gridSize,
          points: gridData.points,
          heights,
          heightScale,
          baseHeight
        });

        setStatus('Model generated');
      }catch(err){
        console.error(err);
        setStatus(err.message || 'Generation failed');
      }finally{
        state.generating = false;
        el.generateBtn.disabled = false;
      }
    }

    el.generateBtn.addEventListener('click', generateModel);

    el.applySmoothBtn.addEventListener('click', () => {
      if(!state.lastGridData || !state.lastHeights){
        setStatus('No model to smooth');
        return;
      }
      const passes = parseInt(el.smoothStrength.value, 10);
      if(passes === 0){
        setStatus('Smoothing set to 0');
        return;
      }
      const gridSize = state.lastGridData.gridSize;
      state.lastHeights = smoothHeights(gridSize, state.lastHeights, passes);
      buildTerrainModel({
        gridSize,
        points: state.lastGridData.points,
        heights: state.lastHeights,
        heightScale: parseFloat(el.heightScale.value),
        baseHeight: parseFloat(el.baseHeight.value)
      });
      setStatus('Smoothing applied');
    });

    el.rebuildBtn.addEventListener('click', () => {
      if(!state.lastGridData || !state.lastHeights){
        setStatus('No model to rebuild');
        return;
      }
      buildTerrainModel({
        gridSize: state.lastGridData.gridSize,
        points: state.lastGridData.points,
        heights: state.lastHeights,
        heightScale: parseFloat(el.heightScale.value),
        baseHeight: parseFloat(el.baseHeight.value)
      });
      setStatus('Model rebuilt');
    });

    el.toggleWireframeBtn.addEventListener('click', () => {
      state.wireframe = !state.wireframe;
      if(state.terrainMesh) state.terrainMesh.material.wireframe = state.wireframe;
      setStatus(state.wireframe ? 'Wireframe on' : 'Wireframe off');
    });

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    el.exportGLBBtn.addEventListener('click', () => {
      if(!state.sceneGroup){
        setStatus('No model');
        return;
      }
      setStatus('Preparing GLB');
      const exporter = new GLTFExporter();
      exporter.parse(state.sceneGroup.clone(true), result => {
        const blob = new Blob([result], { type:'model/gltf-binary' });
        downloadBlob(blob, 'terrain-studio.glb');
        setStatus('GLB exported');
      }, { binary:true, onlyVisible:true });
    });

    el.exportSTLBtn.addEventListener('click', () => {
      if(!state.sceneGroup){
        setStatus('No model');
        return;
      }
      setStatus('Preparing STL');
      const exporter = new STLExporter();
      const output = exporter.parse(state.sceneGroup.clone(true), { binary:true });
      const blob = new Blob([output], { type:'model/stl' });
      downloadBlob(blob, 'terrain-studio.stl');
      setStatus('STL exported');
    });

    el.captureBtn.addEventListener('click', () => {
      renderer.render(scene, camera);
      renderer.domElement.toBlob(blob => {
        if(!blob){
          setStatus('PNG failed');
          return;
        }
        downloadBlob(blob, 'terrain-studio.png');
        setStatus('PNG exported');
      }, 'image/png');
    });

    setStatus('Ready');
    updateSelectionMeta();
    el.locationMeta.textContent = state.locationLabel;
  </script>
</body>
</html>
