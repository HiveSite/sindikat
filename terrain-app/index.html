<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Terrain Tool</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin:0; display:flex; height:100vh; }
    #map { width:50%; }
    #viewer { width:50%; background:#000; }
    button { position:absolute; top:10px; left:10px; z-index:999; padding:10px; }
  </style>
</head>

<body>

<button onclick="generate()">Generate 3D</button>

<div id="map"></div>
<div id="viewer"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>
let selectedBounds = null;

// MAPA
const map = L.map('map').setView([42.44,19.26], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// SELECTION
let rect, start;

map.on('mousedown', e => {
  start = e.latlng;
  if(rect) map.removeLayer(rect);
  rect = L.rectangle([start,start]).addTo(map);
});

map.on('mousemove', e => {
  if(!start) return;
  rect.setBounds([start, e.latlng]);
});

map.on('mouseup', () => {
  if(rect) selectedBounds = rect.getBounds();
  start = null;
});

// THREE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/2 / window.innerHeight, 0.1, 1000);
camera.position.set(50,50,50);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth/2, window.innerHeight);
document.getElementById('viewer').appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

// LOAD OBJ
function loadOBJ(text){
  scene.clear();

  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  const faces = [];

  text.split('\n').forEach(line=>{
    if(line.startsWith('v ')){
      let p = line.split(' ');
      vertices.push(parseFloat(p[1]),parseFloat(p[2]),parseFloat(p[3]));
    }
    if(line.startsWith('f ')){
      let p = line.split(' ');
      faces.push(parseInt(p[1])-1,parseInt(p[2])-1,parseInt(p[3])-1);
    }
  });

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
  geometry.setIndex(faces);
  geometry.computeVertexNormals();

  const mesh = new THREE.Mesh(
    geometry,
    new THREE.MeshStandardMaterial({ color:0x00ffcc, wireframe:false })
  );

  scene.add(mesh);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(50,50,50);
  scene.add(light);
}

// GENERATE
async function generate(){
  if(!selectedBounds){
    alert("Select area first");
    return;
  }

  const res = await fetch('/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      resolution: 50
    })
  });

  const obj = await res.text();
  loadOBJ(obj);
}
</script>

</body>
</html>
