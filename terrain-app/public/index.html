<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terrain Tool</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;display:flex;height:100vh;}
#map{width:50%;}
#viewer{width:50%;background:#000;}
.panel{
 position:absolute;top:10px;left:10px;
 background:#111;color:#fff;padding:10px;border-radius:10px;
 z-index:999;font-size:12px;
}
</style>
</head>

<body>

<div class="panel">
<button onclick="generate()">Generate</button><br>
Res <input id="res" type="range" min="20" max="60" value="30"><br>
Zoom <input id="zoom" type="range" min="10" max="13" value="11"><br>
Height <input id="height" type="range" min="1" max="5" value="2"><br>
Smooth <input id="smooth" type="range" min="0" max="3" value="1"><br>
<button onclick="exportOBJ()">OBJ</button>
<button onclick="exportSTL()">STL</button>
</div>

<div id="map"></div>
<div id="viewer"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/exporters/STLExporter.js"></script>

<script>
let bounds=null,start,rect,currentMesh=null;

// MAP
const map=L.map('map').setView([42.44,19.26],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('mousedown',e=>{
 start=e.latlng;
 if(rect) map.removeLayer(rect);
 rect=L.rectangle([start,start]).addTo(map);
});

map.on('mousemove',e=>{
 if(!start) return;
 rect.setBounds([start,e.latlng]);
});

map.on('mouseup',()=>{
 if(rect) bounds=rect.getBounds();
 start=null;
});

// THREE
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/2/window.innerHeight,0.1,1000);
camera.position.set(60,60,60);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth/2,window.innerHeight);
viewer.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
scene.add(new THREE.DirectionalLight(0xffffff,1));

function animate(){
 requestAnimationFrame(animate);
 controls.update();
 renderer.render(scene,camera);
}
animate();

// TERRAIN
function lngLatToTile(lng,lat,z){
 let n=Math.pow(2,z);
 return {
  x:n*((lng+180)/360),
  y:n*(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2
 };
}

function decode(r,g,b){
 return (r*256+g+b/256)-32768;
}

async function getHeight(lat,lng,z){
 const t=lngLatToTile(lng,lat,z);
 const tx=Math.floor(t.x), ty=Math.floor(t.y);

 const url=`https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${z}/${tx}/${ty}.png`;
 const img=new Image();
 img.crossOrigin="anonymous";
 img.src=url;

 await img.decode();

 const c=document.createElement('canvas');
 c.width=256;c.height=256;
 const ctx=c.getContext('2d');
 ctx.drawImage(img,0,0);

 const px=Math.floor((t.x-tx)*256);
 const py=Math.floor((t.y-ty)*256);

 const d=ctx.getImageData(px,py,1,1).data;
 return decode(d[0],d[1],d[2]);
}

// GENERATE
async function generate(){
 if(!bounds){
  alert("select area");
  return;
 }

 const res=parseInt(document.getElementById("res").value);
 const zoom=parseInt(document.getElementById("zoom").value);
 const heightScale=parseFloat(document.getElementById("height").value);
 const smoothPasses=parseInt(document.getElementById("smooth").value);

 const sw=bounds.getSouthWest();
 const ne=bounds.getNorthEast();

 let heights=[];

 for(let y=0;y<res;y++){
  const lat=ne.lat-(y/(res-1))*(ne.lat-sw.lat);

  for(let x=0;x<res;x++){
   const lng=sw.lng+(x/(res-1))*(ne.lng-sw.lng);
   heights.push(await getHeight(lat,lng,zoom));
  }
 }

 // SMOOTH
 for(let s=0;s<smoothPasses;s++){
  let temp=[...heights];
  for(let y=1;y<res-1;y++){
   for(let x=1;x<res-1;x++){
    let sum=0,count=0;
    for(let oy=-1;oy<=1;oy++){
     for(let ox=-1;ox<=1;ox++){
      sum+=heights[(y+oy)*res+(x+ox)];
      count++;
     }
    }
    temp[y*res+x]=sum/count;
   }
  }
  heights=temp;
 }

 const min=Math.min(...heights);
 const max=Math.max(...heights);
 const scale=50/(max-min||1);

 // BUILD MESH
 if(currentMesh) scene.remove(currentMesh);

 const geo=new THREE.PlaneGeometry(100,100,res-1,res-1);
 geo.rotateX(-Math.PI/2);

 const pos=geo.attributes.position;

 for(let i=0;i<pos.count;i++){
  pos.setY(i,(heights[i]-min)*scale*heightScale);
 }

 geo.computeVertexNormals();

 currentMesh=new THREE.Mesh(
  geo,
  new THREE.MeshStandardMaterial({color:0x00ffcc})
 );

 scene.add(currentMesh);
}

// EXPORT OBJ
function exportOBJ(){
 if(!currentMesh) return;

 const pos=currentMesh.geometry.attributes.position;
 let text='';

 for(let i=0;i<pos.count;i++){
  text+=`v ${pos.getX(i)} ${pos.getY(i)} ${pos.getZ(i)}\n`;
 }

 const blob=new Blob([text]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download="model.obj";
 a.click();
}

// EXPORT STL
function exportSTL(){
 if(!currentMesh) return;

 const exporter=new THREE.STLExporter();
 const data=exporter.parse(currentMesh);

 const blob=new Blob([data]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download="model.stl";
 a.click();
}
</script>

</body>
</html>
