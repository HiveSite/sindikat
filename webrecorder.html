<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sindikat Capture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0B0D] text-white">

<div class="fixed inset-0 pointer-events-none opacity-[0.06] bg-[radial-gradient(circle,#ffffff_1px,transparent_1px)] bg-[size:20px_20px]"></div>

<header class="border-b border-[#2A2A31] bg-[#0B0B0D] sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 flex items-center justify-center rounded-xl border border-[#2A2A31] bg-[#141418] text-[#F36A2E] font-bold">S</div>
      <div>
        <div class="font-semibold">Sindikat Capture</div>
        <div class="text-xs text-gray-400">Performance tools</div>
      </div>
    </div>
    <div class="flex gap-3">
      <button class="border border-[#2A2A31] px-4 py-2 rounded-xl">Demo</button>
      <button class="bg-[#F36A2E] px-4 py-2 rounded-xl">Start</button>
    </div>
  </div>
</header>

<section class="max-w-7xl mx-auto px-6 py-20 grid lg:grid-cols-2 gap-12">
  <div>
    <h1 class="text-5xl font-bold leading-tight">
      Rekreiran u <span class="text-[#F36A2E]">Sindikat</span> stilu
    </h1>
    <p class="mt-6 text-gray-400">
      Premium dark UI, jači CTA i ozbiljniji product positioning.
    </p>

    <div class="mt-10 flex gap-4">
      <button class="bg-[#F36A2E] px-6 py-3 rounded-xl">Start Recording</button>
      <button class="border border-[#2A2A31] px-6 py-3 rounded-xl">Docs</button>
    </div>
  </div>

  <div class="border border-[#2A2A31] bg-[#141418] rounded-2xl p-6">
    <h2 class="text-xl font-semibold mb-4">Website Scrolling Video</h2>

    <input class="w-full mb-4 p-3 rounded-xl bg-[#0B0B0D] border border-[#2A2A31]" placeholder="https://example.com" />

    <button class="w-full bg-[#F36A2E] py-3 rounded-xl">Start Recording</button>
  </div>
</section>

<section class="border-t border-[#2A2A31] py-20">
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-6">
    <div class="border border-[#2A2A31] p-6 rounded-xl">Screenshot Tool</div>
    <div class="border border-[#2A2A31] p-6 rounded-xl">Full Page Capture</div>
    <div class="border border-[#2A2A31] p-6 rounded-xl">Scrolling Video</div>
  </div>
</section>

<section class="py-20 text-center">
  <h2 class="text-4xl font-semibold">Spreman za produkciju</h2>
  <button class="mt-6 bg-[#F36A2E] px-6 py-3 rounded-xl">Deploy</button>
</section>

</body>
</html>
